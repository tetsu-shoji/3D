<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Shiomi AR Hit Test</title>
<style>body{margin:0;overflow:hidden;font-family:system-ui;}#info{position:absolute;left:8px;top:8px;z-index:2;background:rgba(0,0,0,0.5);color:#fff;padding:8px;border-radius:6px;font-size:13px}</style>
</head>
<body>
<div id="info">画面をタップして机に配置</div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.module.js';
import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/webxr/ARButton.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/loaders/GLTFLoader.js';

let camera, scene, renderer;
let reticle, controller;
let model = null;
let placed = false;

init();
async function init(){
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(0.5, 1, 0.5);
  scene.add(dir);

  // レティクル（ヒット位置表示）
  const ringGeo = new THREE.RingGeometry(0.05, 0.08, 32).rotateX(-Math.PI/2);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, opacity:0.8, transparent:true });
  reticle = new THREE.Mesh(ringGeo, ringMat);
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);

  // コントローラ（タップで配置）
  controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  // glTF読み込み（非表示で読み込む）
  const loader = new GLTFLoader();
  loader.load('shiomi_city.glb', (gltf) => {
    model = gltf.scene;
    model.visible = false; // 読み込み完了後に配置時に表示
    scene.add(model);
    console.log('model loaded');
  }, (xhr)=>{}, (err)=>{ console.error(err); });

  // hit-test セッション準備
  renderer.xr.addEventListener('sessionstart', async () => {
    const session = renderer.xr.getSession();
    const viewerRefSpace = await session.requestReferenceSpace('viewer');
    session.requestHitTestSource({ space: viewerRefSpace }).then((source) => {
      renderer.xr.hitTestSource = source;
    });
    // 参照空間（ローカル）
    renderer.xr.localReferenceSpace = await session.requestReferenceSpace('local');
  });

  renderer.xr.addEventListener('sessionend', () => {
    if (renderer.xr.hitTestSource) {
      renderer.xr.hitTestSource.cancel();
      renderer.xr.hitTestSource = null;
    }
  });

  window.addEventListener('resize', onWindowResize);
  renderer.setAnimationLoop(render);
}

function onWindowResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function onSelect(){
  if (!reticle.visible || !model) return;
  // 複数回配置したければ clone して配置する
  const placedModel = model.clone(true);
  // 自動フィット（簡易）：目標幅を0.4mにする
  autoFitAndPlace(placedModel, 0.45, reticle.matrix);
  placedModel.visible = true;
  scene.add(placedModel);
  placed = true;
}

function autoFitAndPlace(obj, targetSizeM, matrix){
  // バウンディングボックスを計算（注意：objがまだシーンにない場合は一時的に計算）
  const box = new THREE.Box3().setFromObject(obj);
  const size = new THREE.Vector3();
  box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);
  const uniform = (maxDim > 0) ? (targetSizeM / maxDim) : 1;
  obj.scale.setScalar(uniform * 0.95);

  // 底面を0に揃える
  const box2 = new THREE.Box3().setFromObject(obj);
  const bottomY = box2.min.y;
  obj.position.set(0, -bottomY, 0);

  // reticle の行列を適用（ワールド位置へ）
  obj.applyMatrix4(matrix);
  // 回転を水平に保つ（reticleは水平）
  // 必要なら obj.rotateY(Math.PI); で向きを調整
}

function render(timestamp, frame){
  if (frame) {
    const referenceSpace = renderer.xr.localReferenceSpace;
    const session = renderer.xr.getSession();
    const hitTestSource = renderer.xr.hitTestSource;
    if (hitTestSource && referenceSpace) {
      const hitTestResults = frame.getHitTestResults(hitTestSource);
      if (hitTestResults.length > 0) {
        const hit = hitTestResults[0];
        const pose = hit.getPose(referenceSpace);
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
      } else {
        reticle.visible = false;
      }
    }
  }

  renderer.render(scene, camera);
}
</script>
</body>
</html>
