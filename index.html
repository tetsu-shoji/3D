<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>潮見ジオラマ AR メッシュ抽出表示版</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- A-Frame Extras -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

video {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

canvas.a-canvas {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 1 !important;
  background: transparent !important;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
  z-index: 1 !important;
  background: transparent !important;
}

#ui {
  position: fixed;
  inset: 0;
  z-index: 20;
  pointer-events: none;
}

#topPanel {
  position: fixed;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  pointer-events: auto;
}

button {
  border: none;
  border-radius: 999px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 700;
  color: #111;
  background: rgba(255,255,255,0.94);
  box-shadow: 0 3px 12px rgba(0,0,0,0.3);
}

button:active {
  transform: scale(0.97);
}

#startBtn {
  background: #c40000;
  color: #fff;
}

#stopBtn {
  background: #333;
  color: #fff;
}

#resetBtn {
  background: #005bd3;
  color: #fff;
}

#extractBtn {
  background: #7b1fa2;
  color: #fff;
}

#checkBtn {
  background: #00a36c;
  color: #fff;
}

#status {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 16px;
  color: #fff;
  background: rgba(0,0,0,0.80);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  pointer-events: none;
}

#targetGuide {
  position: fixed;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%);
  width: 70vw;
  max-width: 360px;
  aspect-ratio: 2 / 3;
  border: 3px dashed rgba(255,255,255,0.82);
  border-radius: 16px;
  display: none;
  pointer-events: none;
}

#targetGuide::after {
  content: "マーカーをこの枠に合わせてください";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -34px;
  text-align: center;
  color: #fff;
  font-size: 13px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.8);
}

#foundBanner {
  position: fixed;
  top: 74px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 18px;
  border-radius: 999px;
  background: rgba(196,0,0,0.94);
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  display: none;
  pointer-events: none;
}
</style>
</head>

<body>
<div id="ui">
  <div id="topPanel">
    <button id="startBtn">開始</button>
    <button id="stopBtn">停止</button>
    <button id="largerBtn">＋</button>
    <button id="smallerBtn">－</button>
    <button id="frontBtn">前へ</button>
    <button id="backBtn">奥へ</button>
    <button id="upBtn">上へ</button>
    <button id="downBtn">下へ</button>
    <button id="extractBtn">メッシュ抽出</button>
    <button id="resetBtn">表示リセット</button>
    <button id="checkBtn">確認</button>
  </div>

  <div id="foundBanner">潮見ジオラマを発見！</div>
  <div id="targetGuide"></div>
  <div id="status">初期化中です。</div>
</div>

<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; maxTrack: 1; filterMinCF: 0.001; filterBeta: 0.01;"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true; preserveDrawingBuffer: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="markerTarget" mindar-image-target="targetIndex: 0">

    <!-- 光源 -->
    <a-light type="ambient" intensity="2.4"></a-light>
    <a-light type="directional" intensity="2.8" position="0 1 2"></a-light>
    <a-light type="point" intensity="2.0" position="0 0 1"></a-light>

    <!-- 赤い箱：AR基準点 -->
    <a-box
      id="debugBox"
      position="0 0 0.08"
      width="0.07"
      height="0.07"
      depth="0.07"
      color="#ff0000">
    </a-box>

    <!-- 水色ワイヤー箱：モデル表示予定範囲 -->
    <a-box
      id="modelBounds"
      position="0 0 0.22"
      width="0.8"
      height="0.8"
      depth="0.8"
      material="color: #00ffff; wireframe: true; transparent: true; opacity: 0.9;">
    </a-box>

    <!-- 抽出モデルを表示する親 -->
    <a-entity
      id="modelRoot"
      position="0 0 0.22"
      rotation="0 0 0"
      scale="1 1 1"
      visible="true">
    </a-entity>

    <!-- 元GLB。読み込み用。表示は後で非表示にします -->
    <a-entity
      id="shiomiOriginal"
      gltf-model="url(./shiomi_city.glb)"
      position="0 0 0"
      rotation="0 180 0"
      scale="1 1 1"
      visible="false"
      animation-mixer>
    </a-entity>

    <a-text
      value="潮見ジオラマ"
      align="center"
      color="#FFEEAA"
      position="0 0.75 0.10"
      scale="0.55 0.55 0.55">
    </a-text>

  </a-entity>
</a-scene>

<script>
const sceneEl = document.querySelector('#arScene');
const markerEl = document.querySelector('#markerTarget');
const originalEl = document.querySelector('#shiomiOriginal');
const modelRoot = document.querySelector('#modelRoot');
const debugBox = document.querySelector('#debugBox');
const modelBounds = document.querySelector('#modelBounds');

const startBtn = document.querySelector('#startBtn');
const stopBtn = document.querySelector('#stopBtn');
const largerBtn = document.querySelector('#largerBtn');
const smallerBtn = document.querySelector('#smallerBtn');
const frontBtn = document.querySelector('#frontBtn');
const backBtn = document.querySelector('#backBtn');
const upBtn = document.querySelector('#upBtn');
const downBtn = document.querySelector('#downBtn');
const extractBtn = document.querySelector('#extractBtn');
const resetBtn = document.querySelector('#resetBtn');
const checkBtn = document.querySelector('#checkBtn');

const statusEl = document.querySelector('#status');
const targetGuide = document.querySelector('#targetGuide');
const foundBanner = document.querySelector('#foundBanner');

let sceneLoaded = false;
let modelLoaded = false;
let arStarted = false;

let rootScale = 1.0;
let currentX = 0.0;
let currentY = 0.0;
let currentZ = 0.22;

let proxyGroup = null;
let proxyMeshCount = 0;
let sourceMeshCount = 0;
let visibleSourceMeshCount = 0;
let childCount = 0;
let innerScale = 1.0;
let boxSizeText = '';
let boxCenterText = '';

window.addEventListener('load', () => {
  statusEl.textContent =
    'ページを読み込みました。\n' +
    '開始ボタンを押してください。';
});

sceneEl.addEventListener('loaded', () => {
  sceneLoaded = true;
  statusEl.textContent =
    'A-Frameシーンを読み込みました。\n' +
    '開始できます。';
});

function countSourceMeshes() {
  const obj = originalEl.object3D;
  let c = 0;
  let m = 0;
  let v = 0;

  obj.traverse((node) => {
    c++;
    if (node.isMesh) {
      m++;
      if (node.visible) v++;
    }
  });

  childCount = c;
  sourceMeshCount = m;
  visibleSourceMeshCount = v;

  return { childCount: c, meshCount: m, visibleMeshCount: v };
}

function clearProxyGroup() {
  if (proxyGroup) {
    modelRoot.object3D.remove(proxyGroup);

    proxyGroup.traverse((node) => {
      if (node.geometry) node.geometry.dispose();
      if (node.material) {
        if (Array.isArray(node.material)) {
          node.material.forEach(mat => mat.dispose());
        } else {
          node.material.dispose();
        }
      }
    });

    proxyGroup = null;
    proxyMeshCount = 0;
  }
}

function extractMeshesToProxy() {
  const THREE = AFRAME.THREE;

  clearProxyGroup();

  const sourceRoot = originalEl.object3D;
  sourceRoot.updateMatrixWorld(true);

  const counts = countSourceMeshes();

  if (counts.meshCount === 0) {
    statusEl.textContent =
      '元GLBのメッシュが0です。\n' +
      'GLB形式または中身を確認してください。';
    return;
  }

  const inverseRootMatrix = sourceRoot.matrixWorld.clone().invert();

  const geometries = [];
  const totalBox = new THREE.Box3();
  let hasBox = false;

  sourceRoot.traverse((node) => {
    if (!node.isMesh || !node.geometry) return;

    const positionAttr = node.geometry.attributes.position;
    if (!positionAttr || positionAttr.count === 0) return;

    const geom = node.geometry.clone();

    // 元GLB内の階層・回転・スケールを焼き込む
    const relativeMatrix = new THREE.Matrix4().multiplyMatrices(
      inverseRootMatrix,
      node.matrixWorld
    );

    geom.applyMatrix4(relativeMatrix);
    geom.computeVertexNormals();
    geom.computeBoundingBox();

    if (geom.boundingBox) {
      totalBox.union(geom.boundingBox);
      hasBox = true;
    }

    geometries.push(geom);
  });

  if (!hasBox || geometries.length === 0) {
    statusEl.textContent =
      'メッシュはありますが、頂点情報を取得できません。\n' +
      'GLBの中身に頂点がない可能性があります。';
    return;
  }

  const size = new THREE.Vector3();
  const center = new THREE.Vector3();

  totalBox.getSize(size);
  totalBox.getCenter(center);

  boxSizeText =
    size.x.toFixed(4) + ', ' +
    size.y.toFixed(4) + ', ' +
    size.z.toFixed(4);

  boxCenterText =
    center.x.toFixed(4) + ', ' +
    center.y.toFixed(4) + ', ' +
    center.z.toFixed(4);

  const maxDim = Math.max(size.x, size.y, size.z);

  if (!isFinite(maxDim) || maxDim <= 0) {
    statusEl.textContent =
      'モデルサイズの計算に失敗しました。\n' +
      'box size: ' + boxSizeText;
    return;
  }

  const desiredSize = 0.75;
  innerScale = desiredSize / maxDim;
  innerScale = Math.max(0.001, Math.min(200, innerScale));

  proxyGroup = new THREE.Group();
  proxyGroup.name = 'shiomi_proxy_group';

  const greenMaterial = new THREE.MeshBasicMaterial({
    color: 0x00ff00,
    side: THREE.DoubleSide,
    transparent: false,
    opacity: 1.0,
    depthTest: false,
    depthWrite: false
  });

  geometries.forEach((geom) => {
    // 中心補正とスケールをジオメトリ自体に焼き込む
    geom.translate(-center.x, -center.y, -center.z);
    geom.scale(innerScale, innerScale, innerScale);

    const mesh = new THREE.Mesh(geom, greenMaterial.clone());
    mesh.visible = true;
    mesh.frustumCulled = false;
    mesh.renderOrder = 999;

    proxyGroup.add(mesh);
  });

  proxyMeshCount = proxyGroup.children.length;

  // いったん見えやすい角度にする
  proxyGroup.rotation.set(0, Math.PI, 0);
  proxyGroup.position.set(0, 0, 0);
  proxyGroup.scale.set(1, 1, 1);

  modelRoot.object3D.add(proxyGroup);

  // 元GLBは非表示にして、抽出モデルだけ表示
  originalEl.object3D.visible = false;
  modelRoot.object3D.visible = true;

  currentX = 0.0;
  currentY = 0.0;
  currentZ = 0.22;
  rootScale = 1.0;

  applyRootTransform(false);

  statusEl.textContent =
    'GLBメッシュを抽出して蛍光グリーンで再表示しました。\n' +
    '水色ワイヤー箱の中を確認してください。\n' +
    'source meshCount: ' + counts.meshCount + '\n' +
    'proxyMeshCount: ' + proxyMeshCount + '\n' +
    'box size: ' + boxSizeText + '\n' +
    'box center: ' + boxCenterText + '\n' +
    'innerScale: ' + innerScale.toFixed(4);
}

originalEl.addEventListener('model-loaded', () => {
  modelLoaded = true;

  statusEl.textContent =
    'GLB読み込みイベントが発生しました。\n' +
    'メッシュ抽出を実行しています。';

  setTimeout(() => {
    extractMeshesToProxy();
  }, 500);
});

originalEl.addEventListener('model-error', (e) => {
  console.error('model-error', e);

  modelLoaded = false;

  statusEl.textContent =
    'GLBの読み込みに失敗しました。\n' +
    '確認してください：\n' +
    '1. shiomi_city.glb が index.html と同じフォルダにあるか\n' +
    '2. ファイル名の大文字小文字が一致しているか\n' +
    '3. GLBファイルが壊れていないか';
});

function applyRootTransform(showMessage = true) {
  modelRoot.object3D.position.set(currentX, currentY, currentZ);
  modelRoot.object3D.scale.set(rootScale, rootScale, rootScale);

  modelBounds.object3D.position.set(currentX, currentY, currentZ);
  modelBounds.object3D.scale.set(rootScale, rootScale, rootScale);

  if (showMessage) {
    statusEl.textContent =
      '表示調整中です。\n' +
      'rootScale: ' + rootScale.toFixed(3) + '\n' +
      'X: ' + currentX.toFixed(3) + '\n' +
      'Y: ' + currentY.toFixed(3) + '\n' +
      'Z: ' + currentZ.toFixed(3) + '\n' +
      'innerScale: ' + innerScale.toFixed(4) + '\n' +
      'proxyMeshCount: ' + proxyMeshCount;
  }
}

largerBtn.addEventListener('click', () => {
  rootScale = Math.min(50, rootScale * 1.25);
  applyRootTransform();
});

smallerBtn.addEventListener('click', () => {
  rootScale = Math.max(0.001, rootScale / 1.25);
  applyRootTransform();
});

frontBtn.addEventListener('click', () => {
  currentZ += 0.10;
  applyRootTransform();
});

backBtn.addEventListener('click', () => {
  currentZ -= 0.10;
  applyRootTransform();
});

upBtn.addEventListener('click', () => {
  currentY += 0.10;
  applyRootTransform();
});

downBtn.addEventListener('click', () => {
  currentY -= 0.10;
  applyRootTransform();
});

extractBtn.addEventListener('click', () => {
  extractMeshesToProxy();
});

resetBtn.addEventListener('click', () => {
  rootScale = 1.0;
  currentX = 0.0;
  currentY = 0.0;
  currentZ = 0.22;

  extractMeshesToProxy();

  statusEl.textContent += '\n表示リセットを実行しました。';
});

markerEl.addEventListener('targetFound', () => {
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'block';

  debugBox.setAttribute('visible', 'true');
  modelRoot.setAttribute('visible', 'true');
  modelBounds.setAttribute('visible', 'true');

  const counts = countSourceMeshes();

  statusEl.textContent =
    '潮見ジオラマを発見しました。\n' +
    '赤い箱・水色ワイヤー箱・蛍光グリーン抽出モデルを確認してください。\n' +
    'source meshCount: ' + counts.meshCount + '\n' +
    'visibleSourceMeshCount: ' + counts.visibleMeshCount + '\n' +
    'proxyMeshCount: ' + proxyMeshCount + '\n' +
    '見えない場合は「メッシュ抽出」「表示リセット」「＋」「前へ」を押してください。';

  setTimeout(() => {
    foundBanner.style.display = 'none';
  }, 2000);
});

markerEl.addEventListener('targetLost', () => {
  if (!arStarted) return;

  foundBanner.style.display = 'none';
  targetGuide.style.display = 'block';

  statusEl.textContent =
    'マーカーを見失いました。\n' +
    '中央に入れてください。';
});

async function waitForMindARSystem() {
  for (let i = 0; i < 50; i++) {
    const sys = sceneEl.systems['mindar-image-system'];
    if (sys) return sys;
    await new Promise(r => setTimeout(r, 200));
  }
  return null;
}

startBtn.addEventListener('click', async () => {
  try {
    if (!window.isSecureContext) {
      statusEl.textContent =
        'HTTPSではありません。\n' +
        'https:// のURLで開いてください。';
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      statusEl.textContent =
        'このブラウザではカメラAPIが使えません。\n' +
        'iPhoneはSafari、AndroidはChromeで開いてください。';
      return;
    }

    if (!sceneLoaded) {
      statusEl.textContent =
        'ARシーンの読み込みがまだ完了していません。\n' +
        '少し待ってから開始してください。';
      return;
    }

    const mindar = await waitForMindARSystem();

    if (!mindar) {
      statusEl.textContent =
        'MindARシステムが見つかりません。\n' +
        'scriptタグを確認してください。';
      return;
    }

    targetGuide.style.display = 'block';
    statusEl.textContent =
      'カメラを起動しています。\n' +
      'カメラ許可をしてください。';

    await mindar.start();

    arStarted = true;

    statusEl.textContent =
      '探索中です。\n' +
      'マーカーを画面中央に入れてください。';

  } catch (err) {
    console.error(err);

    statusEl.textContent =
      'カメラ開始に失敗しました。\n' +
      (err.message || String(err));
  }
});

stopBtn.addEventListener('click', () => {
  const sys = sceneEl.systems['mindar-image-system'];

  if (sys) {
    sys.stop();
  }

  arStarted = false;
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'none';

  statusEl.textContent = '停止しました。';
});

checkBtn.addEventListener('click', () => {
  const mindar = sceneEl.systems['mindar-image-system'];
  const counts = countSourceMeshes();

  let proxyChildren = 0;

  if (proxyGroup) {
    proxyChildren = proxyGroup.children.length;
  }

  statusEl.textContent =
    '状態確認\n' +
    'HTTPS: ' + window.isSecureContext + '\n' +
    'sceneLoaded: ' + sceneLoaded + '\n' +
    'MindAR: ' + Boolean(mindar) + '\n' +
    'modelLoaded: ' + modelLoaded + '\n' +
    'source childCount: ' + counts.childCount + '\n' +
    'source meshCount: ' + counts.meshCount + '\n' +
    'source visibleMeshCount: ' + counts.visibleMeshCount + '\n' +
    'proxyGroup: ' + Boolean(proxyGroup) + '\n' +
    'proxyMeshCount: ' + proxyMeshCount + '\n' +
    'proxyChildren: ' + proxyChildren + '\n' +
    'rootScale: ' + rootScale.toFixed(3) + '\n' +
    'innerScale: ' + innerScale.toFixed(4) + '\n' +
    'X: ' + currentX.toFixed(3) + '\n' +
    'Y: ' + currentY.toFixed(3) + '\n' +
    'Z: ' + currentZ.toFixed(3) + '\n' +
    'box size: ' + boxSizeText + '\n' +
    'box center: ' + boxCenterText;
});
</script>

</body>
</html>
