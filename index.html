<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>潮見ジオラマ AR ソリッド表示・平行補正版</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

video {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

canvas.a-canvas {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 1 !important;
  background: transparent !important;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
  z-index: 1 !important;
  background: transparent !important;
}

#ui {
  position: fixed;
  inset: 0;
  z-index: 20;
  pointer-events: none;
}

#topPanel {
  position: fixed;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  pointer-events: auto;
}

button {
  border: none;
  border-radius: 999px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 700;
  color: #111;
  background: rgba(255,255,255,0.94);
  box-shadow: 0 3px 12px rgba(0,0,0,0.3);
}

button:active {
  transform: scale(0.97);
}

#startBtn { background: #c40000; color: #fff; }
#stopBtn { background: #333; color: #fff; }
#resetBtn { background: #005bd3; color: #fff; }
#colorBtn { background: #ff9800; color: #fff; }
#rotateBtn { background: #673ab7; color: #fff; }
#angleBtn { background: #009688; color: #fff; }
#swapBtn { background: #795548; color: #fff; }
#flipBtn { background: #455a64; color: #fff; }
#checkBtn { background: #00a36c; color: #fff; }

#status {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 16px;
  color: #fff;
  background: rgba(0,0,0,0.80);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  pointer-events: none;
}

#targetGuide {
  position: fixed;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%);
  width: 70vw;
  max-width: 360px;
  aspect-ratio: 2 / 3;
  border: 3px dashed rgba(255,255,255,0.82);
  border-radius: 16px;
  display: none;
  pointer-events: none;
}

#targetGuide::after {
  content: "マーカーをこの枠に合わせてください";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -34px;
  text-align: center;
  color: #fff;
  font-size: 13px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.8);
}

#foundBanner {
  position: fixed;
  top: 74px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 18px;
  border-radius: 999px;
  background: rgba(196,0,0,0.94);
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  display: none;
  pointer-events: none;
}
</style>
</head>

<body>
<div id="ui">
  <div id="topPanel">
    <button id="startBtn">開始</button>
    <button id="stopBtn">停止</button>
    <button id="largerBtn">＋</button>
    <button id="smallerBtn">－</button>
    <button id="frontBtn">前へ</button>
    <button id="backBtn">奥へ</button>
    <button id="upBtn">上へ</button>
    <button id="downBtn">下へ</button>
    <button id="rotateBtn">180度回転</button>
    <button id="angleBtn">角度切替</button>
    <button id="colorBtn">色切替</button>
    <button id="swapBtn">道路/建物入替</button>
    <button id="flipBtn">表裏補正</button>
    <button id="resetBtn">表示リセット</button>
    <button id="checkBtn">確認</button>
  </div>

  <div id="foundBanner">潮見ジオラマを発見！</div>
  <div id="targetGuide"></div>
  <div id="status">初期化中です。</div>
</div>

<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; maxTrack: 1; filterMinCF: 0.001; filterBeta: 0.01;"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true; preserveDrawingBuffer: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="markerTarget" mindar-image-target="targetIndex: 0">

    <a-light type="ambient" intensity="2.7"></a-light>
    <a-light type="directional" intensity="2.8" position="0 1 2"></a-light>
    <a-light type="point" intensity="2.0" position="0 0 1"></a-light>

    <!-- 通常は非表示の確認用 -->
    <a-box
      id="debugBox"
      visible="false"
      position="0 0 0.08"
      width="0.07"
      height="0.07"
      depth="0.07"
      color="#ff0000">
    </a-box>

    <a-box
      id="modelBounds"
      visible="false"
      position="0 0 0.28"
      width="0.8"
      height="0.8"
      depth="0.8"
      material="color: #00ffff; wireframe: true; transparent: true; opacity: 0.6;">
    </a-box>

    <!-- 表示用モデル -->
    <a-entity
      id="modelRoot"
      position="0 0 0.28"
      rotation="0 0 0"
      scale="1 1 1"
      visible="true">
    </a-entity>

    <!-- 元GLB。読み込み専用 -->
    <a-entity
      id="shiomiOriginal"
      gltf-model="url(./shiomi_city.glb)"
      position="0 0 0"
      rotation="0 0 0"
      scale="1 1 1"
      visible="false"
      animation-mixer>
    </a-entity>

    <a-text
      value="潮見ジオラマ"
      align="center"
      color="#FFEEAA"
      position="0 0.75 0.10"
      scale="0.55 0.55 0.55">
    </a-text>

  </a-entity>
</a-scene>

<script>
const sceneEl = document.querySelector('#arScene');
const markerEl = document.querySelector('#markerTarget');
const originalEl = document.querySelector('#shiomiOriginal');
const modelRoot = document.querySelector('#modelRoot');
const modelBounds = document.querySelector('#modelBounds');
const debugBox = document.querySelector('#debugBox');

const startBtn = document.querySelector('#startBtn');
const stopBtn = document.querySelector('#stopBtn');
const largerBtn = document.querySelector('#largerBtn');
const smallerBtn = document.querySelector('#smallerBtn');
const frontBtn = document.querySelector('#frontBtn');
const backBtn = document.querySelector('#backBtn');
const upBtn = document.querySelector('#upBtn');
const downBtn = document.querySelector('#downBtn');
const rotateBtn = document.querySelector('#rotateBtn');
const angleBtn = document.querySelector('#angleBtn');
const colorBtn = document.querySelector('#colorBtn');
const swapBtn = document.querySelector('#swapBtn');
const flipBtn = document.querySelector('#flipBtn');
const resetBtn = document.querySelector('#resetBtn');
const checkBtn = document.querySelector('#checkBtn');

const statusEl = document.querySelector('#status');
const targetGuide = document.querySelector('#targetGuide');
const foundBanner = document.querySelector('#foundBanner');

let sceneLoaded = false;
let modelLoaded = false;
let arStarted = false;

let rootScale = 1.0;
let currentX = 0.0;
let currentY = 0.0;
let currentZ = 0.28;

let proxyGroup = null;
let proxyMeshCount = 0;
let sourceMeshCount = 0;
let visibleSourceMeshCount = 0;
let childCount = 0;
let innerScale = 1.0;
let boxSizeText = '';
let boxCenterText = '';

let colorMode = 0;
let yawMode = 0;
let angleMode = 0;
let swapRoadBuilding = false;
let flipSurface = false;

const colorSets = [
  {
    land: 0x4caf50,
    building: 0xf2f2f2,
    road: 0xf9c74f,
    other: 0x90caf9
  },
  {
    land: 0x00cc66,
    building: 0xffffff,
    road: 0xffcc00,
    other: 0x00bcd4
  },
  {
    land: 0x6abf69,
    building: 0xd9d9d9,
    road: 0x8d6e63,
    other: 0x64b5f6
  }
];

const angleModes = [
  {
    name: '真上',
    pitchDeg: 0,
    z: 0.28,
    y: 0.00
  },
  {
    name: '斜め',
    pitchDeg: -15,
    z: 0.36,
    y: 0.03
  },
  {
    name: 'ローアングル',
    pitchDeg: -28,
    z: 0.46,
    y: 0.07
  }
];

window.addEventListener('load', () => {
  statusEl.textContent =
    'ページを読み込みました。\n' +
    '開始ボタンを押してください。';
});

sceneEl.addEventListener('loaded', () => {
  sceneLoaded = true;
  statusEl.textContent =
    'A-Frameシーンを読み込みました。\n' +
    'GLB読み込み後、自動で表示します。';
});

function countSourceMeshes() {
  const obj = originalEl.object3D;
  let c = 0;
  let m = 0;
  let v = 0;

  obj.traverse((node) => {
    c++;

    if (node.isMesh) {
      m++;
      if (node.visible) v++;
    }
  });

  childCount = c;
  sourceMeshCount = m;
  visibleSourceMeshCount = v;

  return {
    childCount: c,
    meshCount: m,
    visibleMeshCount: v
  };
}

function clearProxyGroup() {
  if (proxyGroup) {
    modelRoot.object3D.remove(proxyGroup);

    proxyGroup.traverse((node) => {
      if (node.geometry) node.geometry.dispose();

      if (node.material) {
        if (Array.isArray(node.material)) {
          node.material.forEach(mat => mat.dispose());
        } else {
          node.material.dispose();
        }
      }
    });

    proxyGroup = null;
    proxyMeshCount = 0;
  }
}

function getGeometryVolume(geom) {
  geom.computeBoundingBox();
  if (!geom.boundingBox) return 0;

  const size = new AFRAME.THREE.Vector3();
  geom.boundingBox.getSize(size);

  return Math.abs(size.x * size.y * size.z);
}

/*
  今回のGLBは、すでに名刺面と地面が平行になる座標系とみなす。
  そのため、X/Y/Z の入れ替えはしない。
  表裏が逆の場合のみ Z を反転する。
*/
function remapYUpToARZUp(geom) {
  const position = geom.attributes.position;
  if (!position) return;

  for (let i = 0; i < position.count; i++) {
    const x = position.getX(i);
    const y = position.getY(i);
    const z = position.getZ(i);

    if (!flipSurface) {
      position.setXYZ(i, x, y, z);
    } else {
      position.setXYZ(i, x, y, -z);
    }
  }

  position.needsUpdate = true;
  geom.computeVertexNormals();
  geom.computeBoundingBox();
}

function getLayerType(index, item) {
  const name = (item.name || '').toLowerCase();

  if (
    name.includes('road') ||
    name.includes('道路') ||
    name.includes('street') ||
    name.includes('line')
  ) {
    return 'road';
  }

  if (
    name.includes('building') ||
    name.includes('build') ||
    name.includes('建物') ||
    name.includes('house') ||
    name.includes('tower')
  ) {
    return 'building';
  }

  if (
    name.includes('land') ||
    name.includes('ground') ||
    name.includes('terrain') ||
    name.includes('地面') ||
    name.includes('土地')
  ) {
    return 'land';
  }

  // 大きい順に並べている前提
  if (index === 0) return 'land';

  if (!swapRoadBuilding) {
    if (index === 1) return 'building';
    if (index === 2) return 'road';
  } else {
    if (index === 1) return 'road';
    if (index === 2) return 'building';
  }

  return 'other';
}

function getLayerLift(layerType) {
  // Zプラス方向 = 地面から上
  if (layerType === 'land') return -0.004;
  if (layerType === 'building') return 0.020;
  if (layerType === 'road') return 0.045;
  return 0.012;
}

function getLayerRenderOrder(layerType) {
  if (layerType === 'land') return 10;
  if (layerType === 'building') return 20;
  if (layerType === 'road') return 30;
  return 25;
}

function makeSolidMaterialForLayer(colorValue, layerType) {
  const THREE = AFRAME.THREE;

  let polygonOffsetFactor = 0;
  let polygonOffsetUnits = 0;

  if (layerType === 'road') {
    polygonOffsetFactor = -8;
    polygonOffsetUnits = -8;
  } else if (layerType === 'building') {
    polygonOffsetFactor = -4;
    polygonOffsetUnits = -4;
  } else if (layerType === 'land') {
    polygonOffsetFactor = 2;
    polygonOffsetUnits = 2;
  }

  return new THREE.MeshStandardMaterial({
    color: colorValue,
    side: THREE.DoubleSide,
    roughness: 0.72,
    metalness: 0.02,
    transparent: false,
    opacity: 1.0,
    depthTest: true,
    depthWrite: true,
    polygonOffset: true,
    polygonOffsetFactor: polygonOffsetFactor,
    polygonOffsetUnits: polygonOffsetUnits
  });
}

function updateProxyRotation() {
  if (!proxyGroup) return;

  const THREE = AFRAME.THREE;

  const pitchDeg = angleModes[angleMode].pitchDeg;
  const pitch = THREE.MathUtils.degToRad(pitchDeg);

  // 180度回転は地図面上の回転なのでZ軸
  const zYaw = yawMode % 2 === 0 ? 0 : Math.PI;

  proxyGroup.rotation.set(pitch, 0, zYaw);
}

function extractMeshesToProxy() {
  const THREE = AFRAME.THREE;

  clearProxyGroup();

  const sourceRoot = originalEl.object3D;
  sourceRoot.updateMatrixWorld(true);

  const counts = countSourceMeshes();

  if (counts.meshCount === 0) {
    statusEl.textContent =
      '元GLBのメッシュが0です。\n' +
      'GLB形式または中身を確認してください。';
    return;
  }

  const inverseRootMatrix = sourceRoot.matrixWorld.clone().invert();

  const items = [];
  const totalBox = new THREE.Box3();
  let hasBox = false;

  sourceRoot.traverse((node) => {
    if (!node.isMesh || !node.geometry) return;

    const positionAttr = node.geometry.attributes.position;
    if (!positionAttr || positionAttr.count === 0) return;

    const geom = node.geometry.clone();

    const relativeMatrix = new THREE.Matrix4().multiplyMatrices(
      inverseRootMatrix,
      node.matrixWorld
    );

    geom.applyMatrix4(relativeMatrix);

    // 座標は入れ替えない。必要時のみZ反転。
    remapYUpToARZUp(geom);

    geom.computeVertexNormals();
    geom.computeBoundingBox();

    if (geom.boundingBox) {
      totalBox.union(geom.boundingBox);
      hasBox = true;
    }

    items.push({
      geometry: geom,
      name: node.name || '',
      volume: getGeometryVolume(geom)
    });
  });

  if (!hasBox || items.length === 0) {
    statusEl.textContent =
      'メッシュはありますが、頂点情報を取得できません。\n' +
      'GLBの中身に頂点がない可能性があります。';
    return;
  }

  items.sort((a, b) => b.volume - a.volume);

  const size = new THREE.Vector3();
  const center = new THREE.Vector3();

  totalBox.getSize(size);
  totalBox.getCenter(center);

  boxSizeText =
    size.x.toFixed(4) + ', ' +
    size.y.toFixed(4) + ', ' +
    size.z.toFixed(4);

  boxCenterText =
    center.x.toFixed(4) + ', ' +
    center.y.toFixed(4) + ', ' +
    center.z.toFixed(4);

  const maxDim = Math.max(size.x, size.y, size.z);

  if (!isFinite(maxDim) || maxDim <= 0) {
    statusEl.textContent =
      'モデルサイズの計算に失敗しました。\n' +
      'box size: ' + boxSizeText;
    return;
  }

  const desiredSize = 0.78;
  innerScale = desiredSize / maxDim;
  innerScale = Math.max(0.001, Math.min(200, innerScale));

  proxyGroup = new THREE.Group();
  proxyGroup.name = 'shiomi_proxy_group';

  const colors = colorSets[colorMode % colorSets.length];

  items.forEach((item, index) => {
    const geom = item.geometry;

    const layerType = getLayerType(index, item);
    const liftZ = getLayerLift(layerType);

    // 中心補正
    geom.translate(-center.x, -center.y, -center.z);

    // スケール
    geom.scale(innerScale, innerScale, innerScale);

    // 道路・建物・地面の高さ補正
    geom.translate(0, 0, liftZ);

    let colorValue = colors.other;
    if (layerType === 'land') colorValue = colors.land;
    if (layerType === 'building') colorValue = colors.building;
    if (layerType === 'road') colorValue = colors.road;

    const material = makeSolidMaterialForLayer(colorValue, layerType);

    const mesh = new THREE.Mesh(geom, material);
    mesh.visible = true;
    mesh.frustumCulled = false;
    mesh.renderOrder = getLayerRenderOrder(layerType);

    proxyGroup.add(mesh);
  });

  proxyMeshCount = proxyGroup.children.length;

  proxyGroup.position.set(0, 0, 0);
  proxyGroup.scale.set(1, 1, 1);

  modelRoot.object3D.add(proxyGroup);

  originalEl.object3D.visible = false;
  modelRoot.object3D.visible = true;

  const mode = angleModes[angleMode];
  currentY = mode.y;
  currentZ = mode.z;

  rootScale = 1.0;

  updateProxyRotation();
  applyRootTransform(false);

  statusEl.textContent =
    'ソリッド表示で自動表示しました。\n' +
    'GLBの座標を入れ替えず、名刺面と地面が平行になる前提で表示しています。\n' +
    '道路は地面より上に補正しています。\n' +
    '地面の表裏が逆の場合は「表裏補正」を押してください。\n' +
    '回転: ' + (yawMode % 2 === 0 ? '0度' : '180度') + '\n' +
    '角度: ' + angleModes[angleMode].name + '\n' +
    '表裏補正: ' + (flipSurface ? 'ON' : 'OFF') + '\n' +
    '道路/建物入替: ' + (swapRoadBuilding ? '入替中' : '通常') + '\n' +
    'source meshCount: ' + counts.meshCount + '\n' +
    'proxyMeshCount: ' + proxyMeshCount + '\n' +
    'innerScale: ' + innerScale.toFixed(4);
}

originalEl.addEventListener('model-loaded', () => {
  modelLoaded = true;

  statusEl.textContent =
    'GLBを読み込みました。\n' +
    '自動でメッシュ抽出して表示します。';

  setTimeout(() => {
    extractMeshesToProxy();
  }, 500);
});

originalEl.addEventListener('model-error', (e) => {
  console.error('model-error', e);

  modelLoaded = false;

  statusEl.textContent =
    'GLBの読み込みに失敗しました。\n' +
    '確認してください：\n' +
    '1. shiomi_city.glb が index.html と同じフォルダにあるか\n' +
    '2. ファイル名の大文字小文字が一致しているか\n' +
    '3. GLBファイルが壊れていないか';
});

function applyRootTransform(showMessage = true) {
  modelRoot.object3D.position.set(currentX, currentY, currentZ);
  modelRoot.object3D.scale.set(rootScale, rootScale, rootScale);

  modelBounds.object3D.position.set(currentX, currentY, currentZ);
  modelBounds.object3D.scale.set(rootScale, rootScale, rootScale);

  if (showMessage) {
    statusEl.textContent =
      '表示調整中です。\n' +
      'rootScale: ' + rootScale.toFixed(3) + '\n' +
      'X: ' + currentX.toFixed(3) + '\n' +
      'Y: ' + currentY.toFixed(3) + '\n' +
      'Z: ' + currentZ.toFixed(3) + '\n' +
      '角度: ' + angleModes[angleMode].name + '\n' +
      '回転: ' + (yawMode % 2 === 0 ? '0度' : '180度') + '\n' +
      '表裏補正: ' + (flipSurface ? 'ON' : 'OFF') + '\n' +
      '道路/建物入替: ' + (swapRoadBuilding ? '入替中' : '通常') + '\n' +
      'proxyMeshCount: ' + proxyMeshCount;
  }
}

largerBtn.addEventListener('click', () => {
  rootScale = Math.min(50, rootScale * 1.20);
  applyRootTransform();
});

smallerBtn.addEventListener('click', () => {
  rootScale = Math.max(0.001, rootScale / 1.20);
  applyRootTransform();
});

frontBtn.addEventListener('click', () => {
  currentZ += 0.08;
  applyRootTransform();
});

backBtn.addEventListener('click', () => {
  currentZ -= 0.08;
  applyRootTransform();
});

upBtn.addEventListener('click', () => {
  currentY += 0.08;
  applyRootTransform();
});

downBtn.addEventListener('click', () => {
  currentY -= 0.08;
  applyRootTransform();
});

rotateBtn.addEventListener('click', () => {
  yawMode = (yawMode + 1) % 2;
  updateProxyRotation();
  applyRootTransform();

  statusEl.textContent =
    'モデルをZ軸で180度回転しました。\n' +
    '地面を裏返さず、地図の向きだけを変える回転です。\n' +
    '現在: ' + (yawMode % 2 === 0 ? '0度' : '180度');
});

angleBtn.addEventListener('click', () => {
  angleMode = (angleMode + 1) % angleModes.length;

  const mode = angleModes[angleMode];

  currentY = mode.y;
  currentZ = mode.z;

  updateProxyRotation();
  applyRootTransform();

  statusEl.textContent =
    '角度を切り替えました。\n' +
    '現在: ' + mode.name + '\n' +
    '地面が傾きすぎる場合は、もう一度「角度切替」で真上に戻してください。';
});

colorBtn.addEventListener('click', () => {
  colorMode = (colorMode + 1) % colorSets.length;
  extractMeshesToProxy();

  statusEl.textContent +=
    '\n色を切り替えました。\n' +
    'colorMode: ' + colorMode;
});

swapBtn.addEventListener('click', () => {
  swapRoadBuilding = !swapRoadBuilding;
  extractMeshesToProxy();

  statusEl.textContent +=
    '\n道路/建物の判定を入れ替えました。\n' +
    '現在: ' + (swapRoadBuilding ? '入替中' : '通常');
});

flipBtn.addEventListener('click', () => {
  flipSurface = !flipSurface;
  extractMeshesToProxy();

  statusEl.textContent +=
    '\n表裏補正を切り替えました。\n' +
    '現在: ' + (flipSurface ? 'ON' : 'OFF');
});

resetBtn.addEventListener('click', () => {
  rootScale = 1.0;
  currentX = 0.0;
  angleMode = 0;
  yawMode = 0;
  flipSurface = false;

  const mode = angleModes[angleMode];
  currentY = mode.y;
  currentZ = mode.z;

  extractMeshesToProxy();

  statusEl.textContent =
    '表示リセットしました。\n' +
    '座標入れ替えなし、表裏補正OFF、Z軸0度回転です。';
});

markerEl.addEventListener('targetFound', () => {
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'block';

  modelRoot.setAttribute('visible', 'true');
  modelBounds.setAttribute('visible', 'false');
  debugBox.setAttribute('visible', 'false');

  if (!proxyGroup && modelLoaded) {
    extractMeshesToProxy();
  }

  statusEl.textContent =
    '潮見ジオラマを発見しました。\n' +
    '名刺面と地面が平行になる前提で表示しています。\n' +
    '地面の表裏が逆の場合は「表裏補正」を押してください。';

  setTimeout(() => {
    foundBanner.style.display = 'none';
  }, 2000);
});

markerEl.addEventListener('targetLost', () => {
  if (!arStarted) return;

  foundBanner.style.display = 'none';
  targetGuide.style.display = 'block';

  statusEl.textContent =
    'マーカーを見失いました。\n' +
    '中央に入れてください。';
});

async function waitForMindARSystem() {
  for (let i = 0; i < 50; i++) {
    const sys = sceneEl.systems['mindar-image-system'];
    if (sys) return sys;
    await new Promise(r => setTimeout(r, 200));
  }
  return null;
}

startBtn.addEventListener('click', async () => {
  try {
    if (!window.isSecureContext) {
      statusEl.textContent =
        'HTTPSではありません。\n' +
        'https:// のURLで開いてください。';
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      statusEl.textContent =
        'このブラウザではカメラAPIが使えません。\n' +
        'iPhoneはSafari、AndroidはChromeで開いてください。';
      return;
    }

    if (!sceneLoaded) {
      statusEl.textContent =
        'ARシーンの読み込みがまだ完了していません。\n' +
        '少し待ってから開始してください。';
      return;
    }

    const mindar = await waitForMindARSystem();

    if (!mindar) {
      statusEl.textContent =
        'MindARシステムが見つかりません。\n' +
        'scriptタグを確認してください。';
      return;
    }

    targetGuide.style.display = 'block';
    statusEl.textContent =
      'カメラを起動しています。\n' +
      'カメラ許可をしてください。';

    await mindar.start();

    arStarted = true;

    statusEl.textContent =
      '探索中です。\n' +
      'マーカーを画面中央に入れてください。';

  } catch (err) {
    console.error(err);

    statusEl.textContent =
      'カメラ開始に失敗しました。\n' +
      (err.message || String(err));
  }
});

stopBtn.addEventListener('click', () => {
  const sys = sceneEl.systems['mindar-image-system'];

  if (sys) {
    sys.stop();
  }

  arStarted = false;
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'none';

  statusEl.textContent = '停止しました。';
});

checkBtn.addEventListener('click', () => {
  const mindar = sceneEl.systems['mindar-image-system'];
  const counts = countSourceMeshes();

  let proxyChildren = 0;

  if (proxyGroup) {
    proxyChildren = proxyGroup.children.length;
  }

  statusEl.textContent =
    '状態確認\n' +
    'HTTPS: ' + window.isSecureContext + '\n' +
    'sceneLoaded: ' + sceneLoaded + '\n' +
    'MindAR: ' + Boolean(mindar) + '\n' +
    'modelLoaded: ' + modelLoaded + '\n' +
    'source childCount: ' + counts.childCount + '\n' +
    'source meshCount: ' + counts.meshCount + '\n' +
    'source visibleMeshCount: ' + counts.visibleMeshCount + '\n' +
    'proxyGroup: ' + Boolean(proxyGroup) + '\n' +
    'proxy children: ' + proxyChildren + '\n' +
    'rootScale: ' + rootScale.toFixed(3) + '\n' +
    'innerScale: ' + innerScale.toFixed(4) + '\n' +
    'X: ' + currentX.toFixed(3) + '\n' +
    'Y: ' + currentY.toFixed(3) + '\n' +
    'Z: ' + currentZ.toFixed(3) + '\n' +
    '角度: ' + angleModes[angleMode].name + '\n' +
    '回転: ' + (yawMode % 2 === 0 ? '0度' : '180度') + '\n' +
    '表裏補正: ' + (flipSurface ? 'ON' : 'OFF') + '\n' +
    '道路/建物入替: ' + (swapRoadBuilding ? '入替中' : '通常') + '\n' +
    'box size: ' + boxSizeText + '\n' +
    'box center: ' + boxCenterText;
});
</script>

</body>
</html>
