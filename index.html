<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>MindAR デバッグページ（カメラ・GLB・AR）</title>
<style>
  body{margin:0;font-family:system-ui;background:#111;color:#eee}
  header{padding:12px;background:#0b1220}
  .row{display:flex;gap:8px;padding:12px}
  button{padding:10px 14px;border-radius:8px;border:none;background:#fff;color:#111;font-weight:700}
  #status{white-space:pre-wrap;padding:12px;background:#0f1720;margin:12px;border-radius:8px;max-height:40vh;overflow:auto}
  #log{white-space:pre-wrap;padding:12px;background:#071018;margin:12px;border-radius:8px;max-height:40vh;overflow:auto;color:#9fd}
  .err{color:#ff9a9a}
  a{color:#7fd}
</style>
</head>
<body>
<header>
  <strong>MindAR デバッグページ</strong>
  <div style="font-size:13px;margin-top:6px">手順: 1) カメラテスト 2) GLBテスト 3) AR開始</div>
</header>

<div class="row">
  <button id="camTest">カメラテスト</button>
  <button id="glbTest">GLBテスト (GLTFLoader)</button>
  <button id="arStart">AR開始 (MindAR)</button>
  <button id="showConsole">コンソールログ表示</button>
</div>

<div id="status">状態: 初期化済み</div>
<div id="log" aria-live="polite"></div>

<!-- A-Frame + MindAR -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<!-- シンプルな MindAR シーン（非表示で読み込み） -->
<a-scene id="arScene" mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;" embedded renderer="antialias:true;alpha:true" style="display:none">
  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
  <a-entity id="markerTarget" mindar-image-target="targetIndex: 0">
    <a-entity id="shiomi" visible="false" gltf-model="url(./shiomi_city.glb)" position="0 0 0" rotation="0 180 0" scale="1 1 1"></a-entity>
  </a-entity>
</a-scene>

<script>
const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');
function info(msg){ statusEl.textContent = '状態: ' + msg; const d = document.createElement('div'); d.textContent = msg; logEl.appendChild(d); logEl.scrollTop = logEl.scrollHeight; }
function error(msg){ statusEl.textContent = 'エラー: ' + msg; const d = document.createElement('div'); d.textContent = msg; d.className='err'; logEl.appendChild(d); logEl.scrollTop = logEl.scrollHeight; console.error(msg); }

// 設定（必要ならファイル名をここで変更）
const MIND_FILE = './marker.mind';
const GLB_FILE = './shiomi_city.glb';

// カメラテスト
document.getElementById('camTest').addEventListener('click', async () => {
  info('カメラテストを開始します...');
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    error('getUserMedia 非対応のブラウザです');
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    info('カメラ取得成功: トラック数=' + stream.getVideoTracks().length);
    // すぐ停止
    stream.getTracks().forEach(t => t.stop());
  } catch (e) {
    error('カメラ取得失敗: ' + (e && e.message ? e.message : e));
  }
});

// GLB テスト（HEAD + GLTFLoader）
document.getElementById('glbTest').addEventListener('click', async () => {
  info('GLBテストを開始します: ' + GLB_FILE);
  try {
    // HEAD
    try {
      const head = await fetch(GLB_FILE, { method: 'HEAD', cache: 'no-store' });
      info('HEAD ' + GLB_FILE + ' : HTTP ' + head.status);
      const len = head.headers.get('content-length');
      if (len) info('Content-Length: ' + (Number(len)/1024/1024).toFixed(2) + ' MB');
    } catch (e) {
      info('HEAD fetch 失敗: ' + e.message);
    }

    // GLTFLoader 実行（詳細エラーを得る）
    info('GLTFLoader を使って GET 読み込みを試みます...');
    const module = await import('https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/loaders/GLTFLoader.js');
    const GLTFLoader = module.GLTFLoader;
    const loader = new GLTFLoader();
    loader.load(GLB_FILE,
      (gltf) => {
        info('GLTFLoader: load OK. scene children=' + (gltf.scene ? gltf.scene.children.length : 0));
      },
      (xhr) => {
        if (xhr && xhr.total) info('GLTFLoader progress: ' + ((xhr.loaded/xhr.total)*100).toFixed(1) + '%');
      },
      (err) => {
        error('GLTFLoader error: ' + (err && err.message ? err.message : JSON.stringify(err)));
        console.error(err);
      }
    );
  } catch (e) {
    error('GLBテスト例外: ' + e.message);
  }
});

// AR開始（MindAR）
document.getElementById('arStart').addEventListener('click', async () => {
  info('MindAR start を試みます...');
  try {
    // 簡易チェック
    if (!window.isSecureContext) {
      error('HTTPS で開いてください（セキュアコンテキストが必要）');
      return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      error('カメラAPIが使えません');
      return;
    }
    // wait for mindar system
    const sceneEl = document.querySelector('#arScene');
    let system = null;
    for (let i=0;i<50;i++){
      system = sceneEl.systems && sceneEl.systems['mindar-image-system'];
      if (system) break;
      await new Promise(r=>setTimeout(r,200));
    }
    if (!system) {
      error('mindar-image-system が見つかりません。script の読み込みを確認してください。');
      return;
    }
    try {
      await system.start();
      info('MindAR start 成功。カメラが起動しました。マーカーをかざしてください。');
    } catch (e) {
      error('mindar.start() で失敗: ' + (e && e.message ? e.message : e));
      console.error(e);
    }
  } catch (e) {
    error('AR開始例外: ' + e.message);
  }
});

// show console toggle
document.getElementById('showConsole').addEventListener('click', () => {
  debugToggle();
});
function debugToggle(){
  if (logEl.style.display === 'none' || logEl.style.display === '') {
    logEl.style.display = 'block';
  } else {
    logEl.style.display = 'none';
  }
}

// 自動で最初のチェックを表示
(async ()=> {
  info('自動チェック: HTTPS=' + (window.isSecureContext ? 'OK' : 'NG') + ' | getUserMedia=' + (!!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)));
  // show HEAD statuses quickly
  try {
    const resMind = await fetch(MIND_FILE, { method:'HEAD', cache:'no-store' }).catch(e=>null);
    const resGlb = await fetch(GLB_FILE, { method:'HEAD', cache:'no-store' }).catch(e=>null);
    if (resMind) info(MIND_FILE + ' HEAD ' + resMind.status);
    else info(MIND_FILE + ' HEAD fetch failed');
    if (resGlb) info(GLB_FILE + ' HEAD ' + resGlb.status);
    else info(GLB_FILE + ' HEAD fetch failed');
  } catch(e){}
})();
</script>
</body>
</html>
