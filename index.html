<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>潮見ジオラマ AR 平行表示・X軸反転補正版</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

video {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

canvas.a-canvas {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 1 !important;
  background: transparent !important;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
  z-index: 1 !important;
  background: transparent !important;
}

#ui {
  position: fixed;
  inset: 0;
  z-index: 20;
  pointer-events: none;
}

#topPanel {
  position: fixed;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  pointer-events: auto;
}

button {
  border: none;
  border-radius: 999px;
  padding: 9px 12px;
  font-size: 13px;
  font-weight: 700;
  color: #111;
  background: rgba(255,255,255,0.94);
  box-shadow: 0 3px 12px rgba(0,0,0,0.3);
}

button:active {
  transform: scale(0.97);
}

#startBtn { background: #c40000; color: #fff; }
#stopBtn { background: #333; color: #fff; }
#resetBtn { background: #005bd3; color: #fff; }
#colorBtn { background: #ff9800; color: #fff; }
#rotateBtn { background: #673ab7; color: #fff; }
#angleBtn { background: #009688; color: #fff; }
#heightResetBtn { background: #607d8b; color: #fff; }
#checkBtn { background: #00a36c; color: #fff; }

#buildingUpBtn, #buildingDownBtn { background: #eeeeee; color: #111; }
#roadUpBtn, #roadDownBtn { background: #ffd54f; color: #111; }
#landUpBtn, #landDownBtn { background: #81c784; color: #111; }
#splitUpBtn, #splitDownBtn { background: #ce93d8; color: #111; }

#status {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 16px;
  color: #fff;
  background: rgba(0,0,0,0.84);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  pointer-events: none;
}

#targetGuide {
  position: fixed;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%);
  width: 70vw;
  max-width: 360px;
  aspect-ratio: 2 / 3;
  border: 3px dashed rgba(255,255,255,0.82);
  border-radius: 16px;
  display: none;
  pointer-events: none;
}

#targetGuide::after {
  content: "マーカーをこの枠に合わせてください";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -34px;
  text-align: center;
  color: #fff;
  font-size: 13px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.8);
}

#foundBanner {
  position: fixed;
  top: 74px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 18px;
  border-radius: 999px;
  background: rgba(196,0,0,0.94);
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  display: none;
  pointer-events: none;
}
</style>
</head>

<body>
<div id="ui">
  <div id="topPanel">
    <button id="startBtn">開始</button>
    <button id="stopBtn">停止</button>

    <button id="largerBtn">＋</button>
    <button id="smallerBtn">－</button>
    <button id="frontBtn">前へ</button>
    <button id="backBtn">奥へ</button>
    <button id="upBtn">全体上へ</button>
    <button id="downBtn">全体下へ</button>

    <button id="buildingUpBtn">建物↑</button>
    <button id="buildingDownBtn">建物↓</button>
    <button id="roadUpBtn">道路↑</button>
    <button id="roadDownBtn">道路↓</button>
    <button id="landUpBtn">土地↑</button>
    <button id="landDownBtn">土地↓</button>

    <button id="splitDownBtn">建物判定－</button>
    <button id="splitUpBtn">建物判定＋</button>
    <button id="heightResetBtn">高さリセット</button>

    <button id="rotateBtn">180度回転</button>
    <button id="angleBtn">角度切替</button>
    <button id="colorBtn">色切替</button>
    <button id="resetBtn">表示リセット</button>
    <button id="checkBtn">確認</button>
  </div>

  <div id="foundBanner">潮見ジオラマを発見！</div>
  <div id="targetGuide"></div>
  <div id="status">初期化中です。</div>
</div>

  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true; preserveDrawingBuffer: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="markerTarget" mindar-image-target="targetIndex: 0">

    <!-- 建物の面にうっすら陰影を出すためのライト -->
    <a-light type="ambient" intensity="1.10"></a-light>
    <a-light type="directional" intensity="2.3" position="0.9 1.4 2.0"></a-light>
    <a-light type="directional" intensity="0.9" position="-1.2 -0.4 1.2"></a-light>
    <a-light type="point" intensity="1.0" position="0 0 1"></a-light>

    <!-- 通常は非表示の確認用 -->
    <a-box
      id="debugBox"
      visible="false"
      position="0 0 0.08"
      width="0.07"
      height="0.07"
      depth="0.07"
      color="#ff0000">
    </a-box>

    <a-box
      id="modelBounds"
      visible="false"
      position="0 0 0.28"
      width="0.8"
      height="0.8"
      depth="0.8"
      material="color: #00ffff; wireframe: true; transparent: true; opacity: 0.6;">
    </a-box>

    <!-- 表示用モデル -->
    <a-entity
      id="modelRoot"
      position="0 0 0.28"
      rotation="0 0 0"
      scale="1 1 1"
      visible="true">
    </a-entity>

    <!-- 元GLB。読み込み専用 -->
    <a-entity
      id="shiomiOriginal"
      gltf-model="url(./shiomi_city.glb)"
      position="0 0 0"
      rotation="0 0 0"
      scale="1 1 1"
      visible="false"
      animation-mixer>
    </a-entity>

    <a-text
      value="潮見ジオラマ"
      align="center"
      color="#FFEEAA"
      position="0 0.75 0.10"
      scale="0.55 0.55 0.55">
    </a-text>

  </a-entity>
</a-scene>

originalEl.addEventListener('model-loaded', () => {
  modelLoaded = true;

  statusEl.textContent =
    'GLBを読み込みました。\n' +
    '自動で高さ分割メッシュを生成します。';

  setTimeout(() => {
    extractMeshesToProxy(false);
  }, 500);
});

originalEl.addEventListener('model-error', (e) => {
  console.error('model-error', e);

  modelLoaded = false;

  statusEl.textContent =
    'GLBの読み込みに失敗しました。\n' +
    '確認してください：\n' +
    '1. shiomi_city.glb が index.html と同じフォルダにあるか\n' +
    '2. ファイル名の大文字小文字が一致しているか\n' +
    '3. GLBファイルが壊れていないか';
});

function applyRootTransform(showMessage = true) {
  modelRoot.object3D.position.set(currentX, currentY, currentZ);
  modelRoot.object3D.scale.set(rootScale, rootScale, rootScale);

  modelBounds.object3D.position.set(currentX, currentY, currentZ);
  modelBounds.object3D.scale.set(rootScale, rootScale, rootScale);

  if (showMessage) {
    statusEl.textContent =
      '表示調整中です。\n' +
      'rootScale: ' + rootScale.toFixed(3) + '\n' +
      'X: ' + currentX.toFixed(3) + '\n' +
      'Y: ' + currentY.toFixed(3) + '\n' +
      'Z: ' + currentZ.toFixed(3) + '\n' +
      '角度: ' + angleModes[angleMode].name + '\n' +
      '建物判定: ' + buildingSplitRatio.toFixed(2) + '\n' +
      '土地: ' + layerHeightOffset.land.toFixed(3) + '\n' +
      '道路: ' + layerHeightOffset.road.toFixed(3) + '\n' +
      '建物: ' + layerHeightOffset.building.toFixed(3);
  }
}

function adjustLayerHeight(layer, delta) {
  layerHeightOffset[layer] += delta;
  extractMeshesToProxy(true);
}

function adjustBuildingSplit(delta) {
  buildingSplitRatio += delta;
  buildingSplitRatio = Math.max(0.02, Math.min(0.80, buildingSplitRatio));
  extractMeshesToProxy(true);
}

largerBtn.addEventListener('click', () => {
  rootScale = Math.min(50, rootScale * 1.20);
  applyRootTransform();
});

smallerBtn.addEventListener('click', () => {
  rootScale = Math.max(0.001, rootScale / 1.20);
  applyRootTransform();
});

frontBtn.addEventListener('click', () => {
  currentZ += 0.08;
  applyRootTransform();
});

backBtn.addEventListener('click', () => {
  currentZ -= 0.08;
  applyRootTransform();
});

upBtn.addEventListener('click', () => {
  currentY += 0.08;
  applyRootTransform();
});

downBtn.addEventListener('click', () => {
  currentY -= 0.08;
  applyRootTransform();
});

buildingUpBtn.addEventListener('click', () => {
  adjustLayerHeight('building', 0.020);
});

buildingDownBtn.addEventListener('click', () => {
  adjustLayerHeight('building', -0.020);
});

roadUpBtn.addEventListener('click', () => {
  adjustLayerHeight('road', 0.015);
});

roadDownBtn.addEventListener('click', () => {
  adjustLayerHeight('road', -0.015);
});

landUpBtn.addEventListener('click', () => {
  adjustLayerHeight('land', 0.015);
});

landDownBtn.addEventListener('click', () => {
  adjustLayerHeight('land', -0.015);
});

splitDownBtn.addEventListener('click', () => {
  adjustBuildingSplit(-0.03);
});

splitUpBtn.addEventListener('click', () => {
  adjustBuildingSplit(0.03);
});

heightResetBtn.addEventListener('click', () => {
  layerHeightOffset = {
    land: defaultLayerHeightOffset.land,
    road: defaultLayerHeightOffset.road,
    building: defaultLayerHeightOffset.building,
    other: defaultLayerHeightOffset.other
  };

  buildingSplitRatio = 0.18;

  extractMeshesToProxy(true);
});

rotateBtn.addEventListener('click', () => {
  yawMode = (yawMode + 1) % 2;
  updateProxyRotation();
  applyRootTransform();

  statusEl.textContent =
    'モデルをZ軸で180度回転しました。\n' +
    '現在: ' + (yawMode % 2 === 0 ? '0度' : '180度');
});

angleBtn.addEventListener('click', () => {
  angleMode = (angleMode + 1) % angleModes.length;

  const mode = angleModes[angleMode];

  currentY = mode.y;
  currentZ = mode.z;

  updateProxyRotation();
  applyRootTransform();

  statusEl.textContent =
    '角度を切り替えました。\n' +
    '現在: ' + mode.name;
});

colorBtn.addEventListener('click', () => {
  colorMode = (colorMode + 1) % colorSets.length;
  extractMeshesToProxy(true);
});

resetBtn.addEventListener('click', () => {
  rootScale = 1.0;
  currentX = 0.0;
  yawMode = 0;
  angleMode = 0;

  // 重要：表側を見るためX軸180度反転、ただし角度は0度で平行
  baseFlipXDeg = 180;

  buildingSplitRatio = 0.18;

  layerHeightOffset = {
    land: defaultLayerHeightOffset.land,
    road: defaultLayerHeightOffset.road,
    building: defaultLayerHeightOffset.building,
    other: defaultLayerHeightOffset.other
  };

  const mode = angleModes[angleMode];
  currentY = mode.y;
  currentZ = mode.z;

  extractMeshesToProxy(false);

  statusEl.textContent =
    '表示リセットしました。\n' +
    '地面を表側から見るため、X軸180度反転を標準にしています。\n' +
    '初期角度は0度なので、名刺面と地面は平行表示です。';
});

markerEl.addEventListener('targetFound', () => {
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'block';

  modelRoot.setAttribute('visible', 'true');
  modelBounds.setAttribute('visible', 'false');
  debugBox.setAttribute('visible', 'false');

  if (!proxyGroup && modelLoaded) {
    extractMeshesToProxy(false);
  }

  statusEl.textContent =
    '潮見ジオラマを発見しました。\n' +
    'X軸180度反転＋平行表示で、地面の表側を見る想定です。\n' +
    '向きが逆の場合は「180度回転」、建物抽出が弱い場合は「建物判定－」を押してください。';

  setTimeout(() => {
    foundBanner.style.display = 'none';
  }, 2000);
});

markerEl.addEventListener('targetLost', () => {
  if (!arStarted) return;

  foundBanner.style.display = 'none';
  targetGuide.style.display = 'block';

  statusEl.textContent =
    'マーカーを見失いました。\n' +
    '中央に入れてください。';
});

async function waitForMindARSystem() {
  for (let i = 0; i < 50; i++) {
    const sys = sceneEl.systems['mindar-image-system'];
    if (sys) return sys;
    await new Promise(r => setTimeout(r, 200));
  }
  return null;
}

startBtn.addEventListener('click', async () => {
  try {
    if (!window.isSecureContext) {
      statusEl.textContent =
        'HTTPSではありません。\n' +
        'https:// のURLで開いてください。';
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      statusEl.textContent =
        'このブラウザではカメラAPIが使えません。\n' +
        'iPhoneはSafari、AndroidはChromeで開いてください。';
      return;
    }

    if (!sceneLoaded) {
      statusEl.textContent =
        'ARシーンの読み込みがまだ完了していません。\n' +
        '少し待ってから開始してください。';
      return;
    }

    const mindar = await waitForMindARSystem();

    if (!mindar) {
      statusEl.textContent =
        'MindARシステムが見つかりません。\n' +
        'scriptタグを確認してください。';
      return;
    }

    targetGuide.style.display = 'block';
    statusEl.textContent =
      'カメラを起動しています。\n' +
      'カメラ許可をしてください。';

    await mindar.start();

    arStarted = true;

    statusEl.textContent =
      '探索中です。\n' +
      'マーカーを画面中央に入れてください。';

  } catch (err) {
    console.error(err);

    statusEl.textContent =
      'カメラ開始に失敗しました。\n' +
      (err.message || String(err));
  }
});

stopBtn.addEventListener('click', () => {
  const sys = sceneEl.systems['mindar-image-system'];

  if (sys) {
    sys.stop();
  }

  arStarted = false;
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'none';

  statusEl.textContent = '停止しました。';
});

checkBtn.addEventListener('click', () => {
  const mindar = sceneEl.systems['mindar-image-system'];
  const counts = countSourceMeshes();

  let proxyChildren = 0;

  if (proxyGroup) {
    proxyChildren = proxyGroup.children.length;
  }

  statusEl.textContent =
    '状態確認\n' +
    'HTTPS: ' + window.isSecureContext + '\n' +
    'sceneLoaded: ' + sceneLoaded + '\n' +
    'MindAR: ' + Boolean(mindar) + '\n' +
    'modelLoaded: ' + modelLoaded + '\n' +
    'source childCount: ' + counts.childCount + '\n' +
    'source meshCount: ' + counts.meshCount + '\n' +
    'source visibleMeshCount: ' + counts.visibleMeshCount + '\n' +
    'proxyGroup: ' + Boolean(proxyGroup) + '\n' +
    'proxy children: ' + proxyChildren + '\n' +
    'rootScale: ' + rootScale.toFixed(3) + '\n' +
    'innerScale: ' + innerScale.toFixed(4) + '\n' +
    'X: ' + currentX.toFixed(3) + '\n' +
    'Y: ' + currentY.toFixed(3) + '\n' +
    'Z: ' + currentZ.toFixed(3) + '\n' +
    '角度: ' + angleModes[angleMode].name + '\n' +
    '建物判定: ' + buildingSplitRatio.toFixed(2) + '\n' +
    '土地高さ: ' + layerHeightOffset.land.toFixed(3) + '\n' +
    '道路高さ: ' + layerHeightOffset.road.toFixed(3) + '\n' +
    '建物高さ: ' + layerHeightOffset.building.toFixed(3) + '\n' +
    'X軸反転: ' + baseFlipXDeg + '度\n' +
    '回転: ' + (yawMode % 2 === 0 ? '0度' : '180度') + '\n' +
    'box size: ' + boxSizeText + '\n' +
    'box center: ' + boxCenterText;
});
