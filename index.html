<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>潮見ジオラマ AR 強制表示版</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- A-Frame Extras -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

video {
  position:fixed !important;
  top:0 !important;
  left:0 !important;
  width:100vw !important;
  height:100vh !important;
  object-fit:cover !important;
  z-index:0 !important;
}

canvas.a-canvas {
  position:fixed !important;
  top:0 !important;
  left:0 !important;
  width:100vw !important;
  height:100vh !important;
  z-index:1 !important;
  background:transparent !important;
}

a-scene {
  position:fixed !important;
  inset:0 !important;
  width:100% !important;
  height:100% !important;
  z-index:1 !important;
  background:transparent !important;
}

#ui {
  position:fixed;
  inset:0;
  z-index:20;
  pointer-events:none;
}

#topPanel {
  position:fixed;
  top:12px;
  left:12px;
  right:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  pointer-events:auto;
}

button {
  border:none;
  border-radius:999px;
  padding:10px 14px;
  font-size:14px;
  font-weight:700;
  color:#111;
  background:rgba(255,255,255,0.94);
  box-shadow:0 3px 12px rgba(0,0,0,0.3);
}

button:active {
  transform:scale(0.97);
}

#startBtn {
  background:#c40000;
  color:#fff;
}

#stopBtn {
  background:#333;
  color:#fff;
}

#status {
  position:fixed;
  left:12px;
  right:12px;
  bottom:16px;
  color:#fff;
  background:rgba(0,0,0,0.78);
  border-radius:14px;
  padding:10px 12px;
  font-size:13px;
  line-height:1.5;
  white-space:pre-wrap;
  pointer-events:none;
}

#targetGuide {
  position:fixed;
  left:50%;
  top:52%;
  transform:translate(-50%, -50%);
  width:70vw;
  max-width:360px;
  aspect-ratio:2 / 3;
  border:3px dashed rgba(255,255,255,0.82);
  border-radius:16px;
  display:none;
  pointer-events:none;
}

#targetGuide::after {
  content:"マーカーをこの枠に合わせてください";
  position:absolute;
  left:0;
  right:0;
  bottom:-34px;
  text-align:center;
  color:#fff;
  font-size:13px;
  text-shadow:0 2px 5px rgba(0,0,0,0.8);
}

#foundBanner {
  position:fixed;
  top:74px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 18px;
  border-radius:999px;
  background:rgba(196,0,0,0.94);
  color:#fff;
  font-size:15px;
  font-weight:800;
  box-shadow:0 4px 14px rgba(0,0,0,0.35);
  display:none;
  pointer-events:none;
}
</style>

<script>
AFRAME.registerComponent('force-show-gltf', {
  schema: {
    desiredSize: { type: 'number', default: 0.75 }
  },

  init: function () {
    this.modelEl = this.el.querySelector('#shiomi');
    this.statusEl = document.querySelector('#status');
    this.modelBounds = document.querySelector('#modelBounds');

    this.modelEl.addEventListener('model-loaded', () => {
      setTimeout(() => {
        this.forceFit();
      }, 300);
    });

    this.modelEl.addEventListener('model-error', (e) => {
      console.error('model-error', e);
      this.statusEl.textContent =
        'GLBの読み込みに失敗しました。\n' +
        'shiomi_city.glb が index.html と同じフォルダにあるか確認してください。';
    });
  },

  forceFit: function () {
    const THREE = AFRAME.THREE;
    const obj = this.modelEl.getObject3D('mesh') || this.modelEl.object3D;

    if (!obj) {
      this.statusEl.textContent =
        'GLBのオブジェクトが取得できません。\n' +
        'ファイル名またはGLB形式を確認してください。';
      return;
    }

    // まず全部見える状態に強制
    obj.traverse((node) => {
      node.visible = true;
      node.frustumCulled = false;

      if (node.isMesh) {
        node.visible = true;
        node.frustumCulled = false;

        if (node.material) {
          const materials = Array.isArray(node.material) ? node.material : [node.material];

          materials.forEach((mat) => {
            mat.side = THREE.DoubleSide;
            mat.transparent = false;
            mat.opacity = 1.0;
            mat.depthTest = true;
            mat.depthWrite = true;

            // 色が黒すぎる・材質が特殊な場合に備えて少し明るくする
            if (mat.color) {
              const c = mat.color;
              const tooDark = c.r < 0.05 && c.g < 0.05 && c.b < 0.05;
              if (tooDark) {
                mat.color.set('#dddddd');
              }
            }

            mat.needsUpdate = true;
          });
        }
      }
    });

    // 一度リセット
    this.modelEl.object3D.position.set(0, 0, 0);
    this.modelEl.object3D.rotation.set(0, Math.PI, 0);
    this.modelEl.object3D.scale.set(1, 1, 1);

    obj.updateMatrixWorld(true);

    const box = new THREE.Box3().setFromObject(obj);
    const size = new THREE.Vector3();
    const center = new THREE.Vector3();

    box.getSize(size);
    box.getCenter(center);

    const maxDim = Math.max(size.x, size.y, size.z);

    if (!isFinite(maxDim) || maxDim <= 0) {
      this.statusEl.textContent =
        'GLBサイズを取得できませんでした。\n' +
        '手動表示に切り替えます。';

      this.modelEl.object3D.position.set(0, 0, 0);
      this.modelEl.object3D.scale.set(0.5, 0.5, 0.5);
      this.el.object3D.position.set(0, 0, 0.35);
      return;
    }

    const desiredSize = this.data.desiredSize;
    let scale = desiredSize / maxDim;

    // 極端なスケールを防止
    scale = Math.max(0.001, Math.min(50, scale));

    // モデルの中心を原点へ移動
    this.modelEl.object3D.position.set(
      -center.x * scale,
      -center.y * scale,
      -center.z * scale
    );

    this.modelEl.object3D.scale.set(scale, scale, scale);

    // マーカー面よりかなり手前に出す
    this.el.object3D.position.set(0, 0, 0.35);

    // ワイヤー箱をモデルの想定表示範囲として出す
    if (this.modelBounds) {
      this.modelBounds.setAttribute('visible', 'true');
      this.modelBounds.setAttribute('position', '0 0 0');
      this.modelBounds.setAttribute('width', desiredSize);
      this.modelBounds.setAttribute('height', desiredSize);
      this.modelBounds.setAttribute('depth', desiredSize);
    }

    this.statusEl.textContent =
      'GLBを強制表示位置へ移動しました。\n' +
      '赤い箱＝AR基準点\n' +
      '水色ワイヤー箱＝モデル表示範囲\n' +
      'maxDim: ' + maxDim.toFixed(4) + '\n' +
      'scale: ' + scale.toFixed(4) + '\n' +
      'モデルが水色箱内に見えるか確認してください。';
  }
});
</script>
</head>

<body>
<div id="ui">
  <div id="topPanel">
    <button id="startBtn">開始</button>
    <button id="stopBtn">停止</button>
    <button id="largerBtn">＋</button>
    <button id="smallerBtn">－</button>
    <button id="frontBtn">前へ</button>
    <button id="backBtn">奥へ</button>
    <button id="upBtn">上へ</button>
    <button id="downBtn">下へ</button>
    <button id="resetBtn">見える位置へ戻す</button>
    <button id="checkBtn">確認</button>
  </div>

  <div id="foundBanner">潮見ジオラマを発見！</div>
  <div id="targetGuide"></div>
  <div id="status">初期化中です。</div>
</div>

<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; maxTrack: 1; filterMinCF: 0.001; filterBeta: 0.01;"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true; preserveDrawingBuffer: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets timeout="30000">
    ./shiomi_city.glb</a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="markerTarget" mindar-image-target="targetIndex: 0">

    <!-- 光源 -->
    <a-light type="ambient" intensity="2.2"></a-light>
    <a-light type="directional" intensity="2.2" position="0 1 2"></a-light>
    <a-light type="point" intensity="1.6" position="0 0 1"></a-light>

    <!-- 赤い箱：AR基準点。これが見えているならAR描画は成功 -->
    <a-box
      id="debugBox"
      position="0 0 0.08"
      width="0.07"
      height="0.07"
      depth="0.07"
      color="#ff0000">
    </a-box>

    <!-- モデル親。ここを動かす -->
    <a-entity
      id="modelRoot"
      position="0 0 0.35"
      rotation="0 0 0"
      scale="1 1 1"
      force-show-gltf="desiredSize: 0.75;">

      <!-- 水色ワイヤー箱：モデルが入る想定範囲 -->
      <a-box
        id="modelBounds"
        visible="true"
        position="0 0 0"
        width="0.75"
        height="0.75"
        depth="0.75"
        material="color: #00ffff; wireframe: true; transparent: true; opacity: 0.9;">
      </a-box>

      <!-- GLB本体 -->
      <a-entity
        id="shiomi"
        gltf-model="#shiomiModelAsset"
        position="0 0 0"
        rotation="0 180 0"
        scale="1 1 1"
        animation-mixer>
      </a-entity>

    </a-entity>

    <a-text
      value="潮見ジオラマ"
      align="center"
      color="#FFEEAA"
      position="0 0.75 0.10"
      scale="0.55 0.55 0.55">
    </a-text>

  </a-entity>
</a-scene>

<script>
const sceneEl = document.querySelector('#arScene');
const markerEl = document.querySelector('#markerTarget');
const modelRoot = document.querySelector('#modelRoot');
const modelEl = document.querySelector('#shiomi');
const debugBox = document.querySelector('#debugBox');
const modelBounds = document.querySelector('#modelBounds');

const startBtn = document.querySelector('#startBtn');
const stopBtn = document.querySelector('#stopBtn');
const largerBtn = document.querySelector('#largerBtn');
const smallerBtn = document.querySelector('#smallerBtn');
const frontBtn = document.querySelector('#frontBtn');
const backBtn = document.querySelector('#backBtn');
const upBtn = document.querySelector('#upBtn');
const downBtn = document.querySelector('#downBtn');
const resetBtn = document.querySelector('#resetBtn');
const checkBtn = document.querySelector('#checkBtn');

const statusEl = document.querySelector('#status');
const targetGuide = document.querySelector('#targetGuide');
const foundBanner = document.querySelector('#foundBanner');

let sceneLoaded = false;
let modelLoaded = false;
let arStarted = false;

let currentRootScale = 1.0;
let currentZ = 0.35;
let currentY = 0.0;
let currentX = 0.0;

window.addEventListener('load', () => {
  statusEl.textContent = 'ページを読み込みました。\n開始ボタンを押してください。';
});

sceneEl.addEventListener('loaded', () => {
  sceneLoaded = true;
  statusEl.textContent = 'A-Frameシーンを読み込みました。\n開始できます。';
});

modelEl.addEventListener('model-loaded', () => {
  modelLoaded = true;
  statusEl.textContent = 'GLBを読み込みました。\n表示位置を自動調整しています。';
});

modelEl.addEventListener('model-error', (e) => {
  console.error(e);
  modelLoaded = false;
  statusEl.textContent =
    'GLBの読み込みに失敗しました。\n' +
    'shiomi_city.glb が index.html と同じフォルダにあるか確認してください。';
});

function applyRootTransform() {
  modelRoot.object3D.position.set(currentX, currentY, currentZ);
  modelRoot.object3D.scale.set(currentRootScale, currentRootScale, currentRootScale);

  statusEl.textContent =
    '表示調整中です。\n' +
    'root scale: ' + currentRootScale.toFixed(3) + '\n' +
    'X: ' + currentX.toFixed(3) + '\n' +
    'Y: ' + currentY.toFixed(3) + '\n' +
    'Z: ' + currentZ.toFixed(3);
}

largerBtn.addEventListener('click', () => {
  currentRootScale = Math.min(20, currentRootScale * 1.25);
  applyRootTransform();
});

smallerBtn.addEventListener('click', () => {
  currentRootScale = Math.max(0.01, currentRootScale / 1.25);
  applyRootTransform();
});

frontBtn.addEventListener('click', () => {
  currentZ += 0.10;
  applyRootTransform();
});

backBtn.addEventListener('click', () => {
  currentZ -= 0.10;
  applyRootTransform();
});

upBtn.addEventListener('click', () => {
  currentY += 0.10;
  applyRootTransform();
});

downBtn.addEventListener('click', () => {
  currentY -= 0.10;
  applyRootTransform();
});

resetBtn.addEventListener('click', () => {
  currentRootScale = 1.0;
  currentX = 0.0;
  currentY = 0.0;
  currentZ = 0.35;

  modelRoot.object3D.position.set(currentX, currentY, currentZ);
  modelRoot.object3D.scale.set(1, 1, 1);

  const comp = modelRoot.components['force-show-gltf'];
  if (comp) {
    comp.forceFit();
  }

  statusEl.textContent = '強制表示位置へ戻しました。';
});

/* targetFound / targetLost */
markerEl.addEventListener('targetFound', () => {
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'block';

  debugBox.setAttribute('visible', 'true');
  modelRoot.setAttribute('visible', 'true');
  modelBounds.setAttribute('visible', 'true');

  statusEl.textContent =
    '潮見ジオラマを発見しました。\n' +
    '赤い箱と水色ワイヤー箱が見えているか確認してください。\n' +
    '水色箱が見えてモデルが見えない場合、GLB材質またはGLB内部構造の問題です。';

  setTimeout(() => {
    foundBanner.style.display = 'none';
  }, 2000);
});

markerEl.addEventListener('targetLost', () => {
  if (!arStarted) return;

  foundBanner.style.display = 'none';
  targetGuide.style.display = 'block';
  statusEl.textContent = 'マーカーを見失いました。中央に入れてください。';
});

/* MindAR 起動 */
async function waitForMindARSystem() {
  for (let i = 0; i < 50; i++) {
    const sys = sceneEl.systems['mindar-image-system'];
    if (sys) return sys;
    await new Promise(r => setTimeout(r, 200));
  }
  return null;
}

startBtn.addEventListener('click', async () => {
  try {
    if (!window.isSecureContext) {
      statusEl.textContent =
        'HTTPSではありません。\n' +
        'GitHub Pages等の https:// のURLで開いてください。';
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      statusEl.textContent =
        'このブラウザではカメラAPIが使えません。\n' +
        'iPhoneはSafari、AndroidはChromeで開いてください。';
      return;
    }

    if (!sceneLoaded) {
      statusEl.textContent =
        'ARシーンの読み込みがまだ完了していません。\n' +
        '少し待ってから再度開始してください。';
      return;
    }

    const mindar = await waitForMindARSystem();

    if (!mindar) {
      statusEl.textContent =
        'MindARシステムが見つかりません。\n' +
        'A-Frame / MindAR のscriptタグを確認してください。';
      return;
    }

    targetGuide.style.display = 'block';
    statusEl.textContent = 'カメラを起動しています。許可してください。';

    await mindar.start();

    arStarted = true;

    statusEl.textContent =
      '探索中です。\n' +
      'マーカーを画面中央に入れてください。';

  } catch (err) {
    console.error(err);
    statusEl.textContent =
      'カメラ開始に失敗しました。\n' +
      (err.message || String(err));
  }
});

stopBtn.addEventListener('click', () => {
  const sys = sceneEl.systems['mindar-image-system'];

  if (sys) {
    sys.stop();
  }

  arStarted = false;
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'none';

  statusEl.textContent = '停止しました。';
});

checkBtn.addEventListener('click', () => {
  const mindar = sceneEl.systems['mindar-image-system'];
  const obj = modelEl.getObject3D('mesh') || modelEl.object3D;

  let meshCount = 0;
  let visibleMeshCount = 0;

  if (obj) {
    obj.traverse((node) => {
      if (node.isMesh) {
        meshCount++;
        if (node.visible) visibleMeshCount++;
      }
    });
  }

  statusEl.textContent =
    '状態確認\n' +
    'HTTPS: ' + window.isSecureContext + '\n' +
    'sceneLoaded: ' + sceneLoaded + '\n' +
    'MindAR: ' + Boolean(mindar) + '\n' +
    'modelLoaded: ' + modelLoaded + '\n' +
    'GLB object: ' + Boolean(obj) + '\n' +
    'meshCount: ' + meshCount + '\n' +
    'visibleMeshCount: ' + visibleMeshCount + '\n' +
    'root scale: ' + currentRootScale.toFixed(3) + '\n' +
    'Y: ' + currentY.toFixed(3) + '\n' +
    'Z: ' + currentZ.toFixed(3);
});
</script>

</body>
</html>
