<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no" />
  <title>潮見ジオラマ AR（名刺サイズ 初期・拡大対応・安定化・デバッグ）</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- GLBアニメーション補助 -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>

  <!-- MindAR (image tracking) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    video { position:fixed !important; top:0 !important; left:0 !important; width:100vw !important; height:100vh !important; object-fit:cover !important; z-index:0 !important; }
    canvas.a-canvas { position:fixed !important; top:0 !important; left:0 !important; width:100vw !important; height:100vh !important; z-index:1 !important; background:transparent !important; }
    a-scene { position:fixed !important; inset:0 !important; width:100% !important; height:100% !important; z-index:1 !important; background:transparent !important; }

    #ui { position:fixed; inset:0; z-index:20; pointer-events:none; }
    #topPanel { position:fixed; top:12px; left:12px; right:12px; z-index:30; display:flex; gap:8px; pointer-events:auto; flex-wrap:wrap; }
    button { border:none; border-radius:999px; padding:10px 14px; font-size:14px; font-weight:700; color:#111; background:rgba(255,255,255,0.94); box-shadow:0 3px 12px rgba(0,0,0,0.3); }
    button:active { transform:scale(0.97); }
    #startBtn { background:#c40000; color:#fff; }
    #stopBtn { background:#333; color:#fff; }
    #largerBtn,#smallerBtn,#rotLBtn,#rotRBtn { background:#fff; color:#111; }
    #status { position:fixed; left:12px; right:12px; bottom:16px; z-index:30; color:#fff; background:rgba(0,0,0,0.74); border-radius:14px; padding:10px 12px; font-size:13px; line-height:1.5; white-space:pre-wrap; pointer-events:none; max-height:40vh; overflow:auto; }
    #targetGuide { position:fixed; left:50%; top:52%; transform:translate(-50%,-50%); width:70vw; max-width:360px; aspect-ratio:2/3; z-index:25; border:3px dashed rgba(255,255,255,0.82); border-radius:16px; pointer-events:none; display:none; }
    #foundBanner { position:fixed; top:74px; left:50%; transform:translateX(-50%); z-index:35; padding:10px 18px; border-radius:999px; background:rgba(196,0,0,0.94); color:#fff; font-size:15px; font-weight:800; box-shadow:0 4px 14px rgba(0,0,0,0.35); display:none; pointer-events:none; }
    #debugLog { position:fixed; right:12px; top:12px; z-index:40; background:rgba(0,0,0,0.6); color:#fff; padding:8px; border-radius:8px; font-size:12px; max-width:36vw; max-height:40vh; overflow:auto; display:none; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="topPanel">
      <button id="startBtn">カメラ開始</button>
      <button id="stopBtn">停止</button>
      <button id="largerBtn">大きく</button>
      <button id="smallerBtn">小さく</button>
      <button id="rotLBtn">左回転</button>
      <button id="rotRBtn">右回転</button>
      <button id="checkBtn">確認</button>
    </div>

    <div id="foundBanner">潮見ジオラマを発見！</div>
    <div id="targetGuide"></div>
    <div id="status">初期化中です。確認ボタンで .mind と .glb の状態をチェックしてください。</div>
    <div id="debugLog" aria-hidden="true"></div>
  </div>

  <!-- MindAR + A-Frame シーン -->
  <!-- imageTargetSrc を実際の .mind ファイル名（名刺）に合わせてください -->
  <a-scene
    id="arScene"
    mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true; preserveDrawingBuffer: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="markerTarget" mindar-image-target="targetIndex: 0">
      <a-light type="ambient" intensity="1.0"></a-light>
      <a-light type="directional" intensity="1.2" position="0 1 1"></a-light>

      <!-- 初期は非表示。自動フィット後、検出時に visible=true にする -->
      <a-entity
        id="shiomi"
        visible="false"
        gltf-model="url(./shiomi_city.glb)"
        position="0 0 0"
        rotation="0 180 0"
        scale="1 1 1"
        animation-mixer>
      </a-entity>

      <a-text value="潮見ジオラマ" align="center" color="#FFEEAA" position="0 0.75 0.05" scale="0.55 0.55 0.55"></a-text>
    </a-entity>
  </a-scene>

  <script>
    // -------------------------
    // 要素参照と状態
    // -------------------------
    const sceneEl = document.querySelector('#arScene');
    const markerEl = document.querySelector('#markerTarget');
    const modelEl = document.querySelector('#shiomi');

    const startBtn = document.querySelector('#startBtn');
    const stopBtn = document.querySelector('#stopBtn');
    const largerBtn = document.querySelector('#largerBtn');
    const smallerBtn = document.querySelector('#smallerBtn');
    const rotLBtn = document.querySelector('#rotLBtn');
    const rotRBtn = document.querySelector('#rotRBtn');
    const checkBtn = document.querySelector('#checkBtn');

    const statusEl = document.querySelector('#status');
    const targetGuide = document.querySelector('#targetGuide');
    const foundBanner = document.querySelector('#foundBanner');
    const debugLogEl = document.querySelector('#debugLog');

    let sceneLoaded = false;
    let modelLoaded = false;
    let arStarted = false;
    let currentScale = 1.0;
    let currentYRotation = 0;
    let initialScale = undefined;

    // 名刺サイズ基準（幅）: 約 91mm -> 0.091m。少し余裕を持たせて 0.09m
    const TARGET_SIZE_M = 0.09;

    // 平滑化パラメータ（0〜1。小さいほど揺れ抑制）
    const POSITION_LERP = 0.12;
    const QUAT_SLERP = 0.12;

    // ピンチ操作制限
    const MIN_SCALE = 0.02;
    const MAX_SCALE = 6.0;
    let lastTouchDist = null;
    let lastTap = 0;

    // three.js 一時変数
    let THREE, tempBox, tempSize, tempCenter;

    // デバッグログ表示
    function debugLog(msg, level='info') {
      console[level === 'error' ? 'error' : 'log']('[debug] ' + msg);
      debugLogEl.style.display = 'block';
      const p = document.createElement('div');
      p.textContent = msg;
      p.style.marginBottom = '6px';
      if (level === 'error') p.style.color = '#ff8080';
      debugLogEl.appendChild(p);
      // keep scroll at bottom
      debugLogEl.scrollTop = debugLogEl.scrollHeight;
    }

    // -------------------------
    // 初期表示メッセージ
    // -------------------------
    window.addEventListener('load', () => {
      statusEl.textContent = 'ページ読み込み完了。確認ボタンで .mind と .glb のHTTPステータスをチェックしてください。';
    });

    sceneEl.addEventListener('loaded', () => {
      sceneLoaded = true;
      statusEl.textContent = 'A-Frameシーン読み込み完了。';
      THREE = AFRAME.THREE;
      tempBox = new THREE.Box3();
      tempSize = new THREE.Vector3();
      tempCenter = new THREE.Vector3();
      debugLog('A-Frame and THREE ready');
    });

    // -------------------------
    // 事前チェック（.mind と .glb の HEAD と GET） - 詳細ログ
    // -------------------------
    async function preflightCheck() {
      const files = ['./marker.mind', './shiomi_city.glb'];
      let msg = '';
      for (const f of files) {
        try {
          const res = await fetch(f, { method: 'HEAD', cache: 'no-store' });
          msg += `${f} : HTTP ${res.status}\n`;
          const size = res.headers.get('content-length');
          if (size) msg += `  size: ${(Number(size)/1024/1024).toFixed(2)} MB\n`;
          debugLog(`${f} HEAD status ${res.status} size ${size || 'unknown'}`);
          // If HEAD succeeded but content-length missing, try GET small range
          if (res.status === 200 && !size && f.endsWith('.glb')) {
            try {
              const r2 = await fetch(f, { method: 'GET', cache: 'no-store' });
              const buf = await r2.arrayBuffer();
              msg += `  GET bytes: ${buf.byteLength}\n`;
              debugLog(`${f} GET bytes ${buf.byteLength}`);
            } catch (e) {
              msg += `  GET failed: ${e.message}\n`;
              debugLog(`${f} GET failed: ${e.message}`, 'error');
            }
          }
        } catch (e) {
          msg += `${f} : fetch失敗 (${e.message})\n`;
          debugLog(`${f} HEAD fetch failed: ${e.message}`, 'error');
        }
      }
      statusEl.textContent = msg;
      return msg;
    }

    checkBtn.addEventListener('click', preflightCheck);

    // -------------------------
    // GLTFLoader デバッグ読み込み（詳細エラー取得）
    // -------------------------
    async function debugLoadGLB() {
      try {
        if (!THREE) {
          debugLog('THREE not ready yet', 'error');
          return;
        }
        debugLog('Starting GLTFLoader test for ./shiomi_city.glb');
        // dynamic import of GLTFLoader module
        const module = await import('https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/loaders/GLTFLoader.js');
        const GLTFLoader = module.GLTFLoader;
        const loader = new GLTFLoader();
        loader.load(
          './shiomi_city.glb',
          (gltf) => {
            debugLog('GLTFLoader: load OK');
            debugLog('gltf.scene children: ' + (gltf.scene ? gltf.scene.children.length : 0));
          },
          (xhr) => {
            if (xhr && xhr.total) {
              debugLog('GLTFLoader: progress ' + ((xhr.loaded / xhr.total) * 100).toFixed(1) + '%');
            } else {
              debugLog('GLTFLoader: progress loaded ' + xhr.loaded);
            }
          },
          (err) => {
            debugLog('GLTFLoader: error - see console', 'error');
            console.error('GLTFLoader error detail:', err);
            statusEl.textContent = 'GLTFLoader エラーが発生しました。コンソールを確認してください。';
          }
        );
      } catch (e) {
        debugLog('GLTFLoader import/load failed: ' + e.message, 'error');
        console.error(e);
      }
    }

    // -------------------------
    // 自動フィット（名刺サイズ基準）と底面合わせ
    // -------------------------
    function autoFitModel() {
      try {
        const obj = modelEl.getObject3D('mesh') || modelEl.getObject3D('scene') || modelEl.getObject3D('gltf');
        if (!obj) {
          debugLog('autoFit: three object not found', 'error');
          return;
        }

        // バウンディングボックス（読み込み時のローカル座標）
        tempBox.setFromObject(obj);
        tempBox.getSize(tempSize);
        tempBox.getCenter(tempCenter);

        const maxDim = Math.max(tempSize.x, tempSize.y, tempSize.z);
        if (maxDim === 0) {
          debugLog('autoFit: model maxDim is 0', 'error');
          return;
        }

        // 現在の scale 属性を取得
        const curScaleAttr = modelEl.getAttribute('scale') || '1 1 1';
        const curScaleArr = curScaleAttr.split(' ').map(Number);
        const curUniform = curScaleArr[0] || 1;

        // 必要な均一スケール
        const requiredUniform = (TARGET_SIZE_M / maxDim) * curUniform;
        const margin = 0.95;
        const finalScale = requiredUniform * margin;

        // 適用
        modelEl.setAttribute('scale', `${finalScale} ${finalScale} ${finalScale}`);
        currentScale = finalScale;

        // 底面をY=0に揃える（スケールを考慮）
        const bottomY = tempBox.min.y;
        const yOffset = -bottomY * finalScale;
        const xOffset = -tempCenter.x * finalScale;
        const zOffset = -tempCenter.z * finalScale;

        modelEl.setAttribute('position', `${xOffset.toFixed(4)} ${yOffset.toFixed(4)} ${zOffset.toFixed(4)}`);

        // 向き合わせ：モデルのローカル上方向をワールド上向きに合わせる（X/Zを0に）
        const rot = modelEl.getAttribute('rotation') || { x:0, y:180, z:0 };
        modelEl.setAttribute('rotation', `0 ${rot.y} 0`);

        // 初期スケールを保存（ダブルタップでリセット）
        initialScale = currentScale;

        debugLog('autoFit applied: finalScale=' + finalScale.toFixed(4) + ' pos=' + xOffset.toFixed(4) + ',' + yOffset.toFixed(4) + ',' + zOffset.toFixed(4));
        statusEl.textContent = 'モデル自動フィット完了。名刺サイズで初期表示します。';
      } catch (e) {
        debugLog('autoFit error: ' + e.message, 'error');
        console.error(e);
        statusEl.textContent = '自動フィットでエラーが発生しました。コンソールを確認してください。';
      }
    }

    // model-loaded イベント
    modelEl.addEventListener('model-loaded', () => {
      modelLoaded = true;
      statusEl.textContent = 'GLB読み込み完了（非表示）。マーカー検出で表示します。';
      debugLog('model-loaded event fired');
      // 少し待ってから自動フィット
      setTimeout(autoFitModel, 150);
      // run GLTFLoader debug to get more info if needed
      setTimeout(debugLoadGLB, 300);
    });

    modelEl.addEventListener('model-error', (e) => {
      console.error('model-error', e.detail);
      modelLoaded = false;
      debugLog('model-error: ' + JSON.stringify(e.detail || {}), 'error');
      statusEl.textContent = 'GLBの読み込みに失敗しました。ファイル名・パス・大文字小文字・ファイルサイズを確認してください。';
    });

    // -------------------------
    // スケール・回転操作（UI）
    // -------------------------
    function setScale(value) {
      currentScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, value));
      modelEl.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
      statusEl.textContent = 'モデル scale: ' + currentScale.toFixed(2);
    }
    largerBtn.addEventListener('click', () => setScale(currentScale + 0.05));
    smallerBtn.addEventListener('click', () => setScale(currentScale - 0.05));

    function rotateY(deltaDeg) {
      currentYRotation = (currentYRotation + deltaDeg) % 360;
      modelEl.setAttribute('rotation', `0 ${currentYRotation} 0`);
      statusEl.textContent = 'モデル rotationY: ' + currentYRotation.toFixed(0) + '°';
    }
    rotLBtn.addEventListener('click', () => rotateY(-10));
    rotRBtn.addEventListener('click', () => rotateY(10));

    // -------------------------
    // MindAR system を待つユーティリティ
    // -------------------------
    async function waitForMindARSystem() {
      for (let i=0;i<50;i++) {
        const sys = sceneEl.systems['mindar-image-system'];
        if (sys) return sys;
        await new Promise(r => setTimeout(r,200));
      }
      return null;
    }

    // -------------------------
    // カメラ開始 / 停止（エラー詳細を表示）
    // -------------------------
    startBtn.addEventListener('click', async () => {
      try {
        if (!window.isSecureContext) {
          statusEl.textContent = 'HTTPSではありません。GitHub Pagesの https:// で始まるURLで開いてください。';
          debugLog('Not secure context (HTTPS required)', 'error');
          return;
        }
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          statusEl.textContent = 'このブラウザではカメラAPIが使えません。Android Chrome 等で開いてください。';
          debugLog('getUserMedia not supported', 'error');
          return;
        }
        if (!sceneLoaded) {
          statusEl.textContent = 'ARシーンの読み込みがまだ完了していません。少し待つか、確認ボタンを押してください。';
          debugLog('scene not loaded yet', 'error');
          return;
        }

        const mindar = await waitForMindARSystem();
        if (!mindar) {
          statusEl.textContent = 'MindARシステムが見つかりません。scriptタグやCDNを確認してください。';
          debugLog('mindar-image-system not found', 'error');
          return;
        }

        // 事前チェック（HEAD/GET）
        await preflightCheck();

        targetGuide.style.display = 'block';
        statusEl.textContent = 'カメラを起動しています。カメラ許可を許可してください。';

        try {
          await mindar.start();
          arStarted = true;
          debugLog('mindar.start() succeeded');
        } catch (startErr) {
          debugLog('mindar.start() failed: ' + (startErr && startErr.message ? startErr.message : String(startErr)), 'error');
          console.error('mindar.start error', startErr);
          statusEl.textContent = 'カメラ開始に失敗しました（mindar.start）。コンソールを確認してください。';
          return;
        }

        // video/canvas の見た目調整
        setTimeout(() => {
          const video = document.querySelector('video');
          const canvas = document.querySelector('canvas');
          if (video) {
            video.style.position='fixed'; video.style.top='0'; video.style.left='0';
            video.style.width='100vw'; video.style.height='100vh'; video.style.objectFit='cover';
            video.style.zIndex='0'; video.style.opacity='1'; video.style.display='block';
          }
          if (canvas) {
            canvas.style.position='fixed'; canvas.style.top='0'; canvas.style.left='0';
            canvas.style.width='100vw'; canvas.style.height='100vh'; canvas.style.zIndex='1';
            canvas.style.background='transparent';
          }
        }, 500);

        statusEl.textContent = '探索中です。名刺（マーカー）を画面中央に入れてください。';
      } catch (err) {
        console.error(err);
        debugLog('startBtn click error: ' + (err && err.message ? err.message : String(err)), 'error');
        statusEl.textContent = 'カメラ開始に失敗しました。\n' + (err && err.message ? err.message : String(err));
      }
    });

    stopBtn.addEventListener('click', () => {
      const sys = sceneEl.systems['mindar-image-system'];
      if (sys) {
        try { sys.stop(); debugLog('mindar.stop() called'); } catch(e){ debugLog('mindar.stop error: '+e.message,'error'); }
      }
      arStarted = false;
      targetGuide.style.display = 'none';
      foundBanner.style.display = 'none';
      statusEl.textContent = '停止しました。';
    });

    // -------------------------
    // マーカー検出イベント（表示制御・ちらつき対策）
    // -------------------------
    markerEl.addEventListener('targetFound', () => {
      targetGuide.style.display = 'none';
      foundBanner.style.display = 'block';

      if (modelLoaded) {
        // 少し遅延して表示（ちらつき軽減）
        setTimeout(() => modelEl.setAttribute('visible', 'true'), 80);
        statusEl.textContent = '潮見ジオラマを発見しました。';
        debugLog('targetFound: model shown');
      } else {
        statusEl.textContent = 'マーカー認識済み。GLB読み込みを確認してください。';
        debugLog('targetFound but model not loaded', 'error');
      }

      setTimeout(()=>{ foundBanner.style.display='none'; }, 2000);
    });

    markerEl.addEventListener('targetLost', () => {
      if (!arStarted) return;
      // 見失ったら非表示にしてちらつきを抑える
      modelEl.setAttribute('visible', 'false');
      foundBanner.style.display = 'none';
      targetGuide.style.display = 'block';
      statusEl.textContent = 'マーカーを見失いました。もう一度中央に入れてください。';
      debugLog('targetLost: model hidden');
    });

    // -------------------------
    // Stabilizer コンポーネント（補間） - マーカーの揺れを抑える
    // -------------------------
    AFRAME.registerComponent('stabilizer', {
      schema: {
        target: { type: 'selector' },
        lerp: { type: 'number', default: POSITION_LERP },
        slerp: { type: 'number', default: QUAT_SLERP }
      },
      init: function() {
        this.targetObj = this.data.target ? this.data.target.object3D : null;
        this.tempPos = new THREE.Vector3();
        this.tempQuat = new THREE.Quaternion();
      },
      tick: function() {
        if (!this.targetObj) return;

        // 目標のワールド位置・回転（マーカーの world）
        const desiredWorldPos = new THREE.Vector3();
        const desiredWorldQuat = new THREE.Quaternion();
        this.targetObj.getWorldPosition(desiredWorldPos);
        this.targetObj.getWorldQuaternion(desiredWorldQuat);

        // 現在の this.el のワールド transform
        const currentWorldPos = new THREE.Vector3();
        const currentWorldQuat = new THREE.Quaternion();
        this.el.object3D.getWorldPosition(currentWorldPos);
        this.el.object3D.getWorldQuaternion(currentWorldQuat);

        // 補間
        currentWorldPos.lerp(desiredWorldPos, this.data.lerp);
        currentWorldQuat.slerp(desiredWorldQuat, this.data.slerp);

        // 親（marker）のローカル座標系に戻す
        const parent = this.el.object3D.parent;
        if (parent) parent.worldToLocal(currentWorldPos);

        // 適用
        this.el.object3D.position.copy(currentWorldPos);
        this.el.object3D.quaternion.copy(currentWorldQuat);
      }
    });

    // attach stabilizer after scene loaded
    sceneEl.addEventListener('loaded', () => {
      modelEl.setAttribute('stabilizer', { target: '#markerTarget', lerp: POSITION_LERP, slerp: QUAT_SLERP });
      debugLog('stabilizer attached to model');
    });

    // -------------------------
    // タッチ操作：ピンチ拡大・ダブルタップで初期サイズにリセット
    // -------------------------
    function touchDistance(e) {
      if (e.touches.length < 2) return 0;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    window.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        lastTouchDist = touchDistance(e);
      } else if (e.touches.length === 1) {
        const now = Date.now();
        if (now - lastTap < 350) {
          // ダブルタップ：初期スケールに戻す（autoFit 後の initialScale を使う）
          if (typeof initialScale !== 'undefined') {
            setScale(initialScale);
            debugLog('doubletap: reset to initialScale ' + initialScale.toFixed(3));
          } else {
            autoFitModel();
            debugLog('doubletap: autoFitModel called');
          }
        }
        lastTap = now;
      }
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && lastTouchDist !== null) {
        const dist = touchDistance(e);
        if (dist > 0) {
          const scaleFactor = dist / lastTouchDist;
          let newScale = currentScale * scaleFactor;
          newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
          setScale(newScale);
          lastTouchDist = dist;
        }
        e.preventDefault();
      }
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) lastTouchDist = null;
    }, { passive: true });

    // -------------------------
    // ページ離脱時クリーンアップ
    // -------------------------
    window.addEventListener('beforeunload', () => {
      const sys = sceneEl.systems['mindar-image-system'];
      if (sys) {
        try { sys.stop(); debugLog('mindar.stop() on unload'); } catch(e){ debugLog('mindar.stop error on unload: '+e.message,'error'); }
      }
    });
  </script>
</body>
