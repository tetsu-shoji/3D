<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>潮見ジオラマ AR 表示優先版</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- A-Frame Extras -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

video {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

canvas.a-canvas {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 1 !important;
  background: transparent !important;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
  z-index: 1 !important;
  background: transparent !important;
}

#ui {
  position: fixed;
  inset: 0;
  z-index: 20;
  pointer-events: none;
}

#topPanel {
  position: fixed;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  pointer-events: auto;
}

button {
  border: none;
  border-radius: 999px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 700;
  color: #111;
  background: rgba(255,255,255,0.94);
  box-shadow: 0 3px 12px rgba(0,0,0,0.3);
}

button:active {
  transform: scale(0.97);
}

#startBtn {
  background: #c40000;
  color: #fff;
}

#stopBtn {
  background: #333;
  color: #fff;
}

#status {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 16px;
  color: #fff;
  background: rgba(0,0,0,0.74);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  pointer-events: none;
}

#targetGuide {
  position: fixed;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%);
  width: 70vw;
  max-width: 360px;
  aspect-ratio: 2 / 3;
  border: 3px dashed rgba(255,255,255,0.82);
  border-radius: 16px;
  display: none;
  pointer-events: none;
}

#targetGuide::after {
  content: "マーカーをこの枠に合わせてください";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -34px;
  text-align: center;
  color: #fff;
  font-size: 13px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.8);
}

#foundBanner {
  position: fixed;
  top: 74px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 18px;
  border-radius: 999px;
  background: rgba(196,0,0,0.94);
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  display: none;
  pointer-events: none;
}
</style>
</head>

<body>
<div id="ui">
  <div id="topPanel">
    <button id="startBtn">開始</button>
    <button id="stopBtn">停止</button>
    <button id="largerBtn">＋</button>
    <button id="smallerBtn">－</button>
    <button id="frontBtn">前へ</button>
    <button id="backBtn">奥へ</button>
    <button id="upBtn">上へ</button>
    <button id="downBtn">下へ</button>
    <button id="checkBtn">確認</button>
  </div>

  <div id="foundBanner">潮見ジオラマを発見！</div>
  <div id="targetGuide"></div>
  <div id="status">初期化中です。</div>
</div>

<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; maxTrack: 1; filterMinCF: 0.001; filterBeta: 0.01;"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true; preserveDrawingBuffer: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets timeout="30000">
    ./shiomi_city.glb</a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="markerTarget" mindar-image-target="targetIndex: 0">

    <!-- 光源 -->
    <a-light type="ambient" intensity="1.4"></a-light>
    <a-light type="directional" intensity="1.8" position="0 1 2"></a-light>

    <!-- 表示確認用：赤い小さい箱。これが見えればAR空間は出ています -->
    <a-box
      id="debugBox"
      position="0 0 0.08"
      depth="0.06"
      height="0.06"
      width="0.06"
      color="#ff0000">
    </a-box>

    <!-- モデル全体の表示位置を管理する親 -->
    <a-entity
      id="modelRoot"
      position="0 0 0.25"
      rotation="0 0 0"
      scale="1 1 1"
      visible="true">

      <!-- GLB本体 -->
      <a-entity
        id="shiomi"
        gltf-model="#shiomiModelAsset"
        position="0 0 0"
        rotation="0 180 0"
        scale="1 1 1"
        animation-mixer>
      </a-entity>

    </a-entity>

    <a-text
      id="titleText"
      value="潮見ジオラマ"
      align="center"
      color="#FFEEAA"
      position="0 0.75 0.08"
      scale="0.55 0.55 0.55">
    </a-text>

  </a-entity>
</a-scene>

<script>
const sceneEl = document.querySelector('#arScene');
const markerEl = document.querySelector('#markerTarget');
const modelRoot = document.querySelector('#modelRoot');
const modelEl = document.querySelector('#shiomi');
const debugBox = document.querySelector('#debugBox');

const startBtn = document.querySelector('#startBtn');
const stopBtn = document.querySelector('#stopBtn');
const largerBtn = document.querySelector('#largerBtn');
const smallerBtn = document.querySelector('#smallerBtn');
const frontBtn = document.querySelector('#frontBtn');
const backBtn = document.querySelector('#backBtn');
const upBtn = document.querySelector('#upBtn');
const downBtn = document.querySelector('#downBtn');
const checkBtn = document.querySelector('#checkBtn');

const statusEl = document.querySelector('#status');
const targetGuide = document.querySelector('#targetGuide');
const foundBanner = document.querySelector('#foundBanner');

let sceneLoaded = false;
let modelLoaded = false;
let arStarted = false;

let manualScale = 1.0;
let currentZ = 0.25;
let currentY = 0.0;

window.addEventListener('load', () => {
  statusEl.textContent = 'ページを読み込みました。\n開始ボタンを押してください。';
});

sceneEl.addEventListener('loaded', () => {
  sceneLoaded = true;
  statusEl.textContent = 'A-Frameシーンを読み込みました。\n開始できます。';
});

/*
  GLB読み込み後：
  - モデルの中心を原点へ寄せる
  - 最大寸法が 0.8 くらいになるように自動調整
  - z=0.25 の位置に浮かせる
*/
modelEl.addEventListener('model-loaded', () => {
  modelLoaded = true;

  setTimeout(() => {
    try {
      const THREE = AFRAME.THREE;
      const obj = modelEl.getObject3D('mesh');

      if (!obj) {
        statusEl.textContent = 'GLBは読み込まれましたが、meshが取得できませんでした。';
        return;
      }

      obj.updateMatrixWorld(true);

      const box = new THREE.Box3().setFromObject(obj);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();

      box.getSize(size);
      box.getCenter(center);

      const maxDim = Math.max(size.x, size.y, size.z);

      if (!isFinite(maxDim) || maxDim <= 0) {
        statusEl.textContent = 'GLBサイズ取得に失敗しました。\n手動スケールで表示します。';
        manualScale = 0.5;
        modelRoot.setAttribute('scale', `${manualScale} ${manualScale} ${manualScale}`);
        modelRoot.setAttribute('position', `0 0 ${currentZ}`);
        return;
      }

      // MindARのターゲット幅を1前後として、見える大きさに調整
      const desiredSize = 0.8;
      manualScale = desiredSize / maxDim;

      // 極端な値にならないよう制限
      manualScale = Math.max(0.01, Math.min(5.0, manualScale));

      // GLBの中心を親の中心へ寄せる
      modelEl.object3D.position.set(
        -center.x,
        -center.y,
        -center.z
      );

      modelRoot.object3D.scale.set(manualScale, manualScale, manualScale);
      modelRoot.object3D.position.set(0, currentY, currentZ);

      statusEl.textContent =
        '潮見GLBを表示用に調整しました。\n' +
        'maxDim: ' + maxDim.toFixed(4) + '\n' +
        'scale: ' + manualScale.toFixed(4) + '\n' +
        '赤い箱とモデルが見えるか確認してください。';

    } catch (e) {
      console.error(e);
      statusEl.textContent = 'GLB調整中にエラーが出ました。\n' + (e.message || String(e));
    }
  }, 300);
});

modelEl.addEventListener('model-error', (e) => {
  console.error(e);
  modelLoaded = false;
  statusEl.textContent =
    'GLBの読み込みに失敗しました。\n' +
    'shiomi_city.glb が index.html と同じフォルダにあるか確認してください。';
});

/* 拡大縮小 */
function applyTransform() {
  modelRoot.object3D.scale.set(manualScale, manualScale, manualScale);
  modelRoot.object3D.position.set(0, currentY, currentZ);

  statusEl.textContent =
    '表示調整中です。\n' +
    'scale: ' + manualScale.toFixed(4) + '\n' +
    'Y: ' + currentY.toFixed(3) + '\n' +
    'Z: ' + currentZ.toFixed(3);
}

largerBtn.addEventListener('click', () => {
  manualScale = Math.min(10, manualScale * 1.25);
  applyTransform();
});

smallerBtn.addEventListener('click', () => {
  manualScale = Math.max(0.001, manualScale / 1.25);
  applyTransform();
});

frontBtn.addEventListener('click', () => {
  currentZ += 0.08;
  applyTransform();
});

backBtn.addEventListener('click', () => {
  currentZ -= 0.08;
  applyTransform();
});

upBtn.addEventListener('click', () => {
  currentY += 0.08;
  applyTransform();
});

downBtn.addEventListener('click', () => {
  currentY -= 0.08;
  applyTransform();
});

/* 認識・見失い */
markerEl.addEventListener('targetFound', () => {
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'block';

  modelRoot.setAttribute('visible', 'true');
  debugBox.setAttribute('visible', 'true');

  statusEl.textContent =
    '潮見ジオラマを発見しました。\n' +
    '赤い箱が見えて、モデルが見えない場合はGLBの大きさ・位置の問題です。\n' +
    '＋、前へ、上へ を押して調整してください。';

  setTimeout(() => {
    foundBanner.style.display = 'none';
  }, 2000);
});

markerEl.addEventListener('targetLost', () => {
  if (!arStarted) return;

  foundBanner.style.display = 'none';
  targetGuide.style.display = 'block';
  statusEl.textContent = 'マーカーを見失いました。中央に入れてください。';
});

/* MindAR 起動 */
async function waitForMindARSystem() {
  for (let i = 0; i < 50; i++) {
    const sys = sceneEl.systems['mindar-image-system'];
    if (sys) return sys;
    await new Promise(r => setTimeout(r, 200));
  }
  return null;
}

startBtn.addEventListener('click', async () => {
  try {
    if (!window.isSecureContext) {
      statusEl.textContent =
        'HTTPSではありません。\n' +
        'GitHub Pagesなど、https:// のURLで開いてください。';
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      statusEl.textContent =
        'このブラウザではカメラAPIが使えません。\n' +
        'iPhoneはSafari、AndroidはChromeで開いてください。';
      return;
    }

    if (!sceneLoaded) {
      statusEl.textContent =
        'ARシーンの読み込みがまだ完了していません。\n' +
        '少し待ってから再度開始してください。';
      return;
    }

    const mindar = await waitForMindARSystem();

    if (!mindar) {
      statusEl.textContent =
        'MindARシステムが見つかりません。\n' +
        'A-Frame / MindAR のscriptタグを確認してください。';
      return;
    }

    targetGuide.style.display = 'block';
    statusEl.textContent = 'カメラを起動しています。許可してください。';

    await mindar.start();

    arStarted = true;

    statusEl.textContent =
      '探索中です。\n' +
      'マーカーを画面中央に入れてください。';

  } catch (err) {
    console.error(err);
    statusEl.textContent =
      'カメラ開始に失敗しました。\n' +
      (err.message || String(err));
  }
});

/* 停止 */
stopBtn.addEventListener('click', () => {
  const sys = sceneEl.systems['mindar-image-system'];

  if (sys) {
    sys.stop();
  }

  arStarted = false;
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'none';

  statusEl.textContent = '停止しました。';
});

/* 確認 */
checkBtn.addEventListener('click', () => {
  const mindar = sceneEl.systems['mindar-image-system'];
  const obj = modelEl.getObject3D('mesh');

  statusEl.textContent =
    '状態確認\n' +
    'HTTPS: ' + window.isSecureContext + '\n' +
    'sceneLoaded: ' + sceneLoaded + '\n' +
    'MindAR: ' + Boolean(mindar) + '\n' +
    'modelLoaded: ' + modelLoaded + '\n' +
    'GLB mesh: ' + Boolean(obj) + '\n' +
    'scale: ' + manualScale.toFixed(4) + '\n' +
    'Y: ' + currentY.toFixed(3) + '\n' +
    'Z: ' + currentZ.toFixed(3);
});
</script>

</body>
</html>
