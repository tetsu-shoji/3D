<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>AR Hit Test - Shiomi (WebXR)</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden}
  #info{position:fixed;left:8px;top:8px;z-index:20;color:#fff;background:rgba(0,0,0,0.5);padding:8px;border-radius:8px;font-size:13px}
  canvas{width:100vw;height:100vh;display:block}
  button{position:fixed;right:12px;top:12px;z-index:21;padding:8px 12px;border-radius:8px;border:none;background:#fff}
</style>
</head>
<body>
<div id="info">画面をタップして配置。ピンチで拡大。確認: HTTPS, Chrome。</div>
<button id="resetBtn" style="display:none">リセット</button>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.module.js';
import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/webxr/ARButton.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/loaders/GLTFLoader.js';

let camera, scene, renderer;
let reticle, controller;
let modelTemplate = null;
let placed = null;
let initialScale = 1.0;
let currentScale = 1.0;

// 名刺幅 0.09m を初期幅にする
const TARGET_SIZE_M = 0.09;

init();

function init(){
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // ARButton (hit-test required)
  document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

  // lights
  scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(0.5, 1, 0.5);
  scene.add(dir);

  // reticle
  const ringGeo = new THREE.RingGeometry(0.04, 0.07, 32).rotateX(-Math.PI/2);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, opacity:0.9, transparent:true });
  reticle = new THREE.Mesh(ringGeo, ringMat);
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);

  // controller for select (tap)
  controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  // load glb template (non-visible)
  const loader = new GLTFLoader();
  loader.load('./shiomi_city.glb',
    (gltf) => {
      modelTemplate = gltf.scene;
      modelTemplate.visible = false;
      // compute auto-fit scale now (template local size)
      autoFitTemplate(modelTemplate, TARGET_SIZE_M);
      console.log('GLB loaded, template prepared');
    },
    (xhr) => { /* progress optional */ },
    (err) => { console.error('GLB load error', err); alert('GLB読み込みに失敗しました。shiomi_city.glb を確認してください。'); }
  );

  // hit-test source setup on session start
  renderer.xr.addEventListener('sessionstart', async () => {
    const session = renderer.xr.getSession();
    const viewerRefSpace = await session.requestReferenceSpace('viewer');
    session.requestHitTestSource({ space: viewerRefSpace }).then((source) => {
      renderer.xr.hitTestSource = source;
    });
    renderer.xr.localRefSpace = await session.requestReferenceSpace('local');
  });

  renderer.xr.addEventListener('sessionend', () => {
    if (renderer.xr.hitTestSource) {
      renderer.xr.hitTestSource.cancel();
      renderer.xr.hitTestSource = null;
    }
  });

  window.addEventListener('resize', onWindowResize);
  renderer.setAnimationLoop(render);

  // simple touch handlers for pinch scale
  setupTouchHandlers();
}

function onWindowResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function onSelect(){
  if (!reticle.visible || !modelTemplate) return;
  // clone template and place
  const placedModel = modelTemplate.clone(true);
  placedModel.visible = true;
  // apply reticle matrix (world)
  placedModel.applyMatrix4(reticle.matrix);
  // ensure upright: zero X/Z rotation
  const euler = new THREE.Euler().setFromRotationMatrix(reticle.matrix);
  placedModel.rotation.x = 0;
  placedModel.rotation.z = 0;
  // store scale and initialScale
  placedModel.userData.baseScale = currentScale;
  scene.add(placedModel);
  placed = placedModel;
}

function autoFitTemplate(obj, targetWidthM){
  // compute bounding box in local space
  const box = new THREE.Box3().setFromObject(obj);
  const size = new THREE.Vector3();
  box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);
  if (maxDim === 0) return;
  const uniform = (targetWidthM / maxDim) * 0.95;
  obj.scale.setScalar(uniform);
  initialScale = uniform;
  currentScale = uniform;
  // align bottom to y=0 in local
  const bottomY = box.min.y;
  obj.position.set(-box.getCenter(new THREE.Vector3()).x * uniform, -bottomY * uniform, -box.getCenter(new THREE.Vector3()).z * uniform);
}

function render(timestamp, frame){
  if (frame) {
    const referenceSpace = renderer.xr.localRefSpace;
    const session = renderer.xr.getSession();
    const hitTestSource = renderer.xr.hitTestSource;
    if (hitTestSource && referenceSpace) {
      const hitTestResults = frame.getHitTestResults(hitTestSource);
      if (hitTestResults.length > 0) {
        const hit = hitTestResults[0];
        const pose = hit.getPose(referenceSpace);
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
      } else {
        reticle.visible = false;
      }
    }
  }

  // if placed model exists, apply smoothing for scale/rotation if needed
  if (placed) {
    // keep placed scale consistent with currentScale
    placed.scale.setScalar(currentScale);
  }

  renderer.render(scene, camera);
}

/* Touch handlers: pinch to scale, two-finger rotate */
function setupTouchHandlers(){
  let lastDist = null;
  let lastAngle = null;
  window.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      lastDist = distance(e.touches[0], e.touches[1]);
      lastAngle = angle(e.touches[0], e.touches[1]);
    }
  }, { passive:true });

  window.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && lastDist !== null) {
      const d = distance(e.touches[0], e.touches[1]);
      const a = angle(e.touches[0], e.touches[1]);
      const scaleFactor = d / lastDist;
      currentScale = Math.max(0.02, Math.min(6.0, currentScale * scaleFactor));
      lastDist = d;
      // rotate placed model around Y by delta angle
      if (placed && lastAngle !== null) {
        const delta = a - lastAngle;
        placed.rotation.y += delta;
      }
      lastAngle = a;
      e.preventDefault();
    }
  }, { passive:false });

  window.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) { lastDist = null; lastAngle = null; }
  }, { passive:true });
}

function distance(t1, t2){ const dx = t1.clientX - t2.clientX; const dy = t1.clientY - t2.clientY; return Math.hypot(dx,dy); }
function angle(t1, t2){ return Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX); }

// optional reset button
const resetBtn = document.getElementById('resetBtn');
resetBtn.addEventListener('click', () => {
  if (placed) { scene.remove(placed); placed = null; }
  currentScale = initialScale || 1.0;
  status('リセットしました');
});

function status(msg){ document.getElementById('info').textContent = msg; }
</script>
</body>
</html>
