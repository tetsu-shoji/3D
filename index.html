<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>潮見ジオラマ AR（安定版）</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- A-Frame Extras（必要なら） -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin:0; padding:0; width:100%; height:100%; overflow:hidden;
  background:#000; font-family:system-ui;
}
video {
  position:fixed !important; top:0 !important; left:0 !important;
  width:100vw !important; height:100vh !important;
  object-fit:cover !important; z-index:0 !important;
}
canvas.a-canvas {
  position:fixed !important; top:0 !important; left:0 !important;
  width:100vw !important; height:100vh !important;
  z-index:1 !important; background:transparent !important;
}
a-scene {
  position:fixed !important; inset:0 !important;
  width:100% !important; height:100% !important;
  z-index:1 !important; background:transparent !important;
}
#ui { position:fixed; inset:0; z-index:20; pointer-events:none; }
#topPanel {
  position:fixed; top:12px; left:12px; right:12px;
  display:flex; gap:8px; flex-wrap:wrap; pointer-events:auto;
}
button {
  border:none; border-radius:999px; padding:10px 14px;
  font-size:14px; font-weight:700; color:#111;
  background:rgba(255,255,255,0.94);
  box-shadow:0 3px 12px rgba(0,0,0,0.3);
}
#startBtn { background:#c40000; color:#fff; }
#stopBtn { background:#333; color:#fff; }
#status {
  position:fixed; left:12px; right:12px; bottom:16px;
  color:#fff; background:rgba(0,0,0,0.74);
  border-radius:14px; padding:10px 12px;
  font-size:13px; line-height:1.5; white-space:pre-wrap;
}
#targetGuide {
  position:fixed; left:50%; top:52%; transform:translate(-50%, -50%);
  width:70vw; max-width:360px; aspect-ratio:2/3;
  border:3px dashed rgba(255,255,255,0.82);
  border-radius:16px; display:none;
}
#foundBanner {
  position:fixed; top:74px; left:50%; transform:translateX(-50%);
  padding:10px 18px; border-radius:999px;
  background:rgba(196,0,0,0.94); color:#fff;
  font-size:15px; font-weight:800;
  box-shadow:0 4px 14px rgba(0,0,0,0.35);
  display:none;
}
</style>
</head>

<body>
<div id="ui">
  <div id="topPanel">
    <button id="startBtn">開始</button>
    <button id="stopBtn">停止</button>
    <button id="largerBtn">＋</button>
    <button id="smallerBtn">－</button>
    <button id="checkBtn">確認</button>
  </div>

  <div id="foundBanner">潮見ジオラマを発見！</div>
  <div id="targetGuide"></div>
  <div id="status">初期化中です。</div>
</div>

<!-- smoothing（揺れ防止） -->
<script>
AFRAME.registerComponent('smooth-transform', {
  schema: {
    positionFactor: {default: 0.25},
    rotationFactor: {default: 0.25},
    scaleFactor: {default: 0.25}
  },
  init() {
    this.lastPos = new THREE.Vector3();
    this.lastRot = new THREE.Euler();
    this.lastScale = new THREE.Vector3(1,1,1);
  },
  tick() {
    const o = this.el.object3D;

    this.lastPos.lerp(o.position, this.data.positionFactor);
    this.lastRot.set(
      THREE.MathUtils.lerp(this.lastRot.x, o.rotation.x, this.data.rotationFactor),
      THREE.MathUtils.lerp(this.lastRot.y, o.rotation.y, this.data.rotationFactor),
      THREE.MathUtils.lerp(this.lastRot.z, o.rotation.z, this.data.rotationFactor)
    );
    this.lastScale.lerp(o.scale, this.data.scaleFactor);

    o.position.copy(this.lastPos);
    o.rotation.copy(this.lastRot);
    o.scale.copy(this.lastScale);
  }
});
</script>

<!-- AR Scene -->
<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true; preserveDrawingBuffer: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera look-controls="enabled: false"></a-camera>

  <a-entity id="markerTarget" mindar-image-target="targetIndex: 0">
    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" intensity="1.6" position="0 1 2"></a-light>

    <a-entity
      id="shiomi"
      gltf-model="url(./shiomi_city.glb)"
      position="0 0 0"
      rotation="0 180 0"
      scale="1 1 1"
      smooth-transform
      animation-mixer>
    </a-entity>

    <a-text value="潮見ジオラマ" align="center" color="#FFEEAA"
            position="0 0.75 0.05" scale="0.55 0.55 0.55"></a-text>
  </a-entity>
</a-scene>

<script>
const sceneEl = document.querySelector('#arScene');
const markerEl = document.querySelector('#markerTarget');
const modelEl = document.querySelector('#shiomi');

const startBtn = document.querySelector('#startBtn');
const stopBtn = document.querySelector('#stopBtn');
const largerBtn = document.querySelector('#largerBtn');
const smallerBtn = document.querySelector('#smallerBtn');
const checkBtn = document.querySelector('#checkBtn');

const statusEl = document.querySelector('#status');
const targetGuide = document.querySelector('#targetGuide');
const foundBanner = document.querySelector('#foundBanner');

let sceneLoaded = false;
let modelLoaded = false;
let arStarted = false;
let currentScale = 1.0;

window.addEventListener('load', () => {
  statusEl.textContent = 'ページを読み込みました。\nARシーンの初期化を待っています。';
});

sceneEl.addEventListener('loaded', () => {
  sceneLoaded = true;
  statusEl.textContent = 'A-Frameシーンを読み込みました。\n確認ボタンで状態確認できます。';
});

/* 名刺サイズに自動フィット */
modelEl.addEventListener('model-loaded', () => {
  modelLoaded = true;
  statusEl.textContent = '潮見GLBを読み込みました。\nマーカーにかざしてください。';

  setTimeout(() => {
    const THREE = AFRAME.THREE;
    const obj =
      modelEl.getObject3D('mesh') ||
      modelEl.getObject3D('scene') ||
      modelEl.getObject3D('gltf');

    if (!obj) return;

    const box = new THREE.Box3().setFromObject(obj);
    const size = new THREE.Vector3();
    box.getSize(size);

    const maxDim = Math.max(size.x, size.y, size.z);
    if (maxDim === 0) return;

    const CARD_WIDTH_M = 0.085; // 名刺横幅
    const requiredScale = CARD_WIDTH_M / maxDim;
    const finalScale = requiredScale * 0.95;

    obj.scale.set(finalScale, finalScale, finalScale);

    const bottomY = box.min.y * finalScale;
    const center = new THREE.Vector3();
    box.getCenter(center);

    obj.position.set(
      -center.x * finalScale,
      -bottomY,
      -center.z * finalScale
    );

    currentScale = finalScale;
    statusEl.textContent = '名刺サイズに自動フィットしました。';
  }, 200);
});

/* 拡大縮小 */
function setScale(v) {
  currentScale = Math.max(0.01, Math.min(10.0, v));
  const obj = modelEl.object3D;
  obj.scale.set(currentScale, currentScale, currentScale);
  statusEl.textContent = 'scale: ' + currentScale.toFixed(2);
}
largerBtn.addEventListener('click', () => setScale(currentScale + 0.25));
smallerBtn.addEventListener('click', () => setScale(currentScale - 0.25));

/* targetFound / targetLost */
markerEl.addEventListener('targetFound', () => {
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'block';
  statusEl.textContent = modelLoaded
    ? '潮見ジオラマを発見しました。'
    : 'マーカー認識済み。GLB読み込みを確認してください。';

  setTimeout(() => { foundBanner.style.display = 'none'; }, 2000);
});

markerEl.addEventListener('targetLost', () => {
  if (!arStarted) return;
  foundBanner.style.display = 'none';
  targetGuide.style.display = 'block';
  statusEl.textContent = 'マーカーを見失いました。中央に入れてください。';
});

/* MindAR 起動 */
async function waitForMindARSystem() {
  for (let i = 0; i < 50; i++) {
    const sys = sceneEl.systems['mindar-image-system'];
    if (sys) return sys;
    await new Promise(r => setTimeout(r, 200));
  }
  return null;
}

startBtn.addEventListener('click', async () => {
  try {
    if (!window.isSecureContext) {
      statusEl.textContent = 'HTTPSではありません。\nGitHub Pages の https:// で開いてください。';
      return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      statusEl.textContent = 'このブラウザではカメラAPIが使えません。\nAndroid Chrome 等で開いてください。';
      return;
    }
    if (!sceneLoaded) {
      statusEl.textContent = 'ARシーンの読み込みがまだ完了していません。\n少し待つか、確認ボタンを押してください。';
      return;
    }

    const mindar = await waitForMindARSystem();
    if (!mindar) {
      statusEl.textContent = 'MindARシステムが見つかりません。\nCDNやscriptタグを確認してください。';
      return;
    }

    targetGuide.style.display = 'block';
    statusEl.textContent = 'カメラを起動しています。許可してください。';

    await mindar.start();
    arStarted = true;

    statusEl.textContent = '探索中です。\nマーカーを中央に入れてください。';
  } catch (err) {
    statusEl.textContent = 'カメラ開始に失敗しました。\n' + (err.message || String(err));
  }
});

/* 停止 */
stopBtn.addEventListener('click', () => {
  const sys = sceneEl.systems['mindar-image-system'];
  if (sys) sys.stop();
  arStarted = false;
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'none';
  statusEl.textContent = '停止しました。';
});
</script>

</body>
</html>
