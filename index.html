<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>潮見ジオラマ AR 固定表示・タップ配置対応版</title>

<script>
window.__startupErrorText = '';

function setStatusSafe(text) {
  const el = document.querySelector('#status');
  if (el) {
    el.textContent = text;
  } else {
    window.__startupErrorText = text;
  }
}

window.addEventListener('error', function (e) {
  const msg =
    'JavaScriptエラーが発生しました。\n' +
    'message: ' + e.message + '\n' +
    'file: ' + e.filename + '\n' +
    'line: ' + e.lineno + '\n' +
    'column: ' + e.colno;

  console.error(msg);
  setStatusSafe(msg);
});

window.addEventListener('unhandledrejection', function (e) {
  const msg =
    'Promiseエラーが発生しました。\n' +
    String(e.reason);

  console.error(msg);
  setStatusSafe(msg);
});

window.addEventListener('DOMContentLoaded', function () {
  const el = document.querySelector('#status');
  if (el) {
    if (window.__startupErrorText) {
      el.textContent = window.__startupErrorText;
    } else {
      el.textContent =
        'HTMLは読み込まれました。\n' +
        'A-Frame / MindAR の初期化を待っています。';
    }
  }
});
</script>

<script>
const sceneEl = document.querySelector('#arScene');
const markerEl = document.querySelector('#markerTarget');
const originalEl = document.querySelector('#shiomiOriginal');
const modelRoot = document.querySelector('#modelRoot');
const modelBounds = document.querySelector('#modelBounds');
const debugBox = document.querySelector('#debugBox');
const pinnedRoot = document.querySelector('#pinnedRoot');

const startBtn = document.querySelector('#startBtn');
const stopBtn = document.querySelector('#stopBtn');

const largerBtn = document.querySelector('#largerBtn');
const smallerBtn = document.querySelector('#smallerBtn');
const frontBtn = document.querySelector('#frontBtn');
const backBtn = document.querySelector('#backBtn');
const upBtn = document.querySelector('#upBtn');
const downBtn = document.querySelector('#downBtn');

const buildingUpBtn = document.querySelector('#buildingUpBtn');
const buildingDownBtn = document.querySelector('#buildingDownBtn');
const roadUpBtn = document.querySelector('#roadUpBtn');
const roadDownBtn = document.querySelector('#roadDownBtn');
const landUpBtn = document.querySelector('#landUpBtn');
const landDownBtn = document.querySelector('#landDownBtn');

const splitUpBtn = document.querySelector('#splitUpBtn');
const splitDownBtn = document.querySelector('#splitDownBtn');
const heightResetBtn = document.querySelector('#heightResetBtn');

const rotateBtn = document.querySelector('#rotateBtn');
const angleBtn = document.querySelector('#angleBtn');
const colorBtn = document.querySelector('#colorBtn');
const pinBtn = document.querySelector('#pinBtn');
const tapPinBtn = document.querySelector('#tapPinBtn');
const clearPinBtn = document.querySelector('#clearPinBtn');
const resetBtn = document.querySelector('#resetBtn');
const checkBtn = document.querySelector('#checkBtn');

const statusEl = document.querySelector('#status');
const targetGuide = document.querySelector('#targetGuide');
const foundBanner = document.querySelector('#foundBanner');

let sceneLoaded = false;
let modelLoaded = false;
let arStarted = false;

let rootScale = 1.0;
let currentX = 0.0;
let currentY = 0.00;
let currentZ = 0.28;

let proxyGroup = null;
let proxyMeshCount = 0;
let sourceMeshCount = 0;
let visibleSourceMeshCount = 0;
let childCount = 0;
let innerScale = 1.0;
let boxSizeText = '';
let boxCenterText = '';

let colorMode = 0;
let yawMode = 0;
let angleMode = 0;

let baseFlipXDeg = 180;
let buildingSplitRatio = 0.18;

let isPinned = false;
let pinnedGroup = null;
let waitingForTapPlacement = false;

/*
  建物は -0.060 が土地と合うため初期値に設定
*/
let layerHeightOffset = {
  land: -0.006,
  road: 0.055,
  building: -0.060,
  other: 0.030
};

const defaultLayerHeightOffset = {
  land: -0.006,
  road: 0.055,
  building: -0.060,
  other: 0.030
};

const colorSets = [
  {
    land: 0x4caf50,
    building: 0xd8d8d8,
    road: 0xf9c74f,
    other: 0x90caf9
  },
  {
    land: 0x66bb6a,
    building: 0xf0f0f0,
    road: 0xffca28,
    other: 0x64b5f6
  },
  {
    land: 0x6abf69,
    building: 0xcfcfcf,
    road: 0x8d6e63,
    other: 0x90caf9
  }
];

const angleModes = [
  {
    name: '平行表示',
    pitchDeg: 0,
    z: 0.28,
    y: 0.00
  },
  {
    name: 'やや斜め',
    pitchDeg: -18,
    z: 0.36,
    y: 0.04
  },
  {
    name: 'ローアングル',
    pitchDeg: -32,
    z: 0.48,
    y: 0.08
  }
];

window.addEventListener('DOMContentLoaded', () => {
  statusEl.textContent =
    'HTMLは読み込まれました。\n' +
    'A-Frame / MindAR の初期化を待っています。';

  setTimeout(() => {
    if (!sceneLoaded) {
      statusEl.textContent =
        'A-Frameシーンのloadedイベントを待っています。\n' +
        'この表示が続く場合は、CDN読み込み、scriptタグ、またはHTML構文を確認してください。';
    }
  }, 4000);
});

window.addEventListener('load', () => {
  if (!sceneLoaded) {
    statusEl.textContent =
      'ページ全体は読み込まれましたが、A-Frameシーンの初期化待ちです。\n' +
      '少し待ってから開始ボタンを押してください。';
  }
});

sceneEl.addEventListener('loaded', () => {
  sceneLoaded = true;
  statusEl.textContent =
    'A-Frameシーンを読み込みました。\n' +
    '開始ボタンを押してください。';
});

function countSourceMeshes() {
  const obj = originalEl.object3D;
  let c = 0;
  let m = 0;
  let v = 0;

  obj.traverse((node) => {
    c++;
    if (node.isMesh) {
      m++;
      if (node.visible) v++;
    }
  });

  childCount = c;
  sourceMeshCount = m;
  visibleSourceMeshCount = v;

  return {
    childCount: c,
    meshCount: m,
    visibleMeshCount: v
  };
}

function clearProxyGroup() {
  if (proxyGroup) {
    modelRoot.object3D.remove(proxyGroup);

    proxyGroup.traverse((node) => {
      if (node.geometry) node.geometry.dispose();

      if (node.material) {
        if (Array.isArray(node.material)) {
          node.material.forEach(mat => mat.dispose());
        } else {
          node.material.dispose();
        }
      }
    });

    proxyGroup = null;
    proxyMeshCount = 0;
  }
}

function getGeometryVolume(geom) {
  geom.computeBoundingBox();
  if (!geom.boundingBox) return 0;

  const size = new AFRAME.THREE.Vector3();
  geom.boundingBox.getSize(size);

  return Math.abs(size.x * size.y * size.z);
}

function remapYUpToARZUp(geom) {
  const position = geom.attributes.position;
  if (!position) return;

  for (let i = 0; i < position.count; i++) {
    const x = position.getX(i);
    const y = position.getY(i);
    const z = position.getZ(i);

    position.setXYZ(i, x, y, z);
  }

  position.needsUpdate = true;
  geom.computeVertexNormals();
  geom.computeBoundingBox();
}

function splitGeometryByHeight(sourceGeom, thresholdRatio) {
  const THREE = AFRAME.THREE;

  const geom = sourceGeom.clone();
  geom.computeBoundingBox();

  if (!geom.boundingBox) {
    return { low: geom, high: null };
  }

  const box = geom.boundingBox;
  const minZ = box.min.z;
  const maxZ = box.max.z;
  const thresholdZ = minZ + (maxZ - minZ) * thresholdRatio;

  const pos = geom.attributes.position;
  const indexAttr = geom.index;

  const lowPositions = [];
  const highPositions = [];

  function pushTriangle(target, ax, ay, az, bx, by, bz, cx, cy, cz) {
    target.push(ax, ay, az, bx, by, bz, cx, cy, cz);
  }

  if (indexAttr) {
    for (let i = 0; i < indexAttr.count; i += 3) {
      const ia = indexAttr.getX(i);
      const ib = indexAttr.getX(i + 1);
      const ic = indexAttr.getX(i + 2);

      const ax = pos.getX(ia);
      const ay = pos.getY(ia);
      const az = pos.getZ(ia);

      const bx = pos.getX(ib);
      const by = pos.getY(ib);
      const bz = pos.getZ(ib);

      const cx = pos.getX(ic);
      const cy = pos.getY(ic);
      const cz = pos.getZ(ic);

      const avgZ = (az + bz + cz) / 3;

      if (avgZ >= thresholdZ) {
        pushTriangle(highPositions, ax, ay, az, bx, by, bz, cx, cy, cz);
      } else {
        pushTriangle(lowPositions, ax, ay, az, bx, by, bz, cx, cy, cz);
      }
    }
  } else {
    for (let i = 0; i < pos.count; i += 3) {
      const ax = pos.getX(i);
      const ay = pos.getY(i);
      const az = pos.getZ(i);

      const bx = pos.getX(i + 1);
      const by = pos.getY(i + 1);
      const bz = pos.getZ(i + 1);

      const cx = pos.getX(i + 2);
      const cy = pos.getY(i + 2);
      const cz = pos.getZ(i + 2);

      const avgZ = (az + bz + cz) / 3;

      if (avgZ >= thresholdZ) {
        pushTriangle(highPositions, ax, ay, az, bx, by, bz, cx, cy, cz);
      } else {
        pushTriangle(lowPositions, ax, ay, az, bx, by, bz, cx, cy, cz);
      }
    }
  }

  function buildGeometry(positions) {
    if (positions.length === 0) return null;

    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    g.computeVertexNormals();
    g.computeBoundingBox();
    return g;
  }

  return {
    low: buildGeometry(lowPositions),
    high: buildGeometry(highPositions)
  };
}

function normalizeLayerHeight(geom, layerType) {
  geom.computeBoundingBox();

  if (!geom.boundingBox) return;

  const box = geom.boundingBox;
  const minZ = box.min.z;
  const maxZ = box.max.z;

  if (layerType === 'land') {
    geom.translate(0, 0, -maxZ + layerHeightOffset.land);
    return;
  }

  if (layerType === 'road') {
    geom.translate(0, 0, -minZ + layerHeightOffset.road);
    return;
  }

  if (layerType === 'building') {
    geom.translate(0, 0, -minZ + layerHeightOffset.building);
    return;
  }

  geom.translate(0, 0, -minZ + layerHeightOffset.other);
}

function fixGeometryWindingToFaceUp(geom, layerType) {
  if (!geom || !geom.attributes || !geom.attributes.position) return;

  geom.computeVertexNormals();

  const normalAttr = geom.attributes.normal;
  if (!normalAttr) return;

  let sumZ = 0;
  let count = 0;

  for (let i = 0; i < normalAttr.count; i++) {
    sumZ += normalAttr.getZ(i);
    count++;
  }

  if (count === 0) return;

  const avgZ = sumZ / count;

  if (avgZ < 0) {
    const pos = geom.attributes.position;
    const indexAttr = geom.index;

    if (indexAttr) {
      for (let i = 0; i < indexAttr.count; i += 3) {
        const a = indexAttr.getX(i);
        const b = indexAttr.getX(i + 1);
        const c = indexAttr.getX(i + 2);

        indexAttr.setX(i, a);
        indexAttr.setX(i + 1, c);
        indexAttr.setX(i + 2, b);
      }

      indexAttr.needsUpdate = true;
    } else {
      for (let i = 0; i < pos.count; i += 3) {
        const bx = pos.getX(i + 1);
        const by = pos.getY(i + 1);
        const bz = pos.getZ(i + 1);

        const cx = pos.getX(i + 2);
        const cy = pos.getY(i + 2);
        const cz = pos.getZ(i + 2);

        pos.setXYZ(i + 1, cx, cy, cz);
        pos.setXYZ(i + 2, bx, by, bz);
      }

      pos.needsUpdate = true;
    }

    geom.computeVertexNormals();
    geom.computeBoundingBox();
  }
}

function getLayerRenderOrder(layerType) {
  if (layerType === 'land') return 10;
  if (layerType === 'building') return 20;
  if (layerType === 'road') return 30;
  return 25;
}

function makeSolidMaterialForLayer(colorValue, layerType) {
  const THREE = AFRAME.THREE;

  let polygonOffsetFactor = 0;
  let polygonOffsetUnits = 0;

  if (layerType === 'road') {
    polygonOffsetFactor = -8;
    polygonOffsetUnits = -8;
  } else if (layerType === 'building') {
    polygonOffsetFactor = -2;
    polygonOffsetUnits = -2;
  } else if (layerType === 'land') {
    polygonOffsetFactor = 2;
    polygonOffsetUnits = 2;
  }

  return new THREE.MeshStandardMaterial({
    color: colorValue,
    side: THREE.DoubleSide,
    roughness: 0.82,
    metalness: 0.02,
    flatShading: true,
    transparent: false,
    opacity: 1.0,
    depthTest: true,
    depthWrite: true,
    polygonOffset: true,
    polygonOffsetFactor: polygonOffsetFactor,
    polygonOffsetUnits: polygonOffsetUnits
  });
}

function addLayerMesh(geom, layerType) {
  const THREE = AFRAME.THREE;
  const colors = colorSets[colorMode % colorSets.length];

  fixGeometryWindingToFaceUp(geom, layerType);

  let colorValue = colors.other;
  if (layerType === 'land') colorValue = colors.land;
  if (layerType === 'building') colorValue = colors.building;
  if (layerType === 'road') colorValue = colors.road;

  const material = makeSolidMaterialForLayer(colorValue, layerType);

  const mesh = new THREE.Mesh(geom, material);
  mesh.visible = true;
  mesh.frustumCulled = false;
  mesh.renderOrder = getLayerRenderOrder(layerType);

  proxyGroup.add(mesh);
}

function updateProxyRotation() {
  if (!proxyGroup) return;

  const THREE = AFRAME.THREE;
  const pitchDeg = angleModes[angleMode].pitchDeg;

  const totalPitch = THREE.MathUtils.degToRad(baseFlipXDeg + pitchDeg);
  const zYaw = yawMode % 2 === 0 ? 0 : Math.PI;

  proxyGroup.rotation.set(totalPitch, 0, zYaw);
}

function extractMeshesToProxy(preserveTransform = true) {
  const THREE = AFRAME.THREE;

  clearProxyGroup();

  const sourceRoot = originalEl.object3D;
  sourceRoot.updateMatrixWorld(true);

  const counts = countSourceMeshes();

  if (counts.meshCount === 0) {
    statusEl.textContent =
      '元GLBのメッシュが0です。\n' +
      'shiomi_city.glb の中身または読み込み状態を確認してください。';
    return;
  }

  const inverseRootMatrix = sourceRoot.matrixWorld.clone().invert();

  const items = [];
  const totalBox = new THREE.Box3();
  let hasBox = false;

  sourceRoot.traverse((node) => {
    if (!node.isMesh || !node.geometry) return;

    const positionAttr = node.geometry.attributes.position;
    if (!positionAttr || positionAttr.count === 0) return;

    const geom = node.geometry.clone();

    const relativeMatrix = new THREE.Matrix4().multiplyMatrices(
      inverseRootMatrix,
      node.matrixWorld
    );

    geom.applyMatrix4(relativeMatrix);
    remapYUpToARZUp(geom);

    geom.computeVertexNormals();
    geom.computeBoundingBox();

    if (geom.boundingBox) {
      totalBox.union(geom.boundingBox);
      hasBox = true;
    }

    items.push({
      geometry: geom,
      name: node.name || '',
      volume: getGeometryVolume(geom)
    });
  });

  if (!hasBox || items.length === 0) {
    statusEl.textContent =
      'メッシュはありますが、頂点情報を取得できません。';
    return;
  }

  items.sort((a, b) => b.volume - a.volume);

  const size = new THREE.Vector3();
  const center = new THREE.Vector3();

  totalBox.getSize(size);
  totalBox.getCenter(center);

  boxSizeText =
    size.x.toFixed(4) + ', ' +
    size.y.toFixed(4) + ', ' +
    size.z.toFixed(4);

  boxCenterText =
    center.x.toFixed(4) + ', ' +
    center.y.toFixed(4) + ', ' +
    center.z.toFixed(4);

  const maxDim = Math.max(size.x, size.y, size.z);

  if (!isFinite(maxDim) || maxDim <= 0) {
    statusEl.textContent =
      'モデルサイズの計算に失敗しました。\n' +
      'box size: ' + boxSizeText;
    return;
  }

  const desiredSize = 0.78;
  innerScale = desiredSize / maxDim;
  innerScale = Math.max(0.001, Math.min(200, innerScale));

  proxyGroup = new THREE.Group();
  proxyGroup.name = 'shiomi_proxy_group';

  items.forEach((item, index) => {
    const baseGeom = item.geometry;

    baseGeom.translate(-center.x, -center.y, -center.z);
    baseGeom.scale(innerScale, innerScale, innerScale);

    if (index === 0) {
      const split = splitGeometryByHeight(baseGeom, buildingSplitRatio);

      if (split.low) {
        normalizeLayerHeight(split.low, 'land');
        addLayerMesh(split.low, 'land');
      }

      if (split.high) {
        normalizeLayerHeight(split.high, 'building');
        addLayerMesh(split.high, 'building');
      }
    } else {
      normalizeLayerHeight(baseGeom, 'road');
      addLayerMesh(baseGeom, 'road');
    }
  });

  proxyMeshCount = proxyGroup.children.length;

  proxyGroup.position.set(0, 0, 0);
  proxyGroup.scale.set(1, 1, 1);

  modelRoot.object3D.add(proxyGroup);

  originalEl.object3D.visible = false;
  modelRoot.object3D.visible = true;

  if (!preserveTransform) {
    const mode = angleModes[angleMode];
    currentY = mode.y;
    currentZ = mode.z;
    rootScale = 1.0;
  }

  updateProxyRotation();
  applyRootTransform(false);

  statusEl.textContent =
    'モデルを表示しました。\n' +
    'X軸180度反転＋平行表示です。\n' +
    '土地・道路・建物はすべて両面表示です。\n' +
    '建物高さの初期値は -0.060 です。\n' +
    '固定したい場合は「この位置に固定」または「タップ位置に固定」を使ってください。\n' +
    '建物判定: ' + buildingSplitRatio.toFixed(2) + '\n' +
    '土地: ' + layerHeightOffset.land.toFixed(3) + '\n' +
    '道路: ' + layerHeightOffset.road.toFixed(3) + '\n' +
    '建物: ' + layerHeightOffset.building.toFixed(3) + '\n' +
    'proxyMeshCount: ' + proxyMeshCount;
}

originalEl.addEventListener('model-loaded', () => {
  modelLoaded = true;

  statusEl.textContent =
    'GLBを読み込みました。\n' +
    'メッシュを生成しています。';

  setTimeout(() => {
    extractMeshesToProxy(false);
  }, 500);
});

originalEl.addEventListener('model-error', (e) => {
  console.error('model-error', e);

  modelLoaded = false;

  statusEl.textContent =
    'GLBの読み込みに失敗しました。\n' +
    '確認してください：\n' +
    '1. shiomi_city.glb が index.html と同じフォルダにあるか\n' +
    '2. ファイル名の大文字小文字が一致しているか\n' +
    '3. GLBファイルが壊れていないか';
});

function applyRootTransform(showMessage = true) {
  modelRoot.object3D.position.set(currentX, currentY, currentZ);
  modelRoot.object3D.scale.set(rootScale, rootScale, rootScale);

  modelBounds.object3D.position.set(currentX, currentY, currentZ);
  modelBounds.object3D.scale.set(rootScale, rootScale, rootScale);

  if (showMessage) {
    statusEl.textContent =
      '表示調整中です。\n' +
      'rootScale: ' + rootScale.toFixed(3) + '\n' +
      'X: ' + currentX.toFixed(3) + '\n' +
      'Y: ' + currentY.toFixed(3) + '\n' +
      'Z: ' + currentZ.toFixed(3) + '\n' +
      '角度: ' + angleModes[angleMode].name + '\n' +
      '建物判定: ' + buildingSplitRatio.toFixed(2) + '\n' +
      '土地: ' + layerHeightOffset.land.toFixed(3) + '\n' +
      '道路: ' + layerHeightOffset.road.toFixed(3) + '\n' +
      '建物: ' + layerHeightOffset.building.toFixed(3);
  }
}

function adjustLayerHeight(layer, delta) {
  layerHeightOffset[layer] += delta;
  extractMeshesToProxy(true);
}

function adjustBuildingSplit(delta) {
  buildingSplitRatio += delta;
  buildingSplitRatio = Math.max(0.02, Math.min(0.80, buildingSplitRatio));
  extractMeshesToProxy(true);
}

function disposePinnedGroup() {
  if (pinnedGroup) {
    pinnedRoot.object3D.remove(pinnedGroup);
    pinnedGroup.traverse((node) => {
      if (node.geometry) node.geometry.dispose && node.geometry.dispose();
      if (node.material) {
        if (Array.isArray(node.material)) {
          node.material.forEach(mat => mat.dispose && mat.dispose());
        } else {
          node.material.dispose && node.material.dispose();
        }
      }
    });
    pinnedGroup = null;
  }
}

function createPinnedClone() {
  if (!proxyGroup) {
    statusEl.textContent =
      'まだモデルが生成されていません。\n' +
      '名刺を認識してモデルが表示されてから固定してください。';
    return null;
  }

  disposePinnedGroup();

  const clone = proxyGroup.clone(true);

  clone.traverse((node) => {
    node.visible = true;
    node.frustumCulled = false;
  });

  return clone;
}

function pinCurrentModelPosition() {
  const clone = createPinnedClone();
  if (!clone) return;

  modelRoot.object3D.updateWorldMatrix(true, true);

  pinnedRoot.object3D.matrixAutoUpdate = false;
  pinnedRoot.object3D.matrix.copy(modelRoot.object3D.matrixWorld);

  pinnedRoot.object3D.add(clone);
  pinnedGroup = clone;

  pinnedRoot.setAttribute('visible', 'true');
  isPinned = true;

  modelRoot.setAttribute('visible', 'false');

  statusEl.textContent =
    '現在の位置にモデルを固定しました。\n' +
    '名刺を画面外にしても固定モデルを表示し続けます。\n' +
    'これはMindAR上の簡易固定です。';
}

function placePinnedAtScreenPoint(clientX, clientY) {
  const clone = createPinnedClone();
  if (!clone) return;

  const THREE = AFRAME.THREE;
  const rect = sceneEl.canvas.getBoundingClientRect();

  const mouse = new THREE.Vector2(
    ((clientX - rect.left) / rect.width) * 2 - 1,
    -((clientY - rect.top) / rect.height) * 2 + 1
  );

  const raycaster = new THREE.Raycaster();
  const camera = sceneEl.camera;

  raycaster.setFromCamera(mouse, camera);

  /*
    MindAR単体では机の平面検出はできないため、
    カメラから一定距離の仮想位置に配置します。
    物理的な机固定ではなく、タップ位置に近い見た目の簡易固定です。
  */
  const distance = 1.2;
  const point = new THREE.Vector3();
  raycaster.ray.at(distance, point);

  pinnedRoot.object3D.matrixAutoUpdate = true;
  pinnedRoot.object3D.position.copy(point);
  pinnedRoot.object3D.rotation.set(0, 0, 0);
  pinnedRoot.object3D.scale.set(1, 1, 1);

  pinnedRoot.object3D.add(clone);
  pinnedGroup = clone;

  pinnedRoot.setAttribute('visible', 'true');
  isPinned = true;
  waitingForTapPlacement = false;

  modelRoot.setAttribute('visible', 'false');

  statusEl.textContent =
    'タップ位置にモデルを簡易固定しました。\n' +
    'MindAR単体では机・床の平面検出はできないため、カメラから一定距離の仮想位置に配置しています。\n' +
    '物理的な机固定を行うにはWebXR hit-test方式が必要です。';
}

function clearPinnedModel() {
  disposePinnedGroup();

  pinnedRoot.setAttribute('visible', 'false');

  pinnedRoot.object3D.matrix.identity();
  pinnedRoot.object3D.matrixAutoUpdate = true;
  pinnedRoot.object3D.position.set(0, 0, 0);
  pinnedRoot.object3D.rotation.set(0, 0, 0);
  pinnedRoot.object3D.scale.set(1, 1, 1);

  isPinned = false;
  waitingForTapPlacement = false;

  modelRoot.setAttribute('visible', 'true');

  statusEl.textContent =
    '固定を解除しました。\n' +
    '名刺を認識すると、モデルは再び名刺に追従します。';
}

sceneEl.addEventListener('click', (ev) => {
  if (!waitingForTapPlacement) return;

  placePinnedAtScreenPoint(ev.clientX, ev.clientY);
});

sceneEl.addEventListener('touchstart', (ev) => {
  if (!waitingForTapPlacement) return;
  if (!ev.touches || ev.touches.length === 0) return;

  const t = ev.touches[0];
  placePinnedAtScreenPoint(t.clientX, t.clientY);
});

largerBtn.addEventListener('click', () => {
  rootScale = Math.min(50, rootScale * 1.20);
  applyRootTransform();
});

smallerBtn.addEventListener('click', () => {
  rootScale = Math.max(0.001, rootScale / 1.20);
  applyRootTransform();
});

frontBtn.addEventListener('click', () => {
  currentZ += 0.08;
  applyRootTransform();
});

backBtn.addEventListener('click', () => {
  currentZ -= 0.08;
  applyRootTransform();
});

upBtn.addEventListener('click', () => {
  currentY += 0.08;
  applyRootTransform();
});

downBtn.addEventListener('click', () => {
  currentY -= 0.08;
  applyRootTransform();
});

/*
  建物ボタンは見た目に合わせて逆向きに調整済み。
  建物↑ → 数値をマイナス方向へ
  建物↓ → 数値をプラス方向へ
*/
buildingUpBtn.addEventListener('click', () => {
  adjustLayerHeight('building', -0.020);
});

buildingDownBtn.addEventListener('click', () => {
  adjustLayerHeight('building', 0.020);
});

roadUpBtn.addEventListener('click', () => {
  adjustLayerHeight('road', 0.015);
});

roadDownBtn.addEventListener('click', () => {
  adjustLayerHeight('road', -0.015);
});

landUpBtn.addEventListener('click', () => {
  adjustLayerHeight('land', 0.015);
});

landDownBtn.addEventListener('click', () => {
  adjustLayerHeight('land', -0.015);
});

splitDownBtn.addEventListener('click', () => {
  adjustBuildingSplit(-0.03);
});

splitUpBtn.addEventListener('click', () => {
  adjustBuildingSplit(0.03);
});

heightResetBtn.addEventListener('click', () => {
  layerHeightOffset = {
    land: defaultLayerHeightOffset.land,
    road: defaultLayerHeightOffset.road,
    building: defaultLayerHeightOffset.building,
    other: defaultLayerHeightOffset.other
  };

  buildingSplitRatio = 0.18;

  extractMeshesToProxy(true);
});

rotateBtn.addEventListener('click', () => {
  yawMode = (yawMode + 1) % 2;
  updateProxyRotation();
  applyRootTransform();

  statusEl.textContent =
    'モデルをZ軸で180度回転しました。\n' +
    '現在: ' + (yawMode % 2 === 0 ? '0度' : '180度');
});

angleBtn.addEventListener('click', () => {
  angleMode = (angleMode + 1) % angleModes.length;

  const mode = angleModes[angleMode];

  currentY = mode.y;
  currentZ = mode.z;

  updateProxyRotation();
  applyRootTransform();

  statusEl.textContent =
    '角度を切り替えました。\n' +
    '現在: ' + mode.name;
});

colorBtn.addEventListener('click', () => {
  colorMode = (colorMode + 1) % colorSets.length;
  extractMeshesToProxy(true);
});

pinBtn.addEventListener('click', () => {
  pinCurrentModelPosition();
});

tapPinBtn.addEventListener('click', () => {
  if (!proxyGroup) {
    statusEl.textContent =
      'まだモデルが生成されていません。\n' +
      '名刺を認識してモデルが表示されてから使用してください。';
    return;
  }

  waitingForTapPlacement = true;

  statusEl.textContent =
    'タップ位置固定モードです。\n' +
    '画面上で、モデルを置きたい位置をタップしてください。\n' +
    'これは机・床の実平面検出ではなく、画面タップ位置への簡易配置です。';
});

clearPinBtn.addEventListener('click', () => {
  clearPinnedModel();
});

resetBtn.addEventListener('click', () => {
  rootScale = 1.0;
  currentX = 0.0;
  yawMode = 0;
  angleMode = 0;
  baseFlipXDeg = 180;
  buildingSplitRatio = 0.18;

  layerHeightOffset = {
    land: defaultLayerHeightOffset.land,
    road: defaultLayerHeightOffset.road,
    building: defaultLayerHeightOffset.building,
    other: defaultLayerHeightOffset.other
  };

  clearPinnedModel();

  const mode = angleModes[angleMode];
  currentY = mode.y;
  currentZ = mode.z;

  extractMeshesToProxy(false);

  statusEl.textContent =
    '表示リセットしました。\n' +
    'X軸180度反転、平行表示に戻しました。\n' +
    '固定も解除しました。';
});

markerEl.addEventListener('targetFound', () => {
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'block';

  modelBounds.setAttribute('visible', 'false');
  debugBox.setAttribute('visible', 'false');

  if (isPinned) {
    modelRoot.setAttribute('visible', 'false');
    pinnedRoot.setAttribute('visible', 'true');

    statusEl.textContent =
      '名刺を再認識しました。\n' +
      '現在は固定表示中です。\n' +
      '追従表示に戻す場合は「固定解除」を押してください。';
  } else {
    modelRoot.setAttribute('visible', 'true');

    if (!proxyGroup && modelLoaded) {
      extractMeshesToProxy(false);
    }

    statusEl.textContent =
      '潮見ジオラマを発見しました。\n' +
      '固定したい場合は「この位置に固定」または「タップ位置に固定」を押してください。';
  }

  setTimeout(() => {
    foundBanner.style.display = 'none';
  }, 2000);
});

markerEl.addEventListener('targetLost', () => {
  if (!arStarted) return;

  foundBanner.style.display = 'none';

  if (isPinned) {
    targetGuide.style.display = 'none';
    pinnedRoot.setAttribute('visible', 'true');
    modelRoot.setAttribute('visible', 'false');

    statusEl.textContent =
      '名刺を見失いましたが、固定モデルを表示しています。\n' +
      '追従表示に戻す場合は「固定解除」を押してください。';
    return;
  }

  targetGuide.style.display = 'block';

  statusEl.textContent =
    'マーカーを見失いました。\n' +
    '中央に入れてください。';
});

async function waitForMindARSystem() {
  for (let i = 0; i < 50; i++) {
    const sys = sceneEl.systems['mindar-image-system'];
    if (sys) return sys;
    await new Promise(r => setTimeout(r, 200));
  }
  return null;
}

startBtn.addEventListener('click', async () => {
  try {
    if (!window.isSecureContext) {
      statusEl.textContent =
        'HTTPSではありません。\n' +
        'https:// のURLで開いてください。';
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      statusEl.textContent =
        'このブラウザではカメラAPIが使えません。\n' +
        'iPhoneはSafari、AndroidはChromeで開いてください。';
      return;
    }

    if (!sceneLoaded) {
      statusEl.textContent =
        'A-Frameシーンの読み込みがまだ完了していません。\n' +
        '少し待つか、画面に表示されているエラーを確認してください。';
      return;
    }

    const mindar = await waitForMindARSystem();

    if (!mindar) {
      statusEl.textContent =
        'MindARシステムが見つかりません。\n' +
        'A-Frame / MindAR のscriptタグを確認してください。';
      return;
    }

    targetGuide.style.display = 'block';
    statusEl.textContent =
      'カメラを起動しています。\n' +
      'カメラ許可をしてください。';

    await mindar.start();

    arStarted = true;

    statusEl.textContent =
      '探索中です。\n' +
      'マーカーを画面中央に入れてください。';

  } catch (err) {
    console.error(err);

    statusEl.textContent =
      'カメラ開始に失敗しました。\n' +
      (err.message || String(err));
  }
});

stopBtn.addEventListener('click', () => {
  const sys = sceneEl.systems['mindar-image-system'];

  if (sys) {
    sys.stop();
  }

  arStarted = false;
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'none';

  statusEl.textContent = '停止しました。';
});

checkBtn.addEventListener('click', () => {
  const mindar = sceneEl.systems['mindar-image-system'];
  const counts = countSourceMeshes();

  let proxyChildren = 0;

  if (proxyGroup) {
    proxyChildren = proxyGroup.children.length;
  }

  statusEl.textContent =
    '状態確認\n' +
    'HTTPS: ' + window.isSecureContext + '\n' +
    'sceneLoaded: ' + sceneLoaded + '\n' +
    'MindAR: ' + Boolean(mindar) + '\n' +
    'modelLoaded: ' + modelLoaded + '\n' +
    'source childCount: ' + counts.childCount + '\n' +
    'source meshCount: ' + counts.meshCount + '\n' +
    'source visibleMeshCount: ' + counts.visibleMeshCount + '\n' +
    'proxyGroup: ' + Boolean(proxyGroup) + '\n' +
    'proxy children: ' + proxyChildren + '\n' +
    'isPinned: ' + isPinned + '\n' +
    'waitingForTapPlacement: ' + waitingForTapPlacement + '\n' +
    'rootScale: ' + rootScale.toFixed(3) + '\n' +
    'innerScale: ' + innerScale.toFixed(4) + '\n' +
    'X: ' + currentX.toFixed(3) + '\n' +
    'Y: ' + currentY.toFixed(3) + '\n' +
    'Z: ' + currentZ.toFixed(3) + '\n' +
    '角度: ' + angleModes[angleMode].name + '\n' +
    '建物判定: ' + buildingSplitRatio.toFixed(2) + '\n' +
    '土地高さ: ' + layerHeightOffset.land.toFixed(3) + '\n' +
    '道路高さ: ' + layerHeightOffset.road.toFixed(3) + '\n' +
    '建物高さ: ' + layerHeightOffset.building.toFixed(3) + '\n' +
    'X軸反転: ' + baseFlipXDeg + '度\n' +
    '回転: ' + (yawMode % 2 === 0 ? '0度' : '180度') + '\n' +
    'box size: ' + boxSizeText + '\n' +
    'box center: ' + boxCenterText;
});
</script>

</body>
</html>
