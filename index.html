<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>潮見ジオラマ MindARモード</title>

<script>
window.__startupErrorText = "";

function setStatusSafe(text) {
  const el = document.querySelector("#status");
  if (el) {
    el.textContent = text;
  } else {
    window.__startupErrorText = text;
  }
}

window.addEventListener("error", function (e) {
  const msg =
    "JavaScriptエラーが発生しました。\n" +
    "message: " + e.message + "\n" +
    "file: " + e.filename + "\n" +
    "line: " + e.lineno + "\n" +
    "column: " + e.colno;

  console.error(msg);
  window.__startupErrorText = msg;
  setStatusSafe(msg);
});

window.addEventListener("unhandledrejection", function (e) {
  const msg =
    "Promiseエラーが発生しました。\n" +
    String(e.reason);

  console.error(msg);
  window.__startupErrorText = msg;
  setStatusSafe(msg);
});
</script>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

video {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

canvas.a-canvas {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 1 !important;
  background: transparent !important;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
  z-index: 1 !important;
  background: transparent !important;
}

#ui {
  position: fixed;
  inset: 0;
  z-index: 20;
  pointer-events: none;
}

#topPanel {
  position: fixed;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  pointer-events: auto;
}

button {
  border: none;
  border-radius: 999px;
  padding: 9px 12px;
  font-size: 13px;
  font-weight: 700;
  background: rgba(255,255,255,0.94);
  color: #111;
  box-shadow: 0 3px 12px rgba(0,0,0,0.3);
}

button:active {
  transform: scale(0.97);
}

#startBtn { background: #c40000; color: #fff; }
#stopBtn { background: #333; color: #fff; }
#fixedBtn { background: #1565c0; color: #fff; }
#resetBtn { background: #005bd3; color: #fff; }
#checkBtn { background: #00a36c; color: #fff; }
#rotateBtn { background: #673ab7; color: #fff; }
#angleBtn { background: #009688; color: #fff; }

#status {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 16px;
  color: #fff;
  background: rgba(0,0,0,0.84);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  pointer-events: none;
  max-height: 34vh;
  overflow: hidden;
}

#targetGuide {
  position: fixed;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%);
  width: 70vw;
  max-width: 360px;
  aspect-ratio: 2 / 3;
  border: 3px dashed rgba(255,255,255,0.82);
  border-radius: 16px;
  display: none;
  pointer-events: none;
}

#targetGuide::after {
  content: "名刺マーカーをこの枠に入れてください";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -34px;
  text-align: center;
  color: #fff;
  font-size: 13px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.8);
}

#foundBanner {
  position: fixed;
  top: 74px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 18px;
  border-radius: 999px;
  background: rgba(196,0,0,0.94);
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  display: none;
  pointer-events: none;
}
</style>
</head>

<body>
<div id="ui">
  <div id="topPanel">
    <button id="startBtn">開始</button>
    <button id="stopBtn">停止</button>

    <button id="largerBtn">＋</button>
    <button id="smallerBtn">－</button>
    <button id="frontBtn">前へ</button>
    <button id="backBtn">奥へ</button>
    <button id="upBtn">全体上へ</button>
    <button id="downBtn">全体下へ</button>

    <button id="rotateBtn">180度回転</button>
    <button id="angleBtn">角度切替</button>

    <button id="fixedBtn">床・机に固定AR</button>

    <button id="resetBtn">表示リセット</button>
    <button id="checkBtn">確認</button>
  </div>

  <div id="foundBanner">潮見ジオラマを発見！</div>
  <div id="targetGuide"></div>
  <div id="status">初期化中です。</div>
</div>

<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; maxTrack: 1; filterMinCF: 0.001; filterBeta: 0.01;"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true; preserveDrawingBuffer: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="markerTarget" mindar-image-target="targetIndex: 0">

    <a-light type="ambient" intensity="1.5"></a-light>
    <a-light type="directional" intensity="2.2" position="0.9 1.4 2.0"></a-light>
    <a-light type="directional" intensity="0.8" position="-1.2 -0.4 1.2"></a-light>

    <a-box
      id="debugBox"
      visible="false"
      position="0 0 0.08"
      width="0.06"
      height="0.06"
      depth="0.06"
      color="#ff0000">
    </a-box>

    <a-entity
      id="modelHolder"
      position="0 0 0.28"
      rotation="180 0 0"
      scale="1 1 1"
      visible="true">

      <a-entity
        id="shiomiMindAR"
        gltf-model="url(./shiomi_city.glb)"
        position="0 0 0"
        rotation="0 0 0"
        scale="1 1 1"
        visible="true">
      </a-entity>

    </a-entity>

    <a-text
      value="潮見ジオラマ"
      align="center"
      color="#FFEEAA"
      position="0 0.75 0.10"
      scale="0.55 0.55 0.55">
    </a-text>

  </a-entity>
</a-scene>

<script>
const sceneEl = document.querySelector("#arScene");
const markerEl = document.querySelector("#markerTarget");
const modelHolder = document.querySelector("#modelHolder");
const shiomiMindAR = document.querySelector("#shiomiMindAR");
const debugBox = document.querySelector("#debugBox");

const startBtn = document.querySelector("#startBtn");
const stopBtn = document.querySelector("#stopBtn");
const largerBtn = document.querySelector("#largerBtn");
const smallerBtn = document.querySelector("#smallerBtn");
const frontBtn = document.querySelector("#frontBtn");
const backBtn = document.querySelector("#backBtn");
const upBtn = document.querySelector("#upBtn");
const downBtn = document.querySelector("#downBtn");
const rotateBtn = document.querySelector("#rotateBtn");
const angleBtn = document.querySelector("#angleBtn");
const fixedBtn = document.querySelector("#fixedBtn");
const resetBtn = document.querySelector("#resetBtn");
const checkBtn = document.querySelector("#checkBtn");

const statusEl = document.querySelector("#status");
const targetGuide = document.querySelector("#targetGuide");
const foundBanner = document.querySelector("#foundBanner");

let sceneLoaded = false;
let modelLoaded = false;
let arStarted = false;

let currentScale = 1.0;
let autoFitScale = 1.0;

let currentX = 0.0;
let currentY = 0.0;
let currentZ = 0.28;

let yawMode = 0;
let angleMode = 0;

const angleModes = [
  {
    name: "平行表示",
    rotX: 180,
    z: 0.28,
    y: 0.00
  },
  {
    name: "やや斜め",
    rotX: 162,
    z: 0.36,
    y: 0.04
  },
  {
    name: "ローアングル",
    rotX: 148,
    z: 0.48,
    y: 0.08
  }
];

window.addEventListener("DOMContentLoaded", () => {
  statusEl.textContent =
    "HTMLは読み込まれました。\n" +
    "A-Frame / MindAR の初期化を待っています。";

  setTimeout(() => {
    if (!sceneLoaded && !window.__startupErrorText) {
      statusEl.textContent =
        "A-Frameシーンのloadedイベントを待っています。\n" +
        "この表示が続く場合は、CDN読み込み、scriptタグ、HTML構文を確認してください。";
    }
  }, 4000);
});

sceneEl.addEventListener("loaded", () => {
  sceneLoaded = true;
  statusEl.textContent =
    "A-Frameシーンを読み込みました。\n" +
    "開始ボタンを押してください。";
});

shiomiMindAR.addEventListener("model-loaded", () => {
  modelLoaded = true;
  fitMindARModel();

  statusEl.textContent =
    "shiomi_city.glb を読み込みました。\n" +
    "自動で中央寄せ・スケール調整しました。\n" +
    "開始ボタンを押して名刺マーカーにかざしてください。";
});

shiomiMindAR.addEventListener("model-error", (e) => {
  console.error("model-error", e);
  modelLoaded = false;
  statusEl.textContent =
    "shiomi_city.glb の読み込みに失敗しました。\n" +
    "index.html と同じフォルダに shiomi_city.glb があるか確認してください。";
});

function fitMindARModel() {
  const THREE = AFRAME.THREE;
  const obj = shiomiMindAR.object3D;

  obj.updateMatrixWorld(true);

  const box = new THREE.Box3().setFromObject(obj);

  if (!box || box.isEmpty()) {
    statusEl.textContent =
      "GLBのサイズ取得に失敗しました。\n" +
      "確認ボタンを押してください。";
    return;
  }

  const size = new THREE.Vector3();
  const center = new THREE.Vector3();

  box.getSize(size);
  box.getCenter(center);

  const maxDim = Math.max(size.x, size.y, size.z);

  if (!isFinite(maxDim) || maxDim <= 0) {
    statusEl.textContent =
      "GLBサイズが不正です。\n" +
      "maxDim: " + maxDim;
    return;
  }

  const desiredSize = 0.78;
  autoFitScale = desiredSize / maxDim;
  autoFitScale = Math.max(0.0001, Math.min(1000, autoFitScale));

  shiomiMindAR.object3D.position.set(-center.x, -center.y, -center.z);

  currentScale = autoFitScale;

  applyMindARTransform(false);
}

function applyMindARTransform(showMessage = true) {
  const angle = angleModes[angleMode];
  const rotZ = yawMode % 2 === 0 ? 0 : 180;

  currentY = angle.y;
  currentZ = angle.z;

  modelHolder.setAttribute("position", currentX + " " + currentY + " " + currentZ);
  modelHolder.setAttribute("rotation", angle.rotX + " 0 " + rotZ);
  modelHolder.setAttribute("scale", currentScale + " " + currentScale + " " + currentScale);

  if (showMessage) {
    statusEl.textContent =
      "MindAR表示を調整しました。\n" +
      "scale: " + currentScale.toFixed(6) + "\n" +
      "X: " + currentX.toFixed(3) + "\n" +
      "Y: " + currentY.toFixed(3) + "\n" +
      "Z: " + currentZ.toFixed(3) + "\n" +
      "角度: " + angle.name + "\n" +
      "回転: " + (yawMode % 2 === 0 ? "0度" : "180度");
  }
}

largerBtn.addEventListener("click", () => {
  currentScale = Math.min(1000, currentScale * 1.2);
  applyMindARTransform();
});

smallerBtn.addEventListener("click", () => {
  currentScale = Math.max(0.00001, currentScale / 1.2);
  applyMindARTransform();
});

frontBtn.addEventListener("click", () => {
  currentZ += 0.08;
  modelHolder.setAttribute("position", currentX + " " + currentY + " " + currentZ);
  statusEl.textContent =
    "全体を前へ移動しました。\n" +
    "Z: " + currentZ.toFixed(3);
});

backBtn.addEventListener("click", () => {
  currentZ -= 0.08;
  modelHolder.setAttribute("position", currentX + " " + currentY + " " + currentZ);
  statusEl.textContent =
    "全体を奥へ移動しました。\n" +
    "Z: " + currentZ.toFixed(3);
});

upBtn.addEventListener("click", () => {
  currentY += 0.08;
  modelHolder.setAttribute("position", currentX + " " + currentY + " " + currentZ);
  statusEl.textContent =
    "全体を上へ移動しました。\n" +
    "Y: " + currentY.toFixed(3);
});

downBtn.addEventListener("click", () => {
  currentY -= 0.08;
  modelHolder.setAttribute("position", currentX + " " + currentY + " " + currentZ);
  statusEl.textContent =
    "全体を下へ移動しました。\n" +
    "Y: " + currentY.toFixed(3);
});

rotateBtn.addEventListener("click", () => {
  yawMode = (yawMode + 1) % 2;
  applyMindARTransform();

  statusEl.textContent =
    "モデルをZ軸で180度回転しました。\n" +
    "現在: " + (yawMode % 2 === 0 ? "0度" : "180度");
});

angleBtn.addEventListener("click", () => {
  angleMode = (angleMode + 1) % angleModes.length;
  applyMindARTransform();

  statusEl.textContent =
    "角度を切り替えました。\n" +
    "現在: " + angleModes[angleMode].name;
});

resetBtn.addEventListener("click", () => {
  currentScale = autoFitScale || 1.0;
  currentX = 0.0;
  currentY = 0.0;
  currentZ = 0.28;
  yawMode = 0;
  angleMode = 0;

  applyMindARTransform(false);

  statusEl.textContent =
    "MindAR表示をリセットしました。\n" +
    "自動スケール値に戻しました。";
});

fixedBtn.addEventListener("click", () => {
  location.href = "./fixed.html";
});

markerEl.addEventListener("targetFound", () => {
  targetGuide.style.display = "none";
  foundBanner.style.display = "block";

  modelHolder.setAttribute("visible", "true");

  statusEl.textContent =
    "潮見ジオラマを発見しました。\n" +
    "MindARモードでは＋／－等で操作できます。\n" +
    "床や机に固定したい場合は「床・机に固定AR」を押してください。";

  setTimeout(() => {
    foundBanner.style.display = "none";
  }, 2000);
});

markerEl.addEventListener("targetLost", () => {
  if (!arStarted) return;

  foundBanner.style.display = "none";
  targetGuide.style.display = "block";

  statusEl.textContent =
    "マーカーを見失いました。\n" +
    "もう一度マーカーを画面中央に入れてください。";
});

async function waitForMindARSystem() {
  for (let i = 0; i < 50; i++) {
    const sys = sceneEl.systems["mindar-image-system"];
    if (sys) return sys;
    await new Promise(r => setTimeout(r, 200));
  }

  return null;
}

startBtn.addEventListener("click", async () => {
  try {
    if (!window.isSecureContext) {
