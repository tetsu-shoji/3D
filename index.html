<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>潮見ジオラマ AR MindAR＋固定AR安定版</title>

<script>
window.__startupErrorText = "";

function setStatusSafe(text) {
  const el = document.querySelector("#status");
  if (el) {
    el.textContent = text;
  } else {
    window.__startupErrorText = text;
  }
}

window.addEventListener("error", function (e) {
  const msg =
    "JavaScriptエラーが発生しました。\n" +
    "message: " + e.message + "\n" +
    "file: " + e.filename + "\n" +
    "line: " + e.lineno + "\n" +
    "column: " + e.colno;

  console.error(msg);
  window.__startupErrorText = msg;
  setStatusSafe(msg);
});

window.addEventListener("unhandledrejection", function (e) {
  const msg =
    "Promiseエラーが発生しました。\n" +
    String(e.reason);

  console.error(msg);
  window.__startupErrorText = msg;
  setStatusSafe(msg);
});

window.addEventListener("DOMContentLoaded", function () {
  const el = document.querySelector("#status");
  if (el) {
    if (window.__startupErrorText) {
      el.textContent = window.__startupErrorText;
    } else {
      el.textContent =
        "HTMLは読み込まれました。\n" +
        "A-Frame / MindAR / model-viewer の初期化を待っています。";
    }
  }
});
</script>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

video {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

canvas.a-canvas {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 1 !important;
  background: transparent !important;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
  z-index: 1 !important;
  background: transparent !important;
}

#ui {
  position: fixed;
  inset: 0;
  z-index: 20;
  pointer-events: none;
}

#topPanel {
  position: fixed;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  pointer-events: auto;
}

button {
  border: none;
  border-radius: 999px;
  padding: 9px 12px;
  font-size: 13px;
  font-weight: 700;
  color: #111;
  background: rgba(255,255,255,0.94);
  box-shadow: 0 3px 12px rgba(0,0,0,0.3);
}

button:active {
  transform: scale(0.97);
}

#startBtn { background: #c40000; color: #fff; }
#stopBtn { background: #333; color: #fff; }
#fixedModeBtn { background: #1565c0; color: #fff; }
#fixedCloseBtn { background: #424242; color: #fff; }
#resetBtn { background: #005bd3; color: #fff; }
#checkBtn { background: #00a36c; color: #fff; }
#rotateBtn { background: #673ab7; color: #fff; }
#angleBtn { background: #009688; color: #fff; }

#status {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 16px;
  color: #fff;
  background: rgba(0,0,0,0.84);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  pointer-events: none;
  max-height: 34vh;
  overflow: hidden;
}

#targetGuide {
  position: fixed;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%);
  width: 70vw;
  max-width: 360px;
  aspect-ratio: 2 / 3;
  border: 3px dashed rgba(255,255,255,0.82);
  border-radius: 16px;
  display: none;
  pointer-events: none;
}

#targetGuide::after {
  content: "名刺マーカーをこの枠に入れてください";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -34px;
  text-align: center;
  color: #fff;
  font-size: 13px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.8);
}

#foundBanner {
  position: fixed;
  top: 74px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 18px;
  border-radius: 999px;
  background: rgba(196,0,0,0.94);
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  display: none;
  pointer-events: none;
}

#fixedViewerOverlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: #111;
  display: none;
  flex-direction: column;
}

#fixedHeader {
  color: #fff;
  background: #17324d;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.5;
}

#fixedViewerArea {
  position: relative;
  flex: 1;
  background: #f2f2f2;
}

#fixedViewer {
  width: 100%;
  height: 100%;
  background: #f2f2f2;
}

#fixedButtons {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 18px;
  display: flex;
  gap: 8px;
  justify-content: center;
  pointer-events: auto;
}

#arLaunchBtn {
  background: #c40000;
  color: #fff;
  border-radius: 999px;
  padding: 12px 18px;
  font-size: 15px;
  font-weight: 800;
}

#fixedCloseBtn {
  border-radius: 999px;
  padding: 12px 18px;
  font-size: 15px;
  font-weight: 800;
}

#fixedNote {
  color: #fff;
  background: #222;
  padding: 9px 12px;
  font-size: 12px;
  line-height: 1.5;
}
</style>
</head>

<body>

<div id="ui">
  <div id="topPanel">
    <button id="startBtn">開始</button>
    <button id="stopBtn">停止</button>

    <button id="largerBtn">＋</button>
    <button id="smallerBtn">－</button>
    <button id="frontBtn">前へ</button>
    <button id="backBtn">奥へ</button>
    <button id="upBtn">全体上へ</button>
    <button id="downBtn">全体下へ</button>

    <button id="rotateBtn">180度回転</button>
    <button id="angleBtn">角度切替</button>

    <button id="fixedModeBtn">床・机に固定AR</button>

    <button id="resetBtn">表示リセット</button>
    <button id="checkBtn">確認</button>
  </div>

  <div id="foundBanner">潮見ジオラマを発見！</div>
  <div id="targetGuide"></div>
  <div id="status">初期化中です。</div>
</div>

<div id="fixedViewerOverlay">
  <div id="fixedHeader">
    固定ARモード<br>
    デフォルトの shiomi_city.glb を使って、床・机などにAR配置します。
  </div>

  <div id="fixedViewerArea">
    ./shiomi_city.glb

      <button id="arLaunchBtn" slot="ar-button">
        ARで床・机に配置
      </button>

    </model-viewer>

    <div id="fixedButtons">
      <button id="fixedCloseBtn">固定解除してMindARに戻る</button>
    </div>
  </div>

  <div id="fixedNote">
    Android Chrome + ARCore対応端末では床・机などの水平面に配置できる場合があります。
    iPhoneではQuick Lookに切り替わる場合があり、USDZがないと動作が制限されることがあります。
  </div>
</div>

<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; maxTrack: 1; filterMinCF: 0.001; filterBeta: 0.01;"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true; preserveDrawingBuffer: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="markerTarget" mindar-image-target="targetIndex: 0">

    <a-light type="ambient" intensity="1.4"></a-light>
    <a-light type="directional" intensity="2.2" position="0.9 1.4 2.0"></a-light>
    <a-light type="directional" intensity="0.8" position="-1.2 -0.4 1.2"></a-light>

    <a-entity
      id="shiomiMindAR"
      gltf-model="url(./shiomi_city.glb)"
      position="0 0 0.28"
      rotation="180 0 0"
      scale="0.78 0.78 0.78"
      visible="true">
    </a-entity>

    <a-text
      value="潮見ジオラマ"
      align="center"
      color="#FFEEAA"
      position="0 0.75 0.10"
      scale="0.55 0.55 0.55">
    </a-text>

  </a-entity>
</a-scene>

<script>
const sceneEl = document.querySelector("#arScene");
const markerEl = document.querySelector("#markerTarget");
const shiomiMindAR = document.querySelector("#shiomiMindAR");

const startBtn = document.querySelector("#startBtn");
const stopBtn = document.querySelector("#stopBtn");

const largerBtn = document.querySelector("#largerBtn");
const smallerBtn = document.querySelector("#smallerBtn");
const frontBtn = document.querySelector("#frontBtn");
const backBtn = document.querySelector("#backBtn");
const upBtn = document.querySelector("#upBtn");
const downBtn = document.querySelector("#downBtn");

const rotateBtn = document.querySelector("#rotateBtn");
const angleBtn = document.querySelector("#angleBtn");

const fixedModeBtn = document.querySelector("#fixedModeBtn");
const fixedViewerOverlay = document.querySelector("#fixedViewerOverlay");
const fixedViewer = document.querySelector("#fixedViewer");
const fixedCloseBtn = document.querySelector("#fixedCloseBtn");

const resetBtn = document.querySelector("#resetBtn");
const checkBtn = document.querySelector("#checkBtn");

const statusEl = document.querySelector("#status");
const targetGuide = document.querySelector("#targetGuide");
const foundBanner = document.querySelector("#foundBanner");

let sceneLoaded = false;
let modelLoaded = false;
let arStarted = false;
let wasMindARActiveBeforeFixed = false;

let currentScale = 0.78;
let currentX = 0.0;
let currentY = 0.0;
let currentZ = 0.28;
let yawMode = 0;
let angleMode = 0;

const angleModes = [
  {
    name: "平行表示",
    rotX: 180,
    z: 0.28,
    y: 0.00
  },
  {
    name: "やや斜め",
    rotX: 162,
    z: 0.36,
    y: 0.04
  },
  {
    name: "ローアングル",
    rotX: 148,
    z: 0.48,
    y: 0.08
  }
];

window.addEventListener("DOMContentLoaded", () => {
  statusEl.textContent =
    "HTMLは読み込まれました。\n" +
    "A-Frame / MindAR / model-viewer の初期化を待っています。";

  setTimeout(() => {
    if (!sceneLoaded && !window.__startupErrorText) {
      statusEl.textContent =
        "A-Frameシーンのloadedイベントを待っています。\n" +
        "この表示が続く場合は、CDN読み込み、scriptタグ、HTML構文を確認してください。";
    }
  }, 4000);
});

window.addEventListener("load", () => {
  if (!sceneLoaded && !window.__startupErrorText) {
    statusEl.textContent =
      "ページ全体は読み込まれましたが、A-Frameシーンの初期化待ちです。\n" +
      "少し待ってから開始ボタンを押してください。";
  }
});

sceneEl.addEventListener("loaded", () => {
  sceneLoaded = true;
  statusEl.textContent =
    "A-Frameシーンを読み込みました。\n" +
    "MindARモードでは＋／－等で操作できます。\n" +
    "床・机に固定したい場合は「床・机に固定AR」を押してください。";
});

shiomiMindAR.addEventListener("model-loaded", () => {
  modelLoaded = true;
  statusEl.textContent =
    "shiomi_city.glb を読み込みました。\n" +
    "開始ボタンを押して名刺マーカーにかざしてください。";
});

shiomiMindAR.addEventListener("model-error", (e) => {
  console.error("model-error", e);
  modelLoaded = false;
  statusEl.textContent =
    "shiomi_city.glb の読み込みに失敗しました。\n" +
    "index.html と同じフォルダに shiomi_city.glb があるか確認してください。";
});

if (fixedViewer) {
  fixedViewer.addEventListener("load", () => {
    console.log("model-viewer loaded");
  });

  fixedViewer.addEventListener("error", () => {
    statusEl.textContent =
      "固定AR用の model-viewer でGLBを読み込めませんでした。\n" +
      "shiomi_city.glb が index.html と同じフォルダにあるか確認してください。";
  });

  fixedViewer.addEventListener("ar-status", (event) => {
    const status = event.detail.status;

    if (status === "session-started") {
      statusEl.textContent =
        "固定ARを開始しました。\n" +
        "床・机などの水平面を認識して、モデルを配置してください。";
    }

    if (status === "object-placed") {
      statusEl.textContent =
        "AR空間にモデルを配置しました。\n" +
        "この固定は model-viewer 側のAR機能による配置です。";
    }

    if (status === "not-presenting") {
      statusEl.textContent =
        "固定ARを終了しました。\n" +
        "MindARモードに戻るには「固定解除してMindARに戻る」を押してください。";
    }

    if (status === "failed") {
      statusEl.textContent =
        "固定ARの起動に失敗しました。\n" +
        "Android Chrome、ARCore対応端末、HTTPS、カメラ許可を確認してください。";
    }
  });
} else {
  statusEl.textContent =
    "fixedViewer が見つかりません。\n" +
    "<model-viewer id=\"fixedViewer\"> のタグを確認してください。";
}

function applyMindARTransform(showMessage = true) {
  const angle = angleModes[angleMode];
  const rotZ = yawMode % 2 === 0 ? 0 : 180;

  currentY = angle.y;
  currentZ = angle.z;

  shiomiMindAR.setAttribute("position", currentX + " " + currentY + " " + currentZ);
  shiomiMindAR.setAttribute("rotation", angle.rotX + " 0 " + rotZ);
  shiomiMindAR.setAttribute("scale", currentScale + " " + currentScale + " " + currentScale);

  if (showMessage) {
    statusEl.textContent =
      "MindAR表示を調整しました。\n" +
      "scale: " + currentScale.toFixed(3) + "\n" +
      "X: " + currentX.toFixed(3) + "\n" +
      "Y: " + currentY.toFixed(3) + "\n" +
      "Z: " + currentZ.toFixed(3) + "\n" +
      "角度: " + angle.name + "\n" +
      "回転: " + (yawMode % 2 === 0 ? "0度" : "180度");
  }
}

largerBtn.addEventListener("click", () => {
  currentScale = Math.min(20, currentScale * 1.2);
  applyMindARTransform();
});

smallerBtn.addEventListener("click", () => {
  currentScale = Math.max(0.001, currentScale / 1.2);
  applyMindARTransform();
});

frontBtn.addEventListener("click", () => {
  currentZ += 0.08;
  applyMindARTransform();
});

backBtn.addEventListener("click", () => {
  currentZ -= 0.08;
  applyMindARTransform();
});

upBtn.addEventListener("click", () => {
  currentY += 0.08;
  shiomiMindAR.setAttribute("position", currentX + " " + currentY + " " + currentZ);
  statusEl.textContent =
    "全体を上へ移動しました。\n" +
    "Y: " + currentY.toFixed(3);
});

downBtn.addEventListener("click", () => {
  currentY -= 0.08;
  shiomiMindAR.setAttribute("position", currentX + " " + currentY + " " + currentZ);
  statusEl.textContent =
    "全体を下へ移動しました。\n" +
    "Y: " + currentY.toFixed(3);
});

rotateBtn.addEventListener("click", () => {
  yawMode = (yawMode + 1) % 2;
  applyMindARTransform();

  statusEl.textContent =
    "モデルをZ軸で180度回転しました。\n" +
    "現在: " + (yawMode % 2 === 0 ? "0度" : "180度");
});

angleBtn.addEventListener("click", () => {
  angleMode = (angleMode + 1) % angleModes.length;
  applyMindARTransform();

  statusEl.textContent =
    "角度を切り替えました。\n" +
    "現在: " + angleModes[angleMode].name;
});

resetBtn.addEventListener("click", () => {
  currentScale = 0.78;
  currentX = 0.0;
  currentY = 0.0;
  currentZ = 0.28;
  yawMode = 0;
  angleMode = 0;
  applyMindARTransform(false);

  statusEl.textContent =
    "MindAR表示をリセットしました。\n" +
    "固定ARモードは閉じていません。";
});

fixedModeBtn.addEventListener("click", async () => {
  wasMindARActiveBeforeFixed = arStarted;

  const sys = sceneEl.systems["mindar-image-system"];
  if (sys && arStarted) {
    sys.stop();
    arStarted = false;
  }

  targetGuide.style.display = "none";
  foundBanner.style.display = "none";
  fixedViewerOverlay.style.display = "flex";

  statusEl.textContent =
    "固定ARモードを表示しました。\n" +
    "画面下の「ARで床・机に配置」を押してください。\n" +
    "このモードではデフォルトの shiomi_city.glb を使用します。";

  if (fixedViewer && typeof fixedViewer.activateAR === "function") {
    try {
      await fixedViewer.activateAR();
    } catch (e) {
      console.warn(e);
      statusEl.textContent =
        "固定ARモードを表示しました。\n" +
        "自動起動はできませんでした。\n" +
        "画面下の「ARで床・机に配置」を押してください。";
    }
  }
});

fixedCloseBtn.addEventListener("click", async () => {
  fixedViewerOverlay.style.display = "none";

  if (wasMindARActiveBeforeFixed) {
    const sys = await waitForMindARSystem();
    if (sys) {
      try {
        targetGuide.style.display = "block";
        statusEl.textContent =
          "MindARモードへ戻しています。\n" +
          "名刺マーカーを画面中央に入れてください。";

        await sys.start();
        arStarted = true;
      } catch (e) {
        statusEl.textContent =
          "MindARの再開に失敗しました。\n" +
          "開始ボタンを押して再開してください。\n" +
          String(e);
      }
    }
  } else {
    statusEl.textContent =
      "固定ARモードを閉じました。\n" +
      "MindARを使う場合は開始ボタンを押してください。";
  }
});

markerEl.addEventListener("targetFound", () => {
  targetGuide.style.display = "none";
  foundBanner.style.display = "block";

  shiomiMindAR.setAttribute("visible", "true");

  statusEl.textContent =
    "潮見ジオラマを発見しました。\n" +
    "MindARモードでは＋／－等で操作できます。\n" +
    "床や机に固定したい場合は「床・机に固定AR」を押してください。";

  setTimeout(() => {
    foundBanner.style.display = "none";
  }, 2000);
});

markerEl.addEventListener("targetLost", () => {
  if (!arStarted) return;

  foundBanner.style.display = "none";
  targetGuide.style.display = "block";

  statusEl.textContent =
    "マーカーを見失いました。\n" +
    "MindARモードでは、もう一度マーカーを画面中央に入れてください。";
});

async function waitForMindARSystem() {
  for (let i = 0; i < 50; i++) {
    const sys = sceneEl.systems["mindar-image-system"];
    if (sys) return sys;
    await new Promise(r => setTimeout(r, 200));
  }
  return null;
}

startBtn.addEventListener("click", async () => {
  try {
    if (!window.isSecureContext) {
      statusEl.textContent =
        "HTTPSではありません。\n" +
        "https:// のURLで開いてください。";
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      statusEl.textContent =
        "このブラウザではカメラAPIが使えません。\n" +
        "iPhoneはSafari、AndroidはChromeで開いてください。";
      return;
    }

    if (!sceneLoaded) {
      statusEl.textContent =
        "A-Frameシーンの読み込みがまだ完了していません。\n" +
        "少し待つか、画面に表示されているエラーを確認してください。";
      return;
    }

    const mindar = await waitForMindARSystem();

    if (!mindar) {
      statusEl.textContent =
        "MindARシステムが見つかりません。\n" +
        "A-Frame / MindAR のscriptタグを確認してください。";
      return;
    }

    targetGuide.style.display = "block";

    statusEl.textContent =
      "カメラを起動しています。\n" +
      "カメラ許可をしてください。";

    await mindar.start();

    arStarted = true;

    statusEl.textContent =
      "探索中です。\n" +
      "マーカーを画面中央に入れてください。";

  } catch (err) {
    console.error(err);

    statusEl.textContent =
      "カメラ開始に失敗しました。\n" +
      (err.message || String(err));
  }
});

stopBtn.addEventListener("click", () => {
  const sys = sceneEl.systems["mindar-image-system"];

  if (sys) {
    sys.stop();
  }

  arStarted = false;
  targetGuide.style.display = "none";
  foundBanner.style.display = "none";

  statusEl.textContent = "停止しました。";
});

checkBtn.addEventListener("click", async () => {
  const mindar = sceneEl.systems["mindar-image-system"];

  let fileStatus = "";

  try {
    const markerRes = await fetch("./marker.mind", { cache: "no-store" });
    const glbRes = await fetch("./shiomi_city.glb", { cache: "no-store" });

    fileStatus =
      "marker.mind: HTTP " + markerRes.status + "\n" +
      "shiomi_city.glb: HTTP " + glbRes.status + "\n";
  } catch (e) {
    fileStatus =
      "ファイル確認でfetch失敗。\n" +
      String(e) + "\n";
  }

  statusEl.textContent =
    "状態確認\n" +
    "HTTPS: " + window.isSecureContext + "\n" +
    "sceneLoaded: " + sceneLoaded + "\n" +
    "MindAR: " + Boolean(mindar) + "\n" +
    "modelLoaded: " + modelLoaded + "\n" +
    "fixedViewer: " + Boolean(fixedViewer) + "\n" +
    "arStarted: " + arStarted + "\n" +
    "scale: " + currentScale.toFixed(3) + "\n" +
    "X: " + currentX.toFixed(3) + "\n" +
    "Y: " + currentY.toFixed(3) + "\n" +
    "Z: " + currentZ.toFixed(3) + "\n" +
    "角度: " + angleModes[angleMode].name + "\n" +
    "回転: " + (yawMode % 2 === 0 ? "0度" : "180度") + "\n\n" +
    "ファイル確認:\n" +
    fileStatus;
});
</script>

</body>
