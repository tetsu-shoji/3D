<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>潮見ジオラマ AR GLB読込確認版</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- A-Frame Extras -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

video {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: 0 !important;
}

canvas.a-canvas {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 1 !important;
  background: transparent !important;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
  z-index: 1 !important;
  background: transparent !important;
}

#ui {
  position: fixed;
  inset: 0;
  z-index: 20;
  pointer-events: none;
}

#topPanel {
  position: fixed;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  pointer-events: auto;
}

button {
  border: none;
  border-radius: 999px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 700;
  color: #111;
  background: rgba(255,255,255,0.94);
  box-shadow: 0 3px 12px rgba(0,0,0,0.3);
}

button:active {
  transform: scale(0.97);
}

#startBtn {
  background: #c40000;
  color: #fff;
}

#stopBtn {
  background: #333;
  color: #fff;
}

#status {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 16px;
  color: #fff;
  background: rgba(0,0,0,0.78);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  pointer-events: none;
}

#targetGuide {
  position: fixed;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%);
  width: 70vw;
  max-width: 360px;
  aspect-ratio: 2 / 3;
  border: 3px dashed rgba(255,255,255,0.82);
  border-radius: 16px;
  display: none;
  pointer-events: none;
}

#targetGuide::after {
  content: "マーカーをこの枠に合わせてください";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -34px;
  text-align: center;
  color: #fff;
  font-size: 13px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.8);
}

#foundBanner {
  position: fixed;
  top: 74px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 18px;
  border-radius: 999px;
  background: rgba(196,0,0,0.94);
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  display: none;
  pointer-events: none;
}
</style>
</head>

<body>
<div id="ui">
  <div id="topPanel">
    <button id="startBtn">開始</button>
    <button id="stopBtn">停止</button>
    <button id="largerBtn">＋</button>
    <button id="smallerBtn">－</button>
    <button id="frontBtn">前へ</button>
    <button id="backBtn">奥へ</button>
    <button id="upBtn">上へ</button>
    <button id="downBtn">下へ</button>
    <button id="resetBtn">表示リセット</button>
    <button id="checkBtn">確認</button>
  </div>

  <div id="foundBanner">潮見ジオラマを発見！</div>
  <div id="targetGuide"></div>
  <div id="status">初期化中です。</div>
</div>

<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; maxTrack: 1; filterMinCF: 0.001; filterBeta: 0.01;"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true; preserveDrawingBuffer: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="markerTarget" mindar-image-target="targetIndex: 0">

    <!-- 光源 -->
    <a-light type="ambient" intensity="2.2"></a-light>
    <a-light type="directional" intensity="2.4" position="0 1 2"></a-light>
    <a-light type="point" intensity="1.8" position="0 0 1"></a-light>

    <!-- 赤い箱：AR基準点 -->
    <a-box
      id="debugBox"
      position="0 0 0.08"
      width="0.07"
      height="0.07"
      depth="0.07"
      color="#ff0000">
    </a-box>

    <!-- 水色ワイヤー箱：モデルを出したい範囲 -->
    <a-box
      id="modelBounds"
      position="0 0 0.35"
      width="0.8"
      height="0.8"
      depth="0.8"
      material="color: #00ffff; wireframe: true; transparent: true; opacity: 0.9;">
    </a-box>

    <!-- モデル親 -->
    <a-entity
      id="modelRoot"
      position="0 0 0.35"
      rotation="0 0 0"
      scale="1 1 1"
      visible="true">

      <!-- GLB本体：asset経由ではなく直接URLで読み込む -->
      <a-entity
        id="shiomi"
        gltf-model="url(./shiomi_city.glb)"
        position="0 0 0"
        rotation="0 180 0"
        scale="1 1 1"
        animation-mixer>
      </a-entity>

    </a-entity>

    <a-text
      value="潮見ジオラマ"
      align="center"
      color="#FFEEAA"
      position="0 0.75 0.10"
      scale="0.55 0.55 0.55">
    </a-text>

  </a-entity>
</a-scene>

<script>
const sceneEl = document.querySelector('#arScene');
const markerEl = document.querySelector('#markerTarget');
const modelRoot = document.querySelector('#modelRoot');
const modelEl = document.querySelector('#shiomi');
const debugBox = document.querySelector('#debugBox');
const modelBounds = document.querySelector('#modelBounds');

const startBtn = document.querySelector('#startBtn');
const stopBtn = document.querySelector('#stopBtn');
const largerBtn = document.querySelector('#largerBtn');
const smallerBtn = document.querySelector('#smallerBtn');
const frontBtn = document.querySelector('#frontBtn');
const backBtn = document.querySelector('#backBtn');
const upBtn = document.querySelector('#upBtn');
const downBtn = document.querySelector('#downBtn');
const resetBtn = document.querySelector('#resetBtn');
const checkBtn = document.querySelector('#checkBtn');

const statusEl = document.querySelector('#status');
const targetGuide = document.querySelector('#targetGuide');
const foundBanner = document.querySelector('#foundBanner');

let sceneLoaded = false;
let modelLoaded = false;
let arStarted = false;

let rootScale = 1.0;
let currentX = 0.0;
let currentY = 0.0;
let currentZ = 0.35;

let autoInnerScale = 1.0;

window.addEventListener('load', () => {
  statusEl.textContent =
    'ページを読み込みました。\n' +
    '開始ボタンを押してください。';
});

sceneEl.addEventListener('loaded', () => {
  sceneLoaded = true;
  statusEl.textContent =
    'A-Frameシーンを読み込みました。\n' +
    '開始できます。';
});

function countMeshes() {
  const obj = modelEl.object3D;
  let meshCount = 0;
  let visibleMeshCount = 0;
  let childCount = 0;

  obj.traverse((node) => {
    childCount++;

    if (node.isMesh) {
      meshCount++;
      if (node.visible) {
        visibleMeshCount++;
      }
    }
  });

  return { meshCount, visibleMeshCount, childCount };
}

function forceMaterialVisible() {
  const THREE = AFRAME.THREE;
  const obj = modelEl.object3D;

  obj.traverse((node) => {
    node.visible = true;
    node.frustumCulled = false;

    if (node.isMesh && node.material) {
      const materials = Array.isArray(node.material) ? node.material : [node.material];

      materials.forEach((mat) => {
        mat.side = THREE.DoubleSide;
        mat.transparent = false;
        mat.opacity = 1;
        mat.depthTest = true;
        mat.depthWrite = true;

        if (mat.color) {
          const tooDark = mat.color.r < 0.03 && mat.color.g < 0.03 && mat.color.b < 0.03;
          if (tooDark) {
            mat.color.set('#dddddd');
          }
        }

        mat.needsUpdate = true;
      });
    }
  });
}

function fitModelToView() {
  const THREE = AFRAME.THREE;
  const obj = modelEl.object3D;

  forceMaterialVisible();

  obj.updateMatrixWorld(true);

  const counts = countMeshes();

  if (counts.meshCount === 0) {
    statusEl.textContent =
      'GLBは読み込みイベントが出ましたが、メッシュが0です。\n' +
      'この場合、位置やスケールではなく、GLBファイルの読み込み形式・中身の問題です。\n' +
      'まずブラウザで shiomi_city.glb を直接開けるか確認してください。\n\n' +
      'childCount: ' + counts.childCount + '\n' +
      'meshCount: ' + counts.meshCount;
    return;
  }

  const box = new THREE.Box3().setFromObject(obj);
  const size = new THREE.Vector3();
  const center = new THREE.Vector3();

  box.getSize(size);
  box.getCenter(center);

  const maxDim = Math.max(size.x, size.y, size.z);

  if (!isFinite(maxDim) || maxDim <= 0) {
    statusEl.textContent =
      'メッシュはありますが、サイズ取得に失敗しました。\n' +
      '手動表示にします。';

    autoInnerScale = 1.0;
    modelEl.object3D.position.set(0, 0, 0);
    modelEl.object3D.scale.set(1, 1, 1);
    return;
  }

  const desiredSize = 0.75;
  autoInnerScale = desiredSize / maxDim;

  autoInnerScale = Math.max(0.001, Math.min(50, autoInnerScale));

  modelEl.object3D.position.set(
    -center.x * autoInnerScale,
    -center.y * autoInnerScale,
    -center.z * autoInnerScale
  );

  modelEl.object3D.scale.set(autoInnerScale, autoInnerScale, autoInnerScale);

  statusEl.textContent =
    'GLBメッシュを検出しました。\n' +
    '表示範囲へ自動配置しました。\n' +
    'meshCount: ' + counts.meshCount + '\n' +
    'visibleMeshCount: ' + counts.visibleMeshCount + '\n' +
    'maxDim: ' + maxDim.toFixed(4) + '\n' +
    'innerScale: ' + autoInnerScale.toFixed(4);
}

modelEl.addEventListener('model-loaded', () => {
  modelLoaded = true;

  statusEl.textContent =
    'GLB読み込みイベントが発生しました。\n' +
    'メッシュを確認しています。';

  setTimeout(() => {
    fitModelToView();
  }, 500);
});

modelEl.addEventListener('model-error', (e) => {
  console.error('model-error', e);

  modelLoaded = false;

  statusEl.textContent =
    'GLBの読み込みに失敗しました。\n' +
    '確認してください：\n' +
    '1. shiomi_city.glb が index.html と同じフォルダにあるか\n' +
    '2. ファイル名の大文字小文字が一致しているか\n' +
    '3. ブラウザで shiomi_city.glb を直接開けるか\n' +
    '4. GLBが壊れていないか';
});

function applyRootTransform() {
  modelRoot.object3D.position.set(currentX, currentY, currentZ);
  modelRoot.object3D.scale.set(rootScale, rootScale, rootScale);

  modelBounds.object3D.position.set(currentX, currentY, currentZ);
  modelBounds.object3D.scale.set(rootScale, rootScale, rootScale);

  statusEl.textContent =
    '表示調整中です。\n' +
    'rootScale: ' + rootScale.toFixed(3) + '\n' +
    'X: ' + currentX.toFixed(3) + '\n' +
    'Y: ' + currentY.toFixed(3) + '\n' +
    'Z: ' + currentZ.toFixed(3);
}

largerBtn.addEventListener('click', () => {
  rootScale = Math.min(30, rootScale * 1.25);
  applyRootTransform();
});

smallerBtn.addEventListener('click', () => {
  rootScale = Math.max(0.01, rootScale / 1.25);
  applyRootTransform();
});

frontBtn.addEventListener('click', () => {
  currentZ += 0.1;
  applyRootTransform();
});

backBtn.addEventListener('click', () => {
  currentZ -= 0.1;
  applyRootTransform();
});

upBtn.addEventListener('click', () => {
  currentY += 0.1;
  applyRootTransform();
});

downBtn.addEventListener('click', () => {
  currentY -= 0.1;
  applyRootTransform();
});

resetBtn.addEventListener('click', () => {
  rootScale = 1.0;
  currentX = 0.0;
  currentY = 0.0;
  currentZ = 0.35;

  applyRootTransform();
  fitModelToView();
});

markerEl.addEventListener('targetFound', () => {
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'block';

  modelRoot.setAttribute('visible', 'true');
  modelBounds.setAttribute('visible', 'true');
  debugBox.setAttribute('visible', 'true');

  const counts = countMeshes();

  statusEl.textContent =
    '潮見ジオラマを発見しました。\n' +
    '赤い箱と水色ワイヤー箱が表示されています。\n' +
    'meshCount: ' + counts.meshCount + '\n' +
    'visibleMeshCount: ' + counts.visibleMeshCount + '\n' +
    'meshCountが0の場合、GLBがメッシュとして読めていません。';

  setTimeout(() => {
    foundBanner.style.display = 'none';
  }, 2000);
});

markerEl.addEventListener('targetLost', () => {
  if (!arStarted) return;

  foundBanner.style.display = 'none';
  targetGuide.style.display = 'block';

  statusEl.textContent =
    'マーカーを見失いました。\n' +
    '中央に入れてください。';
});

async function waitForMindARSystem() {
  for (let i = 0; i < 50; i++) {
    const sys = sceneEl.systems['mindar-image-system'];
    if (sys) return sys;
    await new Promise(r => setTimeout(r, 200));
  }
  return null;
}

startBtn.addEventListener('click', async () => {
  try {
    if (!window.isSecureContext) {
      statusEl.textContent =
        'HTTPSではありません。\n' +
        'https:// のURLで開いてください。';
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      statusEl.textContent =
        'このブラウザではカメラAPIが使えません。\n' +
        'iPhoneはSafari、AndroidはChromeで開いてください。';
      return;
    }

    if (!sceneLoaded) {
      statusEl.textContent =
        'ARシーンの読み込みがまだ完了していません。\n' +
        '少し待ってから開始してください。';
      return;
    }

    const mindar = await waitForMindARSystem();

    if (!mindar) {
      statusEl.textContent =
        'MindARシステムが見つかりません。\n' +
        'scriptタグを確認してください。';
      return;
    }

    targetGuide.style.display = 'block';
    statusEl.textContent = 'カメラを起動しています。許可してください。';

    await mindar.start();

    arStarted = true;

    statusEl.textContent =
      '探索中です。\n' +
      'マーカーを画面中央に入れてください。';

  } catch (err) {
    console.error(err);

    statusEl.textContent =
      'カメラ開始に失敗しました。\n' +
      (err.message || String(err));
  }
});

stopBtn.addEventListener('click', () => {
  const sys = sceneEl.systems['mindar-image-system'];

  if (sys) {
    sys.stop();
  }

  arStarted = false;
  targetGuide.style.display = 'none';
  foundBanner.style.display = 'none';

  statusEl.textContent = '停止しました。';
});

checkBtn.addEventListener('click', () => {
  const mindar = sceneEl.systems['mindar-image-system'];
  const counts = countMeshes();

  statusEl.textContent =
    '状態確認\n' +
    'HTTPS: ' + window.isSecureContext + '\n' +
    'sceneLoaded: ' + sceneLoaded + '\n' +
    'MindAR: ' + Boolean(mindar) + '\n' +
    'modelLoaded: ' + modelLoaded + '\n' +
    'childCount: ' + counts.childCount + '\n' +
    'meshCount: ' + counts.meshCount + '\n' +
    'visibleMeshCount: ' + counts.visibleMeshCount + '\n' +
    'rootScale: ' + rootScale.toFixed(3) + '\n' +
    'innerScale: ' + autoInnerScale.toFixed(4) + '\n' +
    'Y: ' + currentY.toFixed(3) + '\n' +
    'Z: ' + currentZ.toFixed(3);
});
</script>

</body>
</html>
