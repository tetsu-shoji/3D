<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>潮見ジオラマ 固定ARモード</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #111;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

#app {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

#header {
  color: #fff;
  background: #17324d;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.5;
}

#viewerArea {
  position: relative;
  flex: 1;
  background: #f2f2f2;
}

model-viewer {
  width: 100%;
  height: 100%;
  background: #f2f2f2;
}

#arButton {
  background: #c40000;
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 12px 18px;
  font-size: 15px;
  font-weight: 800;
  box-shadow: 0 3px 12px rgba(0,0,0,0.35);
  position: absolute;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%);
}

#controls {
  position: fixed;
  right: 12px;
  bottom: 88px;
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.control-button {
  border: none;
  border-radius: 999px;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: bold;
  background: rgba(255,255,255,0.94);
  color: #111;
  box-shadow: 0 3px 10px rgba(0,0,0,0.25);
}

#backBtn {
  background: #424242;
  color: #fff;
}

#status {
  color: #fff;
  background: #222;
  padding: 9px 12px;
  font-size: 12px;
  line-height: 1.5;
  white-space: pre-wrap;
}
</style>
</head>

<body>
<div id="app">
  <div id="header">
    固定ARモード<br>
    shiomi_city.glb を床・机などにAR配置します。
  </div>

  <div id="viewerArea">
    ./shiomi_city.glb

      <button id="arButton" slot="ar-button">
        ARで床・机に配置
      </button>

    </model-viewer>
  </div>

  <div id="controls">
    <button class="control-button" id="rotateBtn">回転ON/OFF</button>
    <button class="control-button" id="resetBtn">表示リセット</button>
    <button class="control-button" id="zoomInBtn">拡大</button>
    <button class="control-button" id="zoomOutBtn">縮小</button>
    <button class="control-button" id="checkBtn">確認</button>
    <button class="control-button" id="backBtn">MindARへ戻る</button>
  </div>

  <div id="status">
    固定ARページを読み込み中です。
  </div>
</div>

<script>
const viewer = document.querySelector("#viewer");
const statusEl = document.querySelector("#status");

const rotateBtn = document.querySelector("#rotateBtn");
const resetBtn = document.querySelector("#resetBtn");
const zoomInBtn = document.querySelector("#zoomInBtn");
const zoomOutBtn = document.querySelector("#zoomOutBtn");
const checkBtn = document.querySelector("#checkBtn");
const backBtn = document.querySelector("#backBtn");

let autoRotate = true;
let cameraDistance = 3.0;

window.addEventListener("load", () => {
  statusEl.textContent =
    "固定ARページを読み込みました。\n" +
    "3Dモデル確認後、「ARで床・机に配置」を押してください。";
});

viewer.addEventListener("load", () => {
  statusEl.textContent =
    "shiomi_city.glb を読み込みました。\n" +
    "指で回転・拡大縮小できます。\n" +
    "AR配置する場合は「ARで床・机に配置」を押してください。";
});

viewer.addEventListener("error", () => {
  statusEl.textContent =
    "shiomi_city.glb を読み込めませんでした。\n" +
    "fixed.html と同じフォルダに shiomi_city.glb があるか確認してください。";
});

viewer.addEventListener("ar-status", (event) => {
  const status = event.detail.status;

  if (status === "session-started") {
    statusEl.textContent =
      "AR表示を開始しました。\n" +
      "床・机などの水平面を認識してモデルを配置してください。";
  }

  if (status === "object-placed") {
    statusEl.textContent =
      "AR空間にモデルを配置しました。\n" +
      "画面を動かして戻ると、その位置に残るか確認してください。";
  }

  if (status === "not-presenting") {
    statusEl.textContent =
      "AR表示を終了しました。\n" +
      "3Dプレビュー画面に戻りました。";
  }

  if (status === "failed") {
    statusEl.textContent =
      "AR表示に失敗しました。\n" +
      "Android Chrome、ARCore対応端末、HTTPS、カメラ許可を確認してください。\n" +
      "Teams内ブラウザではなく、Chromeで直接開いてください。";
  }
});

rotateBtn.addEventListener("click", () => {
  autoRotate = !autoRotate;

  if (autoRotate) {
    viewer.setAttribute("auto-rotate", "");
    statusEl.textContent = "自動回転をONにしました。";
  } else {
    viewer.removeAttribute("auto-rotate");
    statusEl.textContent = "自動回転をOFFにしました。";
  }
});

resetBtn.addEventListener("click", () => {
  cameraDistance = 3.0;
  viewer.cameraOrbit = "0deg 75deg " + cameraDistance + "m";
  viewer.fieldOfView = "30deg";

  if (viewer.jumpCameraToGoal) {
    viewer.jumpCameraToGoal();
  }

  statusEl.textContent = "表示位置をリセットしました。";
});

zoomInBtn.addEventListener("click", () => {
  cameraDistance = Math.max(1.2, cameraDistance - 0.3);
  viewer.cameraOrbit = "0deg 75deg " + cameraDistance + "m";

  if (viewer.jumpCameraToGoal) {
    viewer.jumpCameraToGoal();
  }

  statusEl.textContent = "拡大しました。";
});

zoomOutBtn.addEventListener("click", () => {
  cameraDistance = Math.min(6.0, cameraDistance + 0.3);
  viewer.cameraOrbit = "0deg 75deg " + cameraDistance + "m";

  if (viewer.jumpCameraToGoal) {
    viewer.jumpCameraToGoal();
  }

  statusEl.textContent = "縮小しました。";
});

checkBtn.addEventListener("click", async () => {
  let message = "";

  message += "URL:\n" + location.href + "\n\n";
  message += "HTTPS:\n" + (window.isSecureContext ? "OK" : "NG") + "\n\n";
  message += "model-viewer登録:\n" + Boolean(customElements.get("model-viewer")) + "\n\n";

  try {
    const res = await fetch("./shiomi_city.glb", { cache: "no-store" });
    message += "shiomi_city.glb:\nHTTP " + res.status + "\n";
  } catch (e) {
    message += "shiomi_city.glb:\nfetch失敗\n" + String(e) + "\n";
  }

  statusEl.textContent = message;
});

backBtn.addEventListener("click", () => {
  location.href = "./index.html";
});
</script>
</body>
</html>
